<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樓層平面 AutoCAD 轉換工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .panel h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            background: #f0f1ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #e8ebff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        input[type="file"] {
            display: none;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .preview-container {
            position: relative;
            background: #f5f5f5;
            border-radius: 8px;
            overflow: hidden;
            min-height: 400px;
        }

        canvas {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .image-preview {
            max-width: 100%;
            max-height: 500px;
            border-radius: 6px;
        }

        .settings {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
        }

        .setting-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input[type="number"],
        input[type="text"],
        select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.95em;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px;
            border-radius: 4px;
            margin-top: 15px;
            color: #1565c0;
            font-size: 0.9em;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
            display: none;
        }

        .progress-bar.active {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8em;
            font-weight: bold;
        }

        .results {
            margin-top: 20px;
        }

        .result-item {
            background: #f9f9f9;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            border-left: 3px solid #667eea;
        }

        .status-message {
            padding: 12px;
            border-radius: 4px;
            margin-top: 15px;
            display: none;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }

        .tab-btn {
            padding: 10px 15px;
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏠 樓層平面 AutoCAD 轉換工具</h1>
            <p class="subtitle">將手繪丈量圖轉換成 AutoCAD DXF 檔案</p>
        </header>

        <div class="content">
            <!-- 上傳和預覽區域 -->
            <div class="panel">
                <h2>📋 上傳丈量圖</h2>

                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📷</div>
                    <p style="font-size: 1.1em; color: #333; margin-bottom: 10px;">拖拽圖片到這裡或點擊選擇</p>
                    <p style="color: #999; font-size: 0.9em;">支援 JPG, PNG, PDF 格式</p>
                    <input type="file" id="fileInput" accept="image/*,.pdf">
                </div>

                <div id="imagePreview" style="margin-top: 20px;"></div>

                <div class="controls">
                    <button class="btn-primary" onclick="document.getElementById('fileInput').click()">選擇檔案</button>
                    <button class="btn-secondary" onclick="resetUpload()">清除</button>
                </div>

                <div id="uploadStatus" class="status-message"></div>
            </div>

            <!-- 設定和參數區域 -->
            <div class="panel">
                <h2>⚙️ 轉換設定</h2>

                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('basic')">基本設定</button>
                    <button class="tab-btn" onclick="switchTab('advanced')">進階設定</button>
                </div>

                <div id="basic" class="tab-content active">
                    <div class="settings">
                        <div class="setting-group">
                            <label for="scale">標度尺 (cm/pixel)：</label>
                            <input type="number" id="scale" value="1" step="0.1" min="0.1">
                            <div class="info-box">💡 丈量圖中 1 像素相當於實際的多少 cm</div>
                        </div>

                        <div class="setting-group">
                            <label for="unit">輸出單位：</label>
                            <select id="unit">
                                <option value="cm">公分 (cm)</option>
                                <option value="m">公尺 (m)</option>
                                <option value="mm">毫米 (mm)</option>
                            </select>
                        </div>

                        <div class="setting-group">
                            <label for="wallThickness">預設牆厚 (cm)：</label>
                            <input type="number" id="wallThickness" value="15" step="1" min="1">
                        </div>

                        <div class="setting-group">
                            <label for="doorWidth">預設門寬 (cm)：</label>
                            <input type="number" id="doorWidth" value="90" step="1" min="10">
                        </div>
                    </div>
                </div>

                <div id="advanced" class="tab-content">
                    <div class="settings">
                        <div class="setting-group">
                            <label for="ocrLanguage">OCR 語言：</label>
                            <select id="ocrLanguage">
                                <option value="chi_tra">繁體中文</option>
                                <option value="chi_sim">簡體中文</option>
                                <option value="eng">英文</option>
                            </select>
                        </div>

                        <div class="setting-group">
                            <label for="edgeThreshold">邊界檢測靈敏度：</label>
                            <input type="number" id="edgeThreshold" value="50" step="5" min="10" max="200">
                        </div>

                        <div class="setting-group">
                            <label for="minLineLength">最小線條長度 (pixel)：</label>
                            <input type="number" id="minLineLength" value="20" step="5" min="5">
                        </div>

                        <div class="setting-group">
                            <label>
                                <input type="checkbox" id="detectDoors" checked>
                                自動檢測門窗
                            </label>
                        </div>

                        <div class="setting-group">
                            <label>
                                <input type="checkbox" id="detectWalls" checked>
                                自動檢測牆面
                            </label>
                        </div>
                    </div>
                </div>

                <div class="controls" style="margin-top: 20px;">
                    <button class="btn-primary" onclick="processImage()">開始轉換</button>
                    <button class="btn-secondary" onclick="previewDXF()">預覽 DXF</button>
                </div>

                <div id="processingStatus" class="progress-bar">
                    <div class="progress-fill" id="progressFill">0%</div>
                </div>

                <div id="processingMessage" class="status-message"></div>
            </div>
        </div>

        <!-- 結果區域 -->
        <div class="panel">
            <h2>📊 識別結果</h2>

            <div id="results" class="results">
                <div class="info-box">上傳並處理丈量圖後，識別結果將顯示在這裡</div>
            </div>

            <div class="controls">
                <button class="btn-success" onclick="downloadDXF()">下載 DXF 檔案</button>
                <button class="btn-secondary" onclick="downloadReport()">下載識別報告</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js"></script>
    <script>
        let uploadedImage = null;
        let recognizedData = null;
        let dxfContent = null;

        // 拖拽上傳
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFileSelect(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files[0]);
        });

        function handleFileSelect(file) {
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                uploadedImage = e.target.result;
                showImagePreview(e.target.result);
                showMessage('success', '✅ 圖片上傳成功！');
            };
            reader.readAsDataURL(file);
        }

        function showImagePreview(src) {
            const preview = document.getElementById('imagePreview');
            preview.innerHTML = `<img src="${src}" class="image-preview" alt="preview">`;
        }

        function resetUpload() {
            uploadedImage = null;
            fileInput.value = '';
            document.getElementById('imagePreview').innerHTML = '';
            document.getElementById('results').innerHTML = '<div class="info-box">上傳並處理丈量圖後，識別結果將顯示在這裡</div>';
            showMessage('info', '已清除圖片');
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function showMessage(type, message) {
            const messageEl = document.getElementById('uploadStatus') || document.getElementById('processingMessage');
            messageEl.className = `status-message ${type}`;
            messageEl.textContent = message;
        }

        function updateProgress(percent, message) {
            const progressBar = document.getElementById('processingStatus');
            const progressFill = document.getElementById('progressFill');
            progressBar.classList.add('active');
            progressFill.style.width = percent + '%';
            progressFill.textContent = Math.round(percent) + '%';

            const msgEl = document.getElementById('processingMessage');
            msgEl.className = 'status-message info';
            msgEl.textContent = message;
        }

        async function processImage() {
            if (!uploadedImage) {
                showMessage('error', '❌ 請先上傳圖片');
                return;
            }

            try {
                updateProgress(10, '開始處理圖像...');

                const formData = new FormData();
                formData.append('image', uploadedImage);
                formData.append('scale', document.getElementById('scale').value);
                formData.append('wallThickness', document.getElementById('wallThickness').value);
                formData.append('doorWidth', document.getElementById('doorWidth').value);
                formData.append('ocrLanguage', document.getElementById('ocrLanguage').value);
                formData.append('edgeThreshold', document.getElementById('edgeThreshold').value);
                formData.append('minLineLength', document.getElementById('minLineLength').value);
                formData.append('detectDoors', document.getElementById('detectDoors').checked);
                formData.append('detectWalls', document.getElementById('detectWalls').checked);

                updateProgress(30, '上傳圖像到伺服器...');

                const response = await fetch('/api/process', {
                    method: 'POST',
                    body: formData
                });

                updateProgress(60, '識別尺寸和線條...');

                const data = await response.json();

                if (data.success) {
                    recognizedData = data;
                    displayResults(data);
                    updateProgress(100, '✅ 處理完成！');
                    showMessage('success', '✅ 圖像處理和識別成功！');
                } else {
                    showMessage('error', '❌ 處理失敗：' + (data.error || '未知錯誤'));
                    updateProgress(0, '');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('error', '❌ 錯誤：' + error.message);
                updateProgress(0, '');
            }
        }

        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            let html = '<h3 style="color: #667eea; margin-bottom: 15px;">🔍 識別結果</h3>';

            if (data.dimensions && data.dimensions.length > 0) {
                html += '<div class="result-item"><strong>識別的尺寸標註：</strong> ' + data.dimensions.length + ' 個';
                data.dimensions.slice(0, 5).forEach(dim => {
                    html += `<div style="margin-left: 20px; margin-top: 5px;">• ${dim.value} ${data.unit || 'cm'}</div>`;
                });
                if (data.dimensions.length > 5) {
                    html += `<div style="margin-left: 20px; color: #999;">... 及其他 ${data.dimensions.length - 5} 個</div>`;
                }
                html += '</div>';
            }

            if (data.walls && data.walls.length > 0) {
                html += '<div class="result-item"><strong>檢測的牆面：</strong> ' + data.walls.length + ' 面</div>';
            }

            if (data.doors && data.doors.length > 0) {
                html += '<div class="result-item"><strong>檢測的門窗：</strong> ' + data.doors.length + ' 個</div>';
            }

            if (data.texts && data.texts.length > 0) {
                html += '<div class="result-item"><strong>識別的文字：</strong> ' + data.texts.length + ' 項';
                data.texts.slice(0, 8).forEach(text => {
                    html += `<div style="margin-left: 20px; margin-top: 5px;">• ${text.value} (${text.color})</div>`;
                });
                html += '</div>';
            }

            html += '<div class="info-box" style="margin-top: 15px;">💡 可以調整設定後重新處理以獲得更好的結果</div>';

            resultsDiv.innerHTML = html;
        }

        function previewDXF() {
            if (!recognizedData) {
                showMessage('error', '❌ 請先處理圖像');
                return;
            }
            showMessage('info', 'DXF 預覽功能即將推出...');
        }

        async function downloadDXF() {
            if (!recognizedData) {
                showMessage('error', '❌ 請先處理圖像');
                return;
            }

            try {
                updateProgress(50, '生成 DXF 檔案...');

                const response = await fetch('/api/generate-dxf', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        data: recognizedData,
                        unit: document.getElementById('unit').value
                    })
                });

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'floorplan.dxf';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

                updateProgress(100, '✅ DXF 檔案已下載');
                showMessage('success', '✅ DXF 檔案下載成功！');
            } catch (error) {
                showMessage('error', '❌ 下載失敗：' + error.message);
                updateProgress(0, '');
            }
        }

        function downloadReport() {
            if (!recognizedData) {
                showMessage('error', '❌ 請先處理圖像');
                return;
            }

            const report = JSON.stringify(recognizedData, null, 2);
            const blob = new Blob([report], { type: 'application/json' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'recognition-report.json';
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
