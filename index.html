/* ── CSS ── */
const CSS = `
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500&display=swap');
:root{
  --bg:#0C0C0C; --sf:#141414; --sf2:#1A1A1A; --sf3:#222222;
  --t1:#EBEBEB; --t2:#888888; --t3:#444444;
  --b1:#222222; --b2:#303030; --b3:#3A3A3A;
  --acc:#FFFFFF;
  --done-c:#80C880; --done-bg:rgba(80,180,80,.1);
  --red-c:#E08080;  --red-bg:rgba(220,60,60,.1);
  --sb:220px; --hh:52px; --bnav:64px;
  --r:12px; --rs:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:2px;height:2px;}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}

/* ── Header ── */
.hdr{
  position:sticky;top:0;z-index:200;height:var(--hh);
  background:rgba(12,12,12,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--b1);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.25rem;
}
.hdr-l{display:flex;align-items:center;gap:.75rem;min-width:0;}
.hdr-wordmark{font-family:'Cormorant Garamond',serif;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--t3);flex-shrink:0;}
.hdr-div{width:1px;height:18px;background:var(--b2);flex-shrink:0;}
.hdr-proj{font-family:'Inter',sans-serif;font-size:.82rem;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.hdr-proj:hover{color:var(--acc);}
.hdr-r{display:flex;align-items:center;gap:.5rem;flex-shrink:0;}
.hdr-date{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--t3);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--t3);transition:all .3s;flex-shrink:0;}
.sync-dot.on{background:var(--done-c);box-shadow:0 0 6px rgba(80,180,80,.5);}
.menu-btn{width:34px;height:34px;border-radius:var(--rs);display:none;align-items:center;justify-content:center;font-size:1rem;color:var(--t2);border:1px solid var(--b2);transition:all .18s;}
.menu-btn:hover{border-color:var(--b3);color:var(--t1);}
.hdr-icon-btn{width:34px;height:34px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:.75rem;color:var(--t2);border:1px solid var(--b2);transition:all .18s;font-family:'DM Mono',monospace;white-space:nowrap;padding:0 .65rem;width:auto;}
.hdr-icon-btn:hover{border-color:var(--b3);color:var(--t1);}

/* ── Layout ── */
.workspace{display:grid;grid-template-columns:var(--sb) 1fr;min-height:calc(100vh - var(--hh));}

/* ── Sidebar ── */
.sidebar{
  background:var(--sf);border-right:1px solid var(--b1);
  padding:.75rem .6rem;
  position:sticky;top:var(--hh);height:calc(100vh - var(--hh));
  overflow-y:auto;display:flex;flex-direction:column;gap:.15rem;
  transition:transform .25s ease,box-shadow .25s ease;
}
.sb-sec{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:var(--t3);padding:.6rem .65rem .35rem;margin-top:.4rem;}
.sb-item{
  display:flex;align-items:center;gap:.6rem;
  padding:.65rem .75rem;border-radius:var(--rs);cursor:pointer;
  border:1px solid transparent;transition:all .15s;
  font-size:.8rem;color:var(--t2);
}
.sb-item:hover{background:var(--sf2);color:var(--t1);}
.sb-item.on{background:var(--sf3);color:var(--t1);border-color:var(--b2);}
.sb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sb-info{flex:1;min-width:0;}
.sb-name{font-size:.8rem;font-weight:500;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-sub{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--t3);margin-top:.12rem;}
.sb-bar{height:2px;background:var(--b1);border-radius:1px;overflow:hidden;margin-top:.45rem;}
.sb-fill{height:100%;background:var(--t2);border-radius:1px;transition:width .5s;}
.sb-item.on .sb-fill{background:var(--acc);}
.sb-sep{border:none;border-top:1px solid var(--b1);margin:.5rem .4rem;}
.sb-add{
  width:100%;padding:.7rem;background:transparent;
  border:1px dashed var(--b2);border-radius:var(--rs);
  font-family:'DM Mono',monospace;font-size:.68rem;color:var(--t3);
  cursor:pointer;transition:all .2s;margin-top:auto;
  display:flex;align-items:center;justify-content:center;gap:.35rem;
}
.sb-add:hover{border-color:var(--acc);color:var(--acc);}
.sb-close-btn{display:none;width:100%;padding:.55rem;background:transparent;border:1px solid var(--b2);border-radius:var(--rs);font-family:'DM Mono',monospace;font-size:.65rem;color:var(--t3);cursor:pointer;margin-bottom:.5rem;}
.sb-close-btn:hover{border-color:var(--t2);color:var(--t2);}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:149;backdrop-filter:blur(2px);}

/* ── Main ── */
.main{padding:2rem 2.4rem 3rem;min-height:calc(100vh - var(--hh));}

/* ── Project header ── */
.proj-hdr{margin-bottom:2rem;padding-bottom:1.4rem;border-bottom:1px solid var(--b1);}
.proj-eyebrow{display:flex;align-items:center;gap:.6rem;margin-bottom:.6rem;}
.stage-tag{font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;padding:.22rem .7rem;border-radius:20px;border:1px solid var(--b2);color:var(--t2);}
.proj-title{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;line-height:1.05;letter-spacing:-.01em;margin-bottom:.5rem;}
.proj-meta-row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
.proj-meta{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--t3);}
.meta-btn{font-family:'DM Mono',monospace;font-size:.58rem;padding:.2rem .55rem;border:1px solid var(--b2);border-radius:4px;color:var(--t3);cursor:pointer;transition:all .15s;}
.meta-btn:hover{border-color:var(--b3);color:var(--t2);}
.del-btn-sm{font-family:'DM Mono',monospace;font-size:.58rem;padding:.2rem .55rem;border:1px solid transparent;border-radius:4px;color:var(--t3);cursor:pointer;transition:all .15s;}
.del-btn-sm:hover{border-color:rgba(220,60,60,.4);color:var(--red-c);}

/* ── Tabs (desktop/tablet) ── */
.tabs{display:flex;gap:.2rem;margin-bottom:1.6rem;border-bottom:1px solid var(--b1);padding-bottom:0;}
.tab-btn{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.05em;padding:.65rem 1rem;cursor:pointer;color:var(--t3);white-space:nowrap;transition:all .18s;border:none;background:transparent;position:relative;}
.tab-btn::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:transparent;transition:background .18s;}
.tab-btn:hover{color:var(--t2);}
.tab-btn.on{color:var(--t1);}
.tab-btn.on::after{background:var(--acc);}

/* ── Mobile bottom nav ── */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bnav);background:rgba(14,14,14,.96);backdrop-filter:blur(12px);border-top:1px solid var(--b1);z-index:100;flex-direction:row;}
.mn-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:transparent;border:none;color:var(--t3);cursor:pointer;transition:color .15s;padding:0 .2rem;}
.mn-btn.on{color:var(--t1);}
.mn-icon{font-family:'DM Mono',monospace;font-size:.9rem;line-height:1;}
.mn-label{font-family:'DM Mono',monospace;font-size:.44rem;letter-spacing:.04em;white-space:nowrap;}
.mn-badge{font-family:'DM Mono',monospace;font-size:.4rem;background:var(--red-c);color:#000;border-radius:10px;padding:.05rem .25rem;margin-top:-2px;}

/* ── Cards ── */
.card{background:var(--sf);border:1px solid var(--b1);border-radius:var(--r);padding:1.25rem 1.35rem;}
.card-hd{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:var(--t3);margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;}
.add-btn{font-family:'DM Mono',monospace;font-size:.6rem;padding:.22rem .6rem;border:1px solid var(--b2);border-radius:4px;color:var(--t3);cursor:pointer;transition:all .15s;}
.add-btn:hover{border-color:var(--acc);color:var(--acc);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.full{grid-column:1/-1;}

/* ── Progress card ── */
.prog-card{background:var(--sf);border:1px solid var(--b1);border-radius:var(--r);padding:1.4rem 1.5rem;margin-bottom:1rem;}
.prog-row{display:grid;grid-template-columns:1fr auto;align-items:end;gap:1rem;margin-bottom:1.25rem;}
.prog-pct{font-family:'Cormorant Garamond',serif;font-size:3.5rem;font-weight:300;line-height:1;color:var(--t1);}
.prog-pct-unit{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--t3);margin-left:.2rem;}
.prog-right{text-align:right;}
.prog-lbl{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--t3);}
.prog-stages{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:.8rem;}
.stage-step{padding:.4rem .2rem;text-align:center;font-family:'DM Mono',monospace;font-size:.5rem;color:var(--t3);cursor:pointer;border-radius:4px;border:1px solid transparent;transition:all .15s;position:relative;}
.stage-step::before{content:'';display:block;height:2px;background:var(--b2);border-radius:1px;margin-bottom:.3rem;}
.stage-step.done::before{background:var(--t2);}
.stage-step.current::before{background:var(--acc);}
.stage-step.current{color:var(--t1);}
.stage-step.done{color:var(--t2);}
.stage-step:hover{background:var(--sf2);}
.prog-track{height:1px;background:var(--b2);border-radius:1px;overflow:hidden;}
.prog-fill{height:100%;background:var(--acc);border-radius:1px;transition:width .6s;}

/* ── Milestones ── */
.ms-list{list-style:none;}
.ms-item{display:flex;gap:.7rem;padding:.65rem 0;border-bottom:1px solid var(--b1);align-items:flex-start;}
.ms-item:last-child{border-bottom:none;}
.ms-dot-w{padding-top:.35rem;flex-shrink:0;}
.ms-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid;}
.ms-body{flex:1;min-width:0;}
.ms-title{font-size:.84rem;margin-bottom:.18rem;color:var(--t1);}
.ms-dates{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--t3);}
.ms-r{display:flex;align-items:center;gap:.4rem;flex-shrink:0;}
.ms-sel{font-family:'DM Mono',monospace;font-size:.54rem;padding:.18rem .45rem;border-radius:4px;border:1px solid var(--b2);cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;background:var(--sf2);}
.tag-sm{font-family:'DM Mono',monospace;font-size:.54rem;padding:.16rem .42rem;border-radius:4px;flex-shrink:0;}
.del-x{background:none;border:none;cursor:pointer;color:var(--t3);font-size:.75rem;padding:.1rem .18rem;transition:color .15s;line-height:1;flex-shrink:0;}
.del-x:hover{color:var(--red-c);}

/* ── Todos ── */
.todo-item{padding:.8rem 0;border-bottom:1px solid var(--b1);}
.todo-item:last-child{border-bottom:none;}
.todo-row{display:flex;gap:.75rem;align-items:flex-start;}
.chk{width:20px;height:20px;border:1.5px solid var(--b2);border-radius:5px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .18s;background:transparent;font-size:.68rem;color:var(--bg);}
.chk:hover{border-color:var(--t2);}
.chk.on{background:var(--t1);border-color:var(--t1);}
.todo-txt{font-size:.84rem;line-height:1.5;color:var(--t1);}
.todo-done{text-decoration:line-through;color:var(--t3);}
.todo-meta{display:flex;align-items:center;gap:.4rem;margin-top:.2rem;flex-wrap:wrap;}
.todo-due{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--t3);}
.todo-due.ov{color:var(--red-c);}
.todo-note{font-size:.72rem;color:var(--t3);line-height:1.5;margin-top:.22rem;padding:.3rem .5rem;background:var(--sf2);border-radius:4px;border-left:1.5px solid var(--b3);}

/* ── Comms ── */
.comm-item{padding:.8rem 0;border-bottom:1px solid var(--b1);}
.comm-item:last-child{border-bottom:none;}
.comm-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:.25rem;}
.comm-who{font-size:.84rem;font-weight:500;}
.comm-r{display:flex;align-items:center;gap:.45rem;}
.comm-when{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--t3);}
.comm-note{font-size:.8rem;color:var(--t2);line-height:1.6;}
.comm-ch{display:inline-block;font-family:'DM Mono',monospace;font-size:.54rem;padding:.14rem .42rem;border:1px solid var(--b2);border-radius:4px;margin-top:.25rem;color:var(--t3);}

/* ── Pending ── */
.filt-row{display:flex;gap:.3rem;flex-wrap:wrap;}
.filt-btn{font-family:'DM Mono',monospace;font-size:.58rem;padding:.25rem .6rem;border:1px solid var(--b1);border-radius:4px;color:var(--t3);cursor:pointer;transition:all .15s;}
.filt-btn:hover{border-color:var(--b2);color:var(--t2);}
.filt-btn.on{background:var(--sf3);border-color:var(--b2);color:var(--t1);}
.pd-item{padding:.9rem 1rem;border:1px solid var(--b1);border-radius:var(--rs);margin-bottom:.6rem;background:var(--sf);transition:border-color .15s;}
.pd-item:hover{border-color:var(--b2);}
.pd-item.urg{border-left:2px solid var(--red-c);}
.pd-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.25rem;gap:.4rem;}
.pd-title{font-size:.84rem;font-weight:500;}
.pd-sel{font-family:'DM Mono',monospace;font-size:.54rem;padding:.18rem .45rem;border-radius:4px;border:1px solid var(--b2);cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;background:var(--sf2);flex-shrink:0;}
.pd-note{font-size:.74rem;color:var(--t2);line-height:1.5;margin-bottom:.22rem;}
.pd-date{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--t3);}

/* ── Finance ── */
.fin-toggle{display:flex;gap:.2rem;margin-bottom:1.2rem;background:var(--sf2);border-radius:var(--rs);padding:.3rem;}
.fin-tab{flex:1;padding:.42rem;text-align:center;font-family:'DM Mono',monospace;font-size:.6rem;cursor:pointer;border:none;background:transparent;color:var(--t3);transition:all .2s;border-radius:6px;}
.fin-tab.on{background:var(--sf3);color:var(--t1);}
.fin-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;margin-bottom:1.25rem;}
.fin-stat{background:var(--sf);border:1px solid var(--b1);border-radius:var(--rs);padding:1rem 1.1rem;}
.fin-stat-l{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--t3);letter-spacing:.06em;margin-bottom:.5rem;}
.fin-stat-v{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;}
.fin-item{display:flex;align-items:center;padding:.65rem 0;border-bottom:1px solid var(--b1);gap:.5rem;}
.fin-item:last-child{border-bottom:none;}
.fin-info{flex:1;min-width:0;}
.fin-name{font-size:.82rem;color:var(--t1);}
.fin-date{font-family:'DM Mono',monospace;font-size:.57rem;color:var(--t3);margin-top:.1rem;}
.fin-r{display:flex;flex-direction:column;align-items:flex-end;gap:.18rem;}
.fin-amt{font-family:'DM Mono',monospace;font-size:.76rem;}
.fin-in{color:var(--done-c);}
.fin-ex{color:var(--red-c);}
.fin-st{font-family:'DM Mono',monospace;font-size:.52rem;padding:.06rem .32rem;border-radius:3px;cursor:pointer;border:1px solid var(--b2);color:var(--t3);background:transparent;transition:all .15s;}
.fin-st:hover{border-color:var(--b3);color:var(--t2);}
.extra-total{display:flex;justify-content:space-between;align-items:baseline;padding-top:.8rem;margin-top:.4rem;border-top:1px solid var(--b2);}
.extra-total-l{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--t3);}
.extra-total-v{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:300;}

/* ── Timeline ── */
.tl-item{display:flex;gap:.85rem;padding:.85rem 0;border-bottom:1px solid var(--b1);align-items:flex-start;}
.tl-item:last-child{border-bottom:none;}
.tl-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;border:1px solid var(--b2);}
.tl-body{flex:1;}
.tl-title{font-size:.84rem;font-weight:500;margin-bottom:.1rem;}
.tl-date{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--t3);}
.tl-note{font-size:.76rem;color:var(--t2);line-height:1.45;margin-top:.2rem;}
.tl-tag{font-family:'DM Mono',monospace;font-size:.52rem;padding:.16rem .45rem;border-radius:4px;border:1px solid var(--b2);color:var(--t3);flex-shrink:0;}

/* ── Calendar ── */
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;}
.cal-nav-btn{font-family:'DM Mono',monospace;font-size:.65rem;padding:.3rem .7rem;border:1px solid var(--b2);border-radius:4px;color:var(--t3);cursor:pointer;transition:all .15s;}
.cal-nav-btn:hover{border-color:var(--b3);color:var(--t2);}
.cal-month-lbl{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{text-align:center;font-family:'DM Mono',monospace;font-size:.55rem;color:var(--t3);padding:.38rem .2rem;}
.cal-cell{min-height:68px;background:var(--sf);border:1px solid var(--b1);border-radius:4px;padding:.25rem .3rem;transition:border-color .15s;}
.cal-cell.empty{background:transparent;border-color:transparent;}
.cal-cell.today{border-color:var(--acc);}
.cal-day{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--t3);margin-bottom:.18rem;}
.cal-day.tod{width:18px;height:18px;background:var(--acc);color:var(--bg);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;}
.cal-ev{font-size:.48rem;padding:.1rem .28rem;border-radius:3px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;background:rgba(255,255,255,.08);color:var(--t2);}

/* ── Empty state ── */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--t3);}
.empty-icon{font-family:'DM Mono',monospace;font-size:1.5rem;display:block;margin-bottom:.7rem;opacity:.2;}
.empty-txt{font-size:.84rem;color:var(--t3);}
.empty-sub{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--t3);margin-top:.3rem;opacity:.6;}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal{background:var(--sf);border:1px solid var(--b2);border-radius:var(--r);padding:1.75rem 2rem 1.5rem;width:min(460px,92vw);box-shadow:0 24px 64px rgba(0,0,0,.5);max-height:88vh;overflow-y:auto;}
.modal h3{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;margin-bottom:1.25rem;letter-spacing:-.01em;}
.modal label{display:block;font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;color:var(--t3);margin-bottom:.28rem;margin-top:.8rem;}
.modal input,.modal select,.modal textarea{width:100%;padding:.55rem .75rem;border:1px solid var(--b2);border-radius:var(--rs);background:var(--sf2);color:var(--t1);font-size:.85rem;outline:none;transition:border-color .15s;}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--b3);}
.modal textarea{resize:vertical;min-height:68px;}
.modal-ft{display:flex;justify-content:flex-end;gap:.55rem;margin-top:1.4rem;}
.btn-ghost{font-family:'DM Mono',monospace;font-size:.66rem;padding:.5rem 1rem;background:transparent;border:1px solid var(--b2);border-radius:var(--rs);color:var(--t3);cursor:pointer;transition:all .18s;}
.btn-ghost:hover{border-color:var(--b3);color:var(--t2);}
.btn-solid{font-family:'DM Mono',monospace;font-size:.66rem;padding:.5rem 1.2rem;background:var(--acc);border:none;border-radius:var(--rs);color:var(--bg);cursor:pointer;transition:all .18s;}
.btn-solid:hover{background:#CCCCCC;}
.btn-danger{font-family:'DM Mono',monospace;font-size:.66rem;padding:.5rem 1.2rem;background:rgba(220,60,60,.15);border:1px solid rgba(220,60,60,.3);border-radius:var(--rs);color:var(--red-c);cursor:pointer;transition:all .18s;}
.btn-danger:hover{background:rgba(220,60,60,.25);}
.swatches{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.35rem;}
.swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.swatch:hover{transform:scale(1.15);}
.swatch.on{border-color:var(--acc);transform:scale(1.1);}

/* ── Responsive ── */
@media(max-width:900px){
  :root{--sb:200px;}
  .main{padding:1.5rem 1.4rem 2rem;}
}
@media(max-width:680px){
  .workspace{grid-template-columns:1fr;}
  .sidebar{
    position:fixed;left:0;top:0;bottom:0;z-index:150;
    width:260px;height:100%;
    transform:translateX(-110%);box-shadow:none;
  }
  .sidebar.open{transform:translateX(0);box-shadow:8px 0 32px rgba(0,0,0,.4);}
  .sb-overlay.show{display:block;}
  .sb-close-btn{display:block;}
  .menu-btn{display:flex;}
  .hdr-date{display:none;}
  .main{padding:1rem .85rem calc(var(--bnav) + 1.5rem);}
  .proj-title{font-size:1.8rem;}
  .grid2{grid-template-columns:1fr;}
  .tabs{display:none;}
  .mobile-nav{display:flex;}
  .fin-stats{grid-template-columns:1fr 1fr;}
  .prog-pct{font-size:2.8rem;}
  .cal-cell{min-height:52px;}
}
@media(max-width:400px){
  .fin-stats{grid-template-columns:1fr;}
  .prog-stages{grid-template-columns:repeat(5,1fr);}
}
`;

/* ── Helpers ── */
const Tag = ({cfg,children}) => <span style={{fontFamily:"'DM Mono',monospace",fontSize:".54rem",padding:".16rem .42rem",borderRadius:4,...cfg}}>{children}</span>;
const DelX = ({onClick}) => <button className="del-x" onClick={e=>{e.stopPropagation();onClick();}}>✕</button>;
const Empty = ({icon,text,sub}) => <div className="empty"><span className="empty-icon">{icon}</span><div className="empty-txt">{text}</div>{sub&&<div className="empty-sub">{sub}</div>}</div>;

/* ── OverviewTab ── */
function OverviewTab({proj,upd,openModal}){
  const done=proj.milestones.filter(m=>m.status==="done").length, total=proj.milestones.length, pct=total?Math.round(done/total*100):0, stIdx=STAGES.indexOf(proj.stage);
  const updMs=(id,ch)=>upd(p=>({...p,milestones:p.milestones.map(m=>m.id===id?{...m,...ch}:m)}));
  const delMs=id=>upd(p=>({...p,milestones:p.milestones.filter(m=>m.id!==id)}));
  const togTodo=id=>upd(p=>({...p,todos:p.todos.map(t=>t.id===id?{...t,done:!t.done}:t)}));
  const delTodo=id=>upd(p=>({...p,todos:p.todos.filter(t=>t.id!==id)}));
  const delComm=id=>upd(p=>({...p,comms:(p.comms||[]).filter(c=>c.id!==id)}));
  return(<>
    {/* Progress */}
    <div className="prog-card full" style={{marginBottom:"1rem"}}>
      <div className="prog-row">
        <div><div className="prog-pct">{pct}<span className="prog-pct-unit">%</span></div><div style={{fontFamily:"'DM Mono',monospace",fontSize:".58rem",color:"var(--t3)",marginTop:".25rem"}}>{done} / {total} 里程碑完成</div></div>
        <div>
          <select value={proj.stage} onChange={e=>upd(p=>({...p,stage:e.target.value}))} style={{fontFamily:"'DM Mono',monospace",fontSize:".58rem",border:"1px solid var(--b2)",borderRadius:4,padding:".2rem .55rem",background:"var(--sf2)",color:"var(--t3)",cursor:"pointer",outline:"none"}}>
            {STAGES.map(s=><option key={s} value={s}>{STAGE_L[s]}</option>)}
          </select>
        </div>
      </div>
      <div className="prog-stages">
        {STAGES.map((s,i)=><div key={s} className={`stage-step${i<stIdx?" done":i===stIdx?" current":""}`} onClick={()=>upd(p=>({...p,stage:s}))}>{STAGE_L[s]}</div>)}
      </div>
      <div className="prog-track"><div className="prog-fill" style={{width:pct+"%"}}/></div>
    </div>
    <div className="grid2">
      {/* Milestones */}
      <div className="card">
        <div className="card-hd">里程碑<button className="add-btn" onClick={()=>openModal("ms")}>＋ 新增</button></div>
        {proj.milestones.length===0?<Empty icon="—" text="尚無里程碑"/>:
        <ul className="ms-list">{proj.milestones.map(m=>{const c=MSS[m.status];return(
          <li key={m.id} className="ms-item">
            <div className="ms-dot-w"><div className="ms-dot" style={{borderColor:c.dot,background:m.status==="done"?c.dot:"transparent"}}/></div>
            <div className="ms-body"><div className="ms-title">{m.title}</div><div className="ms-dates">{fmtD(m.start)}{m.end?` → ${fmtD(m.end)}`:""}</div></div>
            <div className="ms-r">
              <select className="ms-sel" value={m.status} onChange={e=>updMs(m.id,{status:e.target.value})} style={c.tag}>{Object.entries(MSS).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}</select>
              <Tag cfg={PRC[m.prio]}>{PRC[m.prio].l}</Tag>
              <DelX onClick={()=>delMs(m.id)}/>
            </div>
          </li>);})}</ul>}
      </div>
      {/* Todos */}
      <div className="card">
        <div className="card-hd">待辦事項<button className="add-btn" onClick={()=>openModal("todo")}>＋ 新增</button></div>
        {proj.todos.length===0?<Empty icon="—" text="尚無待辦事項"/>:
        proj.todos.map(t=>{const over=t.due&&!t.done&&t.due<todayISO();return(
          <div key={t.id} className="todo-item">
            <div className="todo-row">
              <button className={`chk${t.done?" on":""}`} onClick={()=>togTodo(t.id)}>{t.done?"✓":""}</button>
              <div style={{flex:1,minWidth:0}}>
                <div className={`todo-txt${t.done?" todo-done":""}`}>{t.text}</div>
                <div className="todo-meta">{t.due&&<span className={`todo-due${over?" ov":""}`}>{fmtD(t.due)}</span>}<Tag cfg={PRC[t.prio]}>{PRC[t.prio].l}</Tag></div>
                {t.note&&<div className="todo-note">{t.note}</div>}
              </div>
              <DelX onClick={()=>delTodo(t.id)}/>
            </div>
          </div>);})}
      </div>
      {/* Comms */}
      <div className="card full">
        <div className="card-hd">溝通記錄<button className="add-btn" onClick={()=>openModal("comm")}>＋ 新增</button></div>
        {(proj.comms||[]).length===0?<Empty icon="—" text="尚無溝通記錄"/>:
        (proj.comms||[]).map(c=>(
          <div key={c.id} className="comm-item">
            <div className="comm-hd"><div className="comm-who">{c.who}</div><div className="comm-r"><span className="comm-when">{fmtD(c.date)}</span><DelX onClick={()=>delComm(c.id)}/></div></div>
            <div className="comm-note">{c.note}</div>
            <span className="comm-ch">{c.ch}</span>
          </div>))}
      </div>
    </div>
  </>);
}

/* ── PendingTab ── */
function PendingTab({proj,upd,openModal}){
  const [filter,setFilter]=useState("all");
  const updPd=(id,ch)=>upd(p=>({...p,pendings:p.pendings.map(x=>x.id===id?{...x,...ch}:x)}));
  const delPd=id=>upd(p=>({...p,pendings:p.pendings.filter(x=>x.id!==id)}));
  const filtered=filter==="all"?proj.pendings:proj.pendings.filter(x=>x.status===filter);
  const uc=proj.pendings.filter(x=>x.status==="urgent").length;
  return(<>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.25rem",flexWrap:"wrap",gap:".5rem"}}>
      <div className="filt-row">{["all","urgent","pending","confirmed","closed"].map(f=><button key={f} className={`filt-btn${filter===f?" on":""}`} onClick={()=>setFilter(f)}>{f==="all"?`全部 (${proj.pendings.length})`:PDS[f].l}{f==="urgent"&&uc>0?` ·${uc}`:""}</button>)}</div>
      <button className="add-btn" onClick={()=>openModal("pend")}>＋ 新增</button>
    </div>
    {filtered.length===0?<Empty icon="—" text="無待確認事項"/>:
    filtered.map(pd=>{const c=PDS[pd.status];return(
      <div key={pd.id} className={`pd-item${pd.status==="urgent"?" urg":""}`}>
        <div className="pd-hd"><div className="pd-title">{pd.title}</div>
          <div style={{display:"flex",gap:".4rem",alignItems:"center"}}>
            <select className="pd-sel" value={pd.status} onChange={e=>updPd(pd.id,{status:e.target.value})} style={{color:c.color}}>{Object.entries(PDS).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}</select>
            <DelX onClick={()=>delPd(pd.id)}/>
          </div>
        </div>
        {pd.note&&<div className="pd-note">{pd.note}</div>}
        {pd.date&&<div className="pd-date">{fmtD(pd.date)}</div>}
      </div>);})}
  </>);
}

/* ── FinanceTab ── */
function FinanceTab({proj,upd,openModal}){
  const [sub,setSub]=useState("income");
  const togSt=id=>upd(p=>({...p,finances:p.finances.map(f=>f.id===id?{...f,status:f.status==="paid"?"unpaid":"paid"}:f)}));
  const delFin=id=>upd(p=>({...p,finances:p.finances.filter(f=>f.id!==id)}));
  const delEx=id=>upd(p=>({...p,extras:p.extras.filter(e=>e.id!==id)}));
  const inc=proj.finances.filter(f=>f.type==="income"),exp=proj.finances.filter(f=>f.type==="expense");
  const totalIn=inc.reduce((a,f)=>a+Number(f.amt),0),paidIn=inc.filter(f=>f.status==="paid").reduce((a,f)=>a+Number(f.amt),0),unpaidIn=inc.filter(f=>f.status==="unpaid").reduce((a,f)=>a+Number(f.amt),0),totalEx=exp.reduce((a,f)=>a+Number(f.amt),0),exTot=proj.extras.reduce((a,e)=>a+Number(e.amt),0);
  const rl=(items,type)=>items.length===0?<Empty icon="—" text={type==="income"?"尚無收款項目":"尚無支出記錄"}/>:
    items.map(f=><div key={f.id} className="fin-item">
      <div className="fin-info"><div className="fin-name">{f.name}</div><div className="fin-date">{fmtD(f.date)}{f.note?` · ${f.note}`:""}</div></div>
      <div className="fin-r">
        <div className={`fin-amt ${type==="income"?"fin-in":"fin-ex"}`}>{type==="income"?"+":"-"} NT${fmtN(f.amt)}</div>
        <button className="fin-st" onClick={()=>togSt(f.id)}>{f.status==="paid"?"已收付":"待收付"}</button>
      </div>
      <DelX onClick={()=>delFin(f.id)}/>
    </div>);
  return(<>
    <div className="fin-stats">
      <div className="fin-stat"><div className="fin-stat-l">合約總收款</div><div className="fin-stat-v" style={{color:"var(--done-c)"}}>NT${fmtN(totalIn)}</div></div>
      <div className="fin-stat"><div className="fin-stat-l">待收款</div><div className="fin-stat-v" style={{color:"var(--t2)"}}>NT${fmtN(unpaidIn)}</div></div>
      <div className="fin-stat"><div className="fin-stat-l">已收款</div><div className="fin-stat-v" style={{color:"var(--t1)"}}>NT${fmtN(paidIn)}</div></div>
      <div className="fin-stat"><div className="fin-stat-l">支出合計</div><div className="fin-stat-v" style={{color:"var(--red-c)"}}>NT${fmtN(totalEx)}</div></div>
    </div>
    <div className="fin-toggle"><button className={`fin-tab${sub==="income"?" on":""}`} onClick={()=>setSub("income")}>收款</button><button className={`fin-tab${sub==="expense"?" on":""}`} onClick={()=>setSub("expense")}>支出</button><button className={`fin-tab${sub==="extras"?" on":""}`} onClick={()=>setSub("extras")}>追加單</button></div>
    {sub==="income"&&<><div style={{display:"flex",justifyContent:"flex-end",marginBottom:".75rem"}}><button className="add-btn" onClick={()=>openModal("finIncome")}>＋ 新增</button></div><div className="card">{rl(inc,"income")}</div></>}
    {sub==="expense"&&<><div style={{display:"flex",justifyContent:"flex-end",marginBottom:".75rem"}}><button className="add-btn" onClick={()=>openModal("finExpense")}>＋ 新增</button></div><div className="card">{rl(exp,"expense")}</div></>}
    {sub==="extras"&&<><div style={{display:"flex",justifyContent:"flex-end",marginBottom:".75rem"}}><button className="add-btn" onClick={()=>openModal("extra")}>＋ 新增</button></div>
      <div className="card">{proj.extras.length===0?<Empty icon="—" text="尚無追加項目"/>:
        proj.extras.map(e=><div key={e.id} className="fin-item">
          <div className="fin-info"><div className="fin-name">{e.title}</div><div className="fin-date">{fmtD(e.date)}{e.note?` · ${e.note}`:""}</div></div>
          <div className="fin-amt" style={{color:"var(--t2)"}}>NT${fmtN(e.amt)}</div>
          <DelX onClick={()=>delEx(e.id)}/>
        </div>)}
        {proj.extras.length>0&&<div className="extra-total"><div className="extra-total-l">追加總計</div><div className="extra-total-v">NT${fmtN(exTot)}</div></div>}
      </div>
    </>}
  </>);
}

/* ── TimelineTab ── */
function TimelineTab({proj,upd,openModal}){
  const [filter,setFilter]=useState("all");
  const delTl=id=>upd(p=>({...p,timelines:p.timelines.filter(t=>t.id!==id)}));
  const sorted=[...proj.timelines].sort((a,b)=>b.date.localeCompare(a.date));
  const filtered=filter==="all"?sorted:sorted.filter(t=>t.type===filter);
  return(<>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.25rem",flexWrap:"wrap",gap:".5rem"}}>
      <div className="filt-row">{["all","site","meet"].map(f=><button key={f} className={`filt-btn${filter===f?" on":""}`} onClick={()=>setFilter(f)}>{f==="all"?"全部":TLT[f].l}</button>)}</div>
      <button className="add-btn" onClick={()=>openModal("tl")}>＋ 新增</button>
    </div>
    {filtered.length===0?<Empty icon="—" text="尚無紀錄"/>:
    filtered.map(tl=>{const c=TLT[tl.type];return(
      <div key={tl.id} className="tl-item">
        <div className="tl-icon" style={{background:c.bg,color:c.color}}>{c.icon}</div>
        <div className="tl-body"><div className="tl-title">{tl.title}</div><div className="tl-date">{fmtD(tl.date)}</div>{tl.note&&<div className="tl-note">{tl.note}</div>}</div>
        <span className="tl-tag">{c.l}</span>
        <DelX onClick={()=>delTl(tl.id)}/>
      </div>);})}
  </>);
}

/* ── CalendarTab ── */
function CalendarTab({proj,calYM,setCalYM}){
  const {y,m}=calYM,first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),cells=[];
  for(let i=0;i<first;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);
  const td=todayISO(),prefix=`${y}-${String(m+1).padStart(2,"0")}`;
  const evs=proj.milestones.flatMap(ms=>{const a=[];if(ms.start?.startsWith(prefix))a.push({date:ms.start,title:ms.title});if(ms.end?.startsWith(prefix))a.push({date:ms.end,title:ms.title+"（結）"});return a;});
  return(<>
    <div className="cal-nav-row">
      <button className="cal-nav-btn" onClick={()=>setCalYM(({y,m})=>m===0?{y:y-1,m:11}:{y,m:m-1})}>← 上月</button>
      <span className="cal-month-lbl">{y} 年 {MONTHS[m]}</span>
      <button className="cal-nav-btn" onClick={()=>setCalYM(({y,m})=>m===11?{y:y+1,m:0}:{y,m:m+1})}>下月 →</button>
    </div>
    <div className="cal-grid">
      {WDAYS.map(w=><div key={w} className="cal-dow">{w}</div>)}
      {cells.map((d,i)=>{if(!d)return<div key={"_"+i} className="cal-cell empty"/>;const ds=`${prefix}-${String(d).padStart(2,"0")}`,isT=ds===td,dayEvs=evs.filter(e=>e.date===ds);return(
        <div key={d} className={`cal-cell${isT?" today":""}`}>
          <div className="cal-day"><span className={isT?"cal-day tod":""}>{d}</span></div>
          {dayEvs.map((ev,j)=><div key={j} className="cal-ev">{ev.title}</div>)}
        </div>);})}
    </div>
  </>);
}

function ItemModal({type,close,updP}){
  const cfg=MC[type];
  const [form,setForm]=useState({...(cfg?.defs||{})});
  const F=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  if(!cfg)return null;
  return(<div className="overlay" onClick={e=>e.target===e.currentTarget&&close()}><div className="modal">
    <h3>{cfg.title}</h3>
    {cfg.fields.map(f=><div key={f.k}><label>{f.l}</label>
      {f.type==="select"?<select value={form[f.k]??""} onChange={F(f.k)}>{f.opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>:
       f.type==="textarea"?<textarea value={form[f.k]??""} onChange={F(f.k)} placeholder={f.ph||""}/>:

  </div></div>);
}

/* ── App ── */
function App(){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [pid,setPid]=useState(null);
  const [tab,setTab]=useState("overview");
  const [showAllCal,setShowAllCal]=useState(false);
  const [modal,setModal]=useState(null);
  const [syncOk,setSyncOk]=useState(false);
  const [calYM,setCalYM]=useState({y:new Date().getFullYear(),m:new Date().getMonth()});
  const [delTarget,setDelTarget]=useState(null);
  const [sbOpen,setSbOpen]=useState(false);

  useEffect(()=>{
    loadData().then(d=>{setData(d);if(d.projects.length>0)setPid(d.projects[0].id);setLoading(false);});
  },[]);

  const upd=useCallback(fn=>{setData(prev=>{const next=fn(prev);saveData(next).then(()=>{setSyncOk(true);setTimeout(()=>setSyncOk(false),2500);});return next;});},[ ]);
  const updP=useCallback((pid,fn)=>{upd(d=>({...d,projects:d.projects.map(p=>p.id===pid?fn(p):p)}));},[upd]);
  const proj=data?.projects.find(p=>p.id===pid)||null;
  const openModal=useCallback((type)=>setModal({type,pid}),[pid]);
  const closeModal=useCallback(()=>setModal(null),[]);
  const updProj=useCallback((fn)=>{if(pid)updP(pid,fn);},[pid,updP]);
  const handleDeleted=useCallback((deletedId)=>{setData(curr=>{const r=curr.projects.filter(p=>p.id!==deletedId);setPid(r.length>0?r[0].id:null);setTab("overview");setShowAllCal(false);return curr;});},[ ]);
  const handleCreated=useCallback((newId)=>{setPid(newId);setTab("overview");setShowAllCal(false);},[]);
  const selectProj=useCallback((id)=>{setPid(id);setTab("overview");setShowAllCal(false);setSbOpen(false);},[]);

  if(loading)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0C0C0C",fontFamily:"'DM Mono',monospace",fontSize:".72rem",color:"#444",flexDirection:"column",gap:"1rem"}}><div style={{fontSize:"1.5rem",letterSpacing:".2em",opacity:.2}}>ID STUDIO</div>載入中</div>);

  const dateParts=new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit"}).replace(/\//g,".");

  return(<>
    <style>{CSS}</style>
    {modal?.type==="newProj"&&<NewProjModal close={closeModal} upd={upd} onCreated={handleCreated}/>}
    {modal?.type==="editProj"&&proj&&<EditProjModal proj={proj} close={closeModal} upd={fn=>updP(pid,fn)}/>}
    {modal&&!["newProj","editProj"].includes(modal.type)&&<ItemModal type={modal.type} close={closeModal} updP={updProj}/>}
    {delTarget&&<DelProjModal proj={delTarget} close={()=>setDelTarget(null)} upd={upd} onDeleted={handleDeleted}/>}
    <div className={`sb-overlay${sbOpen?" show":""}`} onClick={()=>setSbOpen(false)}/>

    {/* Header */}
    <header className="hdr">
      <div className="hdr-l">
        <button className="menu-btn" onClick={()=>setSbOpen(v=>!v)}>☰</button>
        <span className="hdr-wordmark">ID Studio</span>
        <div className="hdr-div"/>
        <span className="hdr-proj" onClick={()=>setSbOpen(v=>!v)}>
          {showAllCal?"總合行事曆":proj?proj.name:"— 選擇案件"}
        </span>
      </div>
      <div className="hdr-r">
        <div className={`sync-dot${syncOk?" on":""}`} title={syncOk?"已儲存":""}/>
        <span className="hdr-date">{dateParts}</span>
        <button className="hdr-icon-btn" onClick={()=>{setShowAllCal(v=>!v);setSbOpen(false);}}>{showAllCal?"返回案件":"行事曆"}</button>
      </div>
    </header>

    <div className="workspace">
      {/* Sidebar */}
      <aside className={`sidebar${sbOpen?" open":""}`}>
        <button className="sb-close-btn" onClick={()=>setSbOpen(false)}>✕ 關閉</button>
        <div className="sb-sec">Cases</div>
        {data.projects.map(p=>{
          const pct=Math.round(p.milestones.filter(m=>m.status==="done").length/Math.max(p.milestones.length,1)*100);
          return(<div key={p.id} className={`sb-item${pid===p.id&&!showAllCal?" on":""}`} onClick={()=>selectProj(p.id)}>
            <span className="sb-dot" style={{background:p.color}}/>
            <div className="sb-info">
              <div className="sb-name">{p.name}</div>
              <div className="sb-sub">{p.owner} · {STAGE_L[p.stage]}</div>
              <div className="sb-bar"><div className="sb-fill" style={{width:pct+"%"}}/></div>
            </div>
          </div>);})}
        <hr className="sb-sep"/>
        <div className={`sb-item${showAllCal?" on":""}`} onClick={()=>{setShowAllCal(true);setSbOpen(false);}}>
          <span style={{fontSize:".8rem",color:"var(--t3)"}}>◎</span>
          <div className="sb-info"><div className="sb-name">總合行事曆</div><div className="sb-sub">All Projects</div></div>
        </div>
        <hr className="sb-sep"/>
        {proj&&!showAllCal&&<div style={{padding:".2rem .4rem"}}><button className="del-btn-sm" onClick={()=>{setDelTarget(proj);setSbOpen(false);}}>刪除此案件</button></div>}
        <button className="sb-add" onClick={()=>{setModal({type:"newProj",pid:null});setSbOpen(false);}}>＋ 新增案件</button>
      </aside>

      {/* Main */}
      <main className="main">
        {data.projects.length===0?(
          <div style={{textAlign:"center",paddingTop:"6rem"}}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:"1rem",letterSpacing:".2em",opacity:.15,marginBottom:"2rem"}}>ID STUDIO</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"2.2rem",fontWeight:300,marginBottom:".5rem",color:"var(--t1)"}}>尚無任何案件</div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:".65rem",color:"var(--t3)",marginBottom:"1.5rem"}}>點擊下方按鈕建立第一個設計案件</div>
            <button className="btn-solid" onClick={()=>setModal({type:"newProj",pid:null})} style={{padding:".7rem 2rem"}}>＋ 新增案件</button>
          </div>
        ):showAllCal?(
          <AllCalendar data={data} calYM={calYM} setCalYM={setCalYM}/>
        ):proj?(
          <ProjectPanel proj={proj} tab={tab} setTab={setTab} upd={updProj} openModal={openModal} calYM={calYM} setCalYM={setCalYM}/>
        ):(
          <div style={{textAlign:"center",paddingTop:"5rem",color:"var(--t3)",fontFamily:"'DM Mono',monospace",fontSize:".68rem"}}>← 請從左側選擇案件</div>
        )}
      </main>
    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
