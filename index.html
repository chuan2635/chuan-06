function solarToLunar(dateStr){
  const target=new Date(dateStr+"T00:00:00");
  const all=[];
  for(const yr of LUNAR_YEARS){
    for(let i=0;i<yr.starts.length;i++){
      all.push({d:new Date(yr.starts[i]+"T00:00:00"),name:yr.names[i]});
    }
  }
  all.sort((a,b)=>a.d-b.d);
  let best=null;
  for(const m of all){
    if(m.d<=target){
      const dayIdx=Math.floor((target-m.d)/86400000);
      if(dayIdx<=29){best={m:m.name,d:LUNAR_DAY_NAMES[dayIdx],isFirst:dayIdx===0};}
      else best=null;
    }
  }
  return best;
}

/* ── CSV 匯出 ── */
function exportCSV(proj){
  const BOM="\uFEFF";
  const h=["類型","項目名稱","分類","金額(NT$)","狀態","日期","備註"];
  const rows=proj.finances.map(f=>[f.type==="income"?"收款":"支出",f.name,f.cat||"",f.amt,f.status==="paid"?"已完成":"待處理",f.date,f.note||""]);
  const csv=BOM+[h,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download=`${proj.name}_財務_${todayISO()}.csv`;a.click();
}

`;

const Tag=({cfg,children})=><span style={{fontFamily:"'DM Mono',monospace",fontSize:".6rem",padding:".18rem .48rem",borderRadius:6,...cfg}}>{children}</span>;
const DelX=({onClick})=><button className="del-x" onClick={e=>{e.stopPropagation();onClick();}}>✕</button>;
const Empty=({icon,text})=><div className="empty"><span className="empty-icon">{icon||"○"}</span><div className="empty-txt">{text}</div></div>;

/* ── 行事曆輔助：取得某日的事件 ── */
function getDayEvents(dateStr, proj, allProjects){
  const events={milestones:[],todos:[],pendings:[]};
  const projects=proj?[proj]:allProjects||[];
  for(const p of projects){
    for(const ms of p.milestones){
      const s=ms.start, e=ms.end||ms.start;
      if(dateStr>=s&&dateStr<=e){
        const pos=s===e?"solo":dateStr===s?"start":dateStr===e?"end":"mid";
        events.milestones.push({...ms,pos,projColor:p.color});
      }
    }
    for(const t of p.todos){
      if(t.due===dateStr) events.todos.push(t);
    }
    for(const pd of p.pendings){
      if(pd.date===dateStr) events.pendings.push(pd);
    }
  }
  return events;
}

/* ── CalCell ── */
function CalCell({d,prefix,isToday,dow,proj,allProjects}){
  const ds=`${prefix}-${String(d).padStart(2,"0")}`;
  const isWeekend=dow===0||dow===6;
  const holiday=TW_HOLIDAYS[ds];
  const lunar=solarToLunar(ds);
  const evts=getDayEvents(ds,proj,allProjects);
  const classN=["cal-cell",isToday?"today":"",holiday?"holiday-cell":"",isWeekend&&!holiday?"weekend-cell":""].filter(Boolean).join(" ");
  return(
    <div className={classN}>
      <div className="cal-top-row">
        <span className={["cal-day-n",isWeekend?"weekend":"",isToday?"today-n":""].filter(Boolean).join(" ")}>{d}</span>
        {lunar&&<span className={["cal-lunar-lbl",lunar.isFirst?"first":""].filter(Boolean).join(" ")}>{lunar.isFirst?`${lunar.m}月`:lunar.d}</span>}
      </div>
      {holiday&&<div className="cal-holiday-lbl">{holiday}</div>}
      {evts.milestones.slice(0,2).map((ms,i)=>{
        const c=MSS[ms.status].dot;
        const showTitle=ms.pos==="start"||ms.pos==="solo";
        return(<div key={i} className={`cal-ms-bar ms-${ms.pos}`} style={{background:c+"22",color:c,borderLeft:ms.pos==="start"||ms.pos==="solo"?`2px solid ${c}`:""}}>
          {showTitle&&<span style={{overflow:"hidden",textOverflow:"ellipsis"}}>{ms.title}</span>}
        </div>);
      })}
      {(evts.todos.length>0||evts.pendings.length>0)&&(
        <div className="cal-dots">
          {evts.todos.slice(0,3).map((t,i)=><span key={i} className="cal-dot" style={{background:t.done?"#3A6B4A":"#8B6914"}} title={t.text}/>)}
          {evts.pendings.slice(0,2).map((p,i)=><span key={i} className="cal-dot" style={{background:p.status==="urgent"?"#8B3A3A":"#888"}} title={p.title}/>)}
        </div>
      )}
    </div>
  );
}

/* ── CalGrid ── */
function CalGrid({calYM,setCalYM,proj,allProjects,legend}){
  const {y,m}=calYM;
  const first=new Date(y,m,1).getDay();
  const dim=new Date(y,m+1,0).getDate();
  const cells=[];for(let i=0;i<first;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);
  const td=todayISO();
  const prefix=`${y}-${String(m+1).padStart(2,"0")}`;
  return(<div className="cal-wrapper">
    <div className="cal-nav-row">
      <button className="cal-nav-btn" onClick={()=>setCalYM(({y,m})=>m===0?{y:y-1,m:11}:{y,m:m-1})}>← 上月</button>
      <span className="cal-m-lbl">{y} 年 {MONTHS[m]}</span>
      <button className="cal-nav-btn" onClick={()=>setCalYM(({y,m})=>m===11?{y:y+1,m:0}:{y,m:m+1})}>下月 →</button>
    </div>
    {legend&&<div className="cal-legend">
      <div className="cal-legend-item"><span className="cal-legend-dot" style={{background:"#3A6B4A"}}/><span>已完成里程碑</span></div>
      <div className="cal-legend-item"><span className="cal-legend-dot" style={{background:"#8B6914"}}/><span>進行中里程碑</span></div>
      <div className="cal-legend-item"><span className="cal-legend-dot" style={{background:"#BBB"}}/><span>待進行里程碑</span></div>
      <div className="cal-legend-item"><span className="cal-legend-dot" style={{background:"#8B6914"}}/><span>待辦截止</span></div>
      <div className="cal-legend-item"><span className="cal-legend-dot" style={{background:"#8B3A3A"}}/><span>緊急待確認</span></div>
      <div className="cal-legend-item"><span style={{width:16,height:8,background:"#FFFBFB",border:"1px solid #8B3A3A44",borderRadius:2,display:"inline-block"}}/><span>國定假日</span></div>
    </div>}
    <div className="cal-grid">
      {WDAYS.map((w,i)=><div key={w} className="cal-dow" style={i===0||i===6?{color:"var(--red)"}:{}}>{w}</div>)}
      {cells.map((d,i)=>{
        if(!d)return<div key={"_"+i} className="cal-cell empty"/>;
        const ds=`${prefix}-${String(d).padStart(2,"0")}`;
        const dow=(first+d-1)%7;
        return<CalCell key={d} d={d} prefix={prefix} isToday={ds===td} dow={dow} proj={proj} allProjects={allProjects}/>;
      })}
    </div>
  </div>);
}

/* ── OverviewTab ── */
function OverviewTab({proj,upd,openModal}){
  const done=proj.milestones.filter(m=>m.status==="done").length,total=proj.milestones.length,pct=total?Math.round(done/total*100):0,stIdx=STAGES.indexOf(proj.stage);
  const updMs=(id,ch)=>upd(p=>({...p,milestones:p.milestones.map(m=>m.id===id?{...m,...ch}:m)}));
  const delMs=id=>upd(p=>({...p,milestones:p.milestones.filter(m=>m.id!==id)}));
  const togTodo=id=>upd(p=>({...p,todos:p.todos.map(t=>t.id===id?{...t,done:!t.done}:t)}));
  const delTodo=id=>upd(p=>({...p,todos:p.todos.filter(t=>t.id!==id)}));
  const delComm=id=>upd(p=>({...p,comms:(p.comms||[]).filter(c=>c.id!==id)}));
  return(<>
    <div className="prog-card full" style={{marginBottom:"1rem"}}>
      <div className="prog-top">
        <div>
          <span className="prog-num">{pct}</span><span className="prog-unit">%</span>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:".65rem",color:"rgba(255,255,255,.4)",marginTop:".3rem"}}>{done} / {total} 里程碑完成</div>
        </div>
        <select value={proj.stage} onChange={e=>upd(p=>({...p,stage:e.target.value}))} style={{fontFamily:"'DM Mono',monospace",fontSize:".62rem",border:"1px solid rgba(255,255,255,.15)",borderRadius:6,padding:".22rem .65rem",background:"rgba(255,255,255,.08)",color:"rgba(255,255,255,.6)",cursor:"pointer",outline:"none"}}>
          {STAGES.map(s=><option key={s} value={s}>{STAGE_L[s]}</option>)}
        </select>
      </div>
      <div className="stage-row">{STAGES.map((s,i)=><div key={s} className={`stage-step${i<stIdx?" done-s":i===stIdx?" curr-s":""}`} onClick={()=>upd(p=>({...p,stage:s}))}>{STAGE_L[s]}</div>)}</div>
      <div className="prog-track"><div className="prog-fill-bar" style={{width:pct+"%"}}/></div>
    </div>
    <div className="grid2">
      <div className="card">
        <div className="card-hd">里程碑<button className="add-btn" onClick={()=>openModal("ms")}>＋ 新增</button></div>
        {proj.milestones.length===0?<Empty text="尚無里程碑"/>:
        <ul className="ms-list">{proj.milestones.map(m=>{const c=MSS[m.status];return(
          <li key={m.id} className="ms-item">
            <div className="ms-dot-w"><div className="ms-dot" style={{borderColor:c.dot,background:m.status==="done"?c.dot:"transparent"}}/></div>
            <div className="ms-body"><div className="ms-title">{m.title}</div><div className="ms-dates">{fmtD(m.start)}{m.end?` → ${fmtD(m.end)}`:""}</div></div>
            <div className="ms-r">
              <select className="ms-sel" value={m.status} onChange={e=>updMs(m.id,{status:e.target.value})} style={c.tag}>{Object.entries(MSS).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}</select>
              <Tag cfg={PRC[m.prio]}>{PRC[m.prio].l}</Tag><DelX onClick={()=>delMs(m.id)}/>
            </div>
          </li>);})}</ul>}
      </div>
      <div className="card">
        <div className="card-hd">待辦事項<button className="add-btn" onClick={()=>openModal("todo")}>＋ 新增</button></div>
        {proj.todos.length===0?<Empty text="尚無待辦事項"/>:
        proj.todos.map(t=>{const over=t.due&&!t.done&&t.due<todayISO();return(
          <div key={t.id} className="todo-item">
            <div className="todo-row">
              <button className={`chk${t.done?" on":""}`} onClick={()=>togTodo(t.id)}>{t.done?"✓":""}</button>
              <div style={{flex:1,minWidth:0}}>
                <div className={`todo-txt${t.done?" todo-done":""}`}>{t.text}</div>
                <div className="todo-meta">{t.due&&<span className={`todo-due${over?" ov":""}`}>{fmtD(t.due)}</span>}<Tag cfg={PRC[t.prio]}>{PRC[t.prio].l}</Tag></div>
                {t.note&&<div className="todo-note">{t.note}</div>}
              </div>
              <DelX onClick={()=>delTodo(t.id)}/>
            </div>
          </div>);})}
      </div>
      <div className="card full">
        <div className="card-hd">溝通記錄<button className="add-btn" onClick={()=>openModal("comm")}>＋ 新增</button></div>
        {(proj.comms||[]).length===0?<Empty text="尚無溝通記錄"/>:
        (proj.comms||[]).map(c=><div key={c.id} className="comm-item">
          <div className="comm-hd"><div className="comm-who">{c.who}</div><div className="comm-r"><span className="comm-when">{fmtD(c.date)}</span><DelX onClick={()=>delComm(c.id)}/></div></div>
          <div className="comm-note">{c.note}</div><span className="comm-ch">{c.ch}</span>
        </div>)}
      </div>
    </div>
  </>);
}

function PendingTab({proj,upd,openModal}){
  const [filter,setFilter]=useState("all");
  const updPd=(id,ch)=>upd(p=>({...p,pendings:p.pendings.map(x=>x.id===id?{...x,...ch}:x)}));
  const delPd=id=>upd(p=>({...p,pendings:p.pendings.filter(x=>x.id!==id)}));
  const filtered=filter==="all"?proj.pendings:proj.pendings.filter(x=>x.status===filter);
  const uc=proj.pendings.filter(x=>x.status==="urgent").length;
  return(<>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.3rem",flexWrap:"wrap",gap:".5rem"}}>
      <div className="filt-row">{["all","urgent","pending","confirmed","closed"].map(f=><button key={f} className={`filt-btn${filter===f?" on":""}`} onClick={()=>setFilter(f)}>{f==="all"?`全部 (${proj.pendings.length})`:PDS[f].l}{f==="urgent"&&uc>0?` · ${uc}`:""}</button>)}</div>
      <button className="add-btn" onClick={()=>openModal("pend")}>＋ 新增</button>
    </div>
    {filtered.length===0?<Empty text="無待確認事項"/>:
    filtered.map(pd=>{const c=PDS[pd.status];return(
      <div key={pd.id} className={`pd-item${pd.status==="urgent"?" urg":""}`}>
        <div className="pd-hd"><div className="pd-title">{pd.title}</div>
          <div style={{display:"flex",gap:".4rem",alignItems:"center"}}>
            <select className="pd-sel" value={pd.status} onChange={e=>updPd(pd.id,{status:e.target.value})} style={{color:c.color,background:c.bg}}>{Object.entries(PDS).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}</select>
            <DelX onClick={()=>delPd(pd.id)}/>
          </div>
        </div>
        {pd.note&&<div className="pd-note">{pd.note}</div>}
        {pd.date&&<div className="pd-date">{fmtD(pd.date)}</div>}
      </div>);})}
  </>);
}

function FinanceTab({proj,upd,openModal}){
  const [sub,setSub]=useState("income");
  const togSt=id=>upd(p=>({...p,finances:p.finances.map(f=>f.id===id?{...f,status:f.status==="paid"?"unpaid":"paid"}:f)}));
  const delFin=id=>upd(p=>({...p,finances:p.finances.filter(f=>f.id!==id)}));
  const delEx=id=>upd(p=>({...p,extras:p.extras.filter(e=>e.id!==id)}));
  const inc=proj.finances.filter(f=>f.type==="income"),exp=proj.finances.filter(f=>f.type==="expense");
  const contractAmt=Number(proj.contractAmt||0);
  const totalInvoiced=inc.reduce((a,f)=>a+Number(f.amt),0);
  const collected=inc.filter(f=>f.status==="paid").reduce((a,f)=>a+Number(f.amt),0);
  const outstanding=inc.filter(f=>f.status==="unpaid").reduce((a,f)=>a+Number(f.amt),0);
  const totalExp=exp.reduce((a,f)=>a+Number(f.amt),0);
  const exTot=proj.extras.reduce((a,e)=>a+Number(e.amt),0);
  const unbilled=contractAmt-totalInvoiced;
  const grossProfit=collected-totalExp;
  const invoicePct=contractAmt>0?Math.min(100,Math.round(totalInvoiced/contractAmt*100)):0;
  const collectPct=contractAmt>0?Math.min(100,Math.round(collected/contractAmt*100)):0;

  const rl=(items,type)=>items.length===0?<Empty text={type==="income"?"尚無收款項目":"尚無支出記錄"}/>:
    items.map(f=><div key={f.id} className="fin-item">
      <div className="fin-info"><div className="fin-name">{f.name}</div><div className="fin-date">{fmtD(f.date)}{f.cat?` · ${f.cat}`:""}{f.note?` · ${f.note}`:""}</div></div>
      <div className="fin-r">
        <div className={`fin-amt ${type==="income"?"fin-in":"fin-ex"}`}>{type==="income"?"+":"-"} NT${fmtN(f.amt)}</div>
        <button className="fin-st" onClick={()=>togSt(f.id)}>{f.status==="paid"?"已完成":"待處理"}</button>
      </div>
      <DelX onClick={()=>delFin(f.id)}/>
    </div>);

  return(<>
    {/* Financial Health Card */}
    <div className="fin-health">
      <div className="fin-health-title">財務概況 — Financial Health</div>
      <div className="fin-h-grid">
        <div className="fin-h-stat">
          <div className="fin-h-l">合約金額</div>
          <div className="fin-h-v" style={{color:"#FFF"}}>{contractAmt?`NT$${fmtN(contractAmt)}`:<span style={{fontSize:".75rem",color:"rgba(255,255,255,.3)"}}>未設定</span>}</div>
        </div>
        <div className="fin-h-stat">
          <div className="fin-h-l">已請款</div>
          <div className="fin-h-v" style={{color:"rgba(255,255,255,.8)"}}>NT${fmtN(totalInvoiced)}</div>
        </div>
        <div className="fin-h-stat">
          <div className="fin-h-l">已收款</div>
          <div className="fin-h-v" style={{color:"#80C880"}}>NT${fmtN(collected)}</div>
        </div>
        <div className="fin-h-stat">
          <div className="fin-h-l">待收款</div>
          <div className="fin-h-v" style={{color:"#E0C880"}}>NT${fmtN(outstanding)}</div>
        </div>
        <div className="fin-h-stat">
          <div className="fin-h-l">未請款</div>
          <div className="fin-h-v" style={{color:"rgba(255,255,255,.5)"}}>NT${fmtN(Math.max(0,unbilled))}</div>
        </div>
        <div className="fin-h-stat">
          <div className="fin-h-l">毛利 (已收-支出)</div>
          <div className="fin-h-v" style={{color:grossProfit>=0?"#80C880":"#E08080"}}>NT${fmtN(grossProfit)}</div>
        </div>
      </div>
      {contractAmt>0&&<>
        <div className="fin-progress-track">
          <div className="fin-progress-fill" style={{width:invoicePct+"%",background:"rgba(255,255,255,.35)"}}/>
        </div>
        <div style={{height:4}}/>
        <div className="fin-progress-track">
          <div className="fin-progress-fill" style={{width:collectPct+"%",background:"#80C880"}}/>
        </div>
        <div className="fin-progress-labels" style={{marginTop:".4rem"}}>
          <span>請款率 {invoicePct}%</span><span>收款率 {collectPct}%</span>
        </div>
      </>}
    </div>

    <div className="fin-actions">
      <div className="fin-toggle">
        <button className={`fin-tab${sub==="income"?" on":""}`} onClick={()=>setSub("income")}>收款項目</button>
        <button className={`fin-tab${sub==="expense"?" on":""}`} onClick={()=>setSub("expense")}>支出項目</button>
        <button className={`fin-tab${sub==="extras"?" on":""}`} onClick={()=>setSub("extras")}>追加單</button>
      </div>
      <button className="csv-btn" onClick={()=>exportCSV(proj)}>↓ CSV</button>
    </div>

    {sub==="income"&&<><div style={{display:"flex",justifyContent:"flex-end",marginBottom:".75rem"}}><button className="add-btn" onClick={()=>openModal("finIncome")}>＋ 新增</button></div><div className="card">{rl(inc,"income")}</div></>}
    {sub==="expense"&&<><div style={{display:"flex",justifyContent:"flex-end",marginBottom:".75rem"}}><button className="add-btn" onClick={()=>openModal("finExpense")}>＋ 新增</button></div><div className="card">{rl(exp,"expense")}</div></>}
    {sub==="extras"&&<><div style={{display:"flex",justifyContent:"flex-end",marginBottom:".75rem"}}><button className="add-btn" onClick={()=>openModal("extra")}>＋ 新增</button></div>
      <div className="card">{proj.extras.length===0?<Empty text="尚無追加項目"/>:
        proj.extras.map(e=><div key={e.id} className="fin-item">
          <div className="fin-info"><div className="fin-name">{e.title}</div><div className="fin-date">{fmtD(e.date)}{e.note?` · ${e.note}`:""}</div></div>
          <div className="fin-amt" style={{color:"var(--t2)"}}>NT${fmtN(e.amt)}</div>
          <DelX onClick={()=>delEx(e.id)}/>
        </div>)}
        {proj.extras.length>0&&<div className="extra-total"><div className="extra-total-l">追加總計</div><div className="extra-total-v">NT${fmtN(exTot)}</div></div>}
      </div>
    </>}
  </>);
}

function TimelineTab({proj,upd,openModal}){
  const [filter,setFilter]=useState("all");
  const delTl=id=>upd(p=>({...p,timelines:p.timelines.filter(t=>t.id!==id)}));
  const sorted=[...proj.timelines].sort((a,b)=>b.date.localeCompare(a.date));
  const filtered=filter==="all"?sorted:sorted.filter(t=>t.type===filter);
  return(<>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.3rem",flexWrap:"wrap",gap:".5rem"}}>
      <div className="filt-row">{["all","site","meet"].map(f=><button key={f} className={`filt-btn${filter===f?" on":""}`} onClick={()=>setFilter(f)}>{f==="all"?"全部":TLT[f].l}</button>)}</div>
      <button className="add-btn" onClick={()=>openModal("tl")}>＋ 新增</button>
    </div>
    {filtered.length===0?<Empty text="尚無紀錄"/>:
    filtered.map(tl=>{const c=TLT[tl.type];return(
      <div key={tl.id} className="tl-item">
        <div className="tl-icon">{c.icon}</div>
        <div className="tl-body"><div className="tl-title">{tl.title}</div><div className="tl-date">{fmtD(tl.date)}</div>{tl.note&&<div className="tl-note">{tl.note}</div>}</div>
        <span className="tl-tag">{c.l}</span><DelX onClick={()=>delTl(tl.id)}/>
      </div>);})}
  </>);
}

function MobileNav({tab,setTab,pendCount}){
  const items=[{id:"overview",l:"概覽",icon:"⊞"},{id:"timeline",l:"時間軸",icon:"≡"},{id:"pending",l:"待確認",icon:"◎",badge:pendCount},{id:"finance",l:"財務",icon:"◇"},{id:"cal",l:"行事曆",icon:"▦"}];
  return(<nav className="mobile-nav">{items.map(it=>(<button key={it.id} className={`mn-btn${tab===it.id?" on":""}`} onClick={()=>setTab(it.id)}>
    <span className="mn-icon">{it.icon}</span>
    {it.badge>0&&<span className="mn-badge">{it.badge}</span>}
    <span className="mn-label">{it.l}</span>
  </button>))}</nav>);
}

function ProjectPanel({proj,tab,setTab,upd,openModal,calYM,setCalYM}){
  const pendCount=proj.pendings.filter(p=>p.status==="urgent"||p.status==="pending").length;
  const TABS=[{id:"overview",l:"概覽"},{id:"timeline",l:"時間軸"},{id:"pending",l:`待確認${pendCount>0?` (${pendCount})`:""}`},{id:"finance",l:"財務"},{id:"cal",l:"行事曆"}];
  return(<>
    <div className="proj-hdr">
      <div className="proj-eyebrow"><span className="stage-badge">{STAGE_L[proj.stage]}</span></div>
      <div className="proj-title">{proj.name}</div>
      <div className="proj-meta-row">
        <span className="proj-meta">{proj.owner} · {proj.loc}</span>
        {proj.tel&&<span className="proj-meta">· {proj.tel}</span>}
        <button className="meta-btn" onClick={()=>openModal("editProj")}>編輯</button>
      </div>
    </div>
    <div className="tabs">{TABS.map(t=><button key={t.id} className={`tab-btn${tab===t.id?" on":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>)}</div>
    {tab==="overview"&&<OverviewTab proj={proj} upd={upd} openModal={openModal}/>}
    {tab==="timeline"&&<TimelineTab proj={proj} upd={upd} openModal={openModal}/>}
    {tab==="pending"&&<PendingTab proj={proj} upd={upd} openModal={openModal}/>}
    {tab==="finance"&&<FinanceTab proj={proj} upd={upd} openModal={openModal}/>}
    {tab==="cal"&&<CalGrid calYM={calYM} setCalYM={setCalYM} proj={proj} legend={true}/>}
    <MobileNav tab={tab} setTab={setTab} pendCount={pendCount}/>
  </>);
}

function AllCalendar({data,calYM,setCalYM}){
  return(<>
    <div className="proj-hdr">
      <div className="proj-title">總合行事曆</div>
      <div className="proj-meta-row">
        <span className="proj-meta">All Projects — 整合所有案件時程</span>
      </div>
      <div style={{display:"flex",gap:".4rem",flexWrap:"wrap",marginTop:".6rem"}}>
        {data.projects.map(p=><span key={p.id} style={{fontFamily:"'DM Mono',monospace",fontSize:".6rem",padding:".16rem .55rem",borderRadius:20,border:"1px solid rgba(0,0,0,.12)",color:p.color}}>{p.name}</span>)}
      </div>
    </div>
    <CalGrid calYM={calYM} setCalYM={setCalYM} allProjects={data.projects} legend={true}/>
  </>);
}

/* ── Modals ── */
function NewProjModal({close,upd,onCreated}){
  const [form,setForm]=useState({name:"",owner:"",loc:"",contact:"",tel:"",stage:"design",contractAmt:""});
  const [color,setColor]=useState(PCOLS[0]);
  const F=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const save=()=>{if(!form.name.trim())return;const np={id:uid(),...form,color,contractAmt:Number(form.contractAmt||0),milestones:[],todos:[],comms:[],pendings:[],finances:[],extras:[],timelines:[]};upd(d=>({...d,projects:[...d.projects,np]}));onCreated(np.id);close();};
  return(<div className="overlay" onClick={e=>e.target===e.currentTarget&&close()}><div className="modal">
    <h3>新增案件</h3>
    <label>案件名稱 *</label><input value={form.name} onChange={F("name")} placeholder="例：台北信義住宅裝修"/>
    <label>業主名稱</label><input value={form.owner} onChange={F("owner")} placeholder="業主 / 公司名稱"/>
    <label>地址 / 地點</label><input value={form.loc} onChange={F("loc")} placeholder="縣市區域"/>
    <label>聯絡電話</label><input value={form.tel} onChange={F("tel")} placeholder="0912-345-678"/>
    <label>合約總金額 (NT$)</label><input type="number" value={form.contractAmt} onChange={F("contractAmt")} placeholder="0"/>
    <label>目前階段</label><select value={form.stage} onChange={F("stage")}>{STAGES.map(s=><option key={s} value={s}>{STAGE_L[s]}</option>)}</select>
    <label>案件識別色</label><div className="swatches">{PCOLS.map(c=><div key={c} className={`swatch${c===color?" on":""}`} style={{background:c}} onClick={()=>setColor(c)}/>)}</div>
    <div className="modal-ft"><button className="btn-ghost" onClick={close}>取消</button><button className="btn-solid" onClick={save}>建立案件</button></div>
  </div></div>);
}

function EditProjModal({proj,close,upd}){
  const [form,setForm]=useState({name:proj.name,owner:proj.owner,loc:proj.loc,contact:proj.contact||"",tel:proj.tel||"",stage:proj.stage,contractAmt:proj.contractAmt||""});
  const [color,setColor]=useState(proj.color);
  const F=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  return(<div className="overlay" onClick={e=>e.target===e.currentTarget&&close()}><div className="modal">
    <h3>編輯案件資訊</h3>
    <label>案件名稱</label><input value={form.name} onChange={F("name")}/>
    <label>業主名稱</label><input value={form.owner} onChange={F("owner")}/>
    <label>地址 / 地點</label><input value={form.loc} onChange={F("loc")}/>
    <label>聯絡人</label><input value={form.contact} onChange={F("contact")}/>
    <label>聯絡電話</label><input value={form.tel} onChange={F("tel")}/>
    <label>合約總金額 (NT$)</label><input type="number" value={form.contractAmt} onChange={F("contractAmt")} placeholder="0"/>
    <label>目前階段</label><select value={form.stage} onChange={F("stage")}>{STAGES.map(s=><option key={s} value={s}>{STAGE_L[s]}</option>)}</select>
    <label>案件識別色</label><div className="swatches">{PCOLS.map(c=><div key={c} className={`swatch${c===color?" on":""}`} style={{background:c}} onClick={()=>setColor(c)}/>)}</div>
    <div className="modal-ft"><button className="btn-ghost" onClick={close}>取消</button><button className="btn-solid" onClick={()=>{upd(p=>({...p,...form,color,contractAmt:Number(form.contractAmt||0)}));close();}}>儲存</button></div>
  </div></div>);
}

function DelProjModal({proj,close,upd,onDeleted}){
  const confirm=()=>{upd(d=>({...d,projects:d.projects.filter(p=>p.id!==proj.id)}));onDeleted(proj.id);close();};
  return(<div className="overlay" onClick={e=>e.target===e.currentTarget&&close()}><div className="modal" style={{maxWidth:400}}>
    <h3>刪除案件</h3>
    <p style={{fontSize:".9rem",color:"var(--t2)",lineHeight:1.7,margin:"1rem 0 1.4rem"}}>確定要刪除「<strong style={{color:"var(--t1)"}}>{proj.name}</strong>」？<br/>所有資料將永久刪除，無法復原。</p>
    <div className="modal-ft"><button className="btn-ghost" onClick={close}>取消</button><button className="btn-danger" onClick={confirm}>確認刪除</button></div>
  </div></div>);
}

const MC={
  ms:{title:"新增里程碑",defs:{status:"pending",prio:"mid"},fields:[{k:"title",l:"里程碑名稱 *",type:"text",ph:"例：概念提案簡報"},{k:"start",l:"開始日期",type:"date"},{k:"end",l:"完成日期",type:"date"},{k:"status",l:"狀態",type:"select",opts:[["done","已完成"],["doing","進行中"],["pending","待進行"]]},{k:"prio",l:"優先級",type:"select",opts:[["high","高"],["mid","中"],["low","低"]]}],save:(f,u,c)=>{if(!f.title?.trim())return;u(p=>({...p,milestones:[...p.milestones,{id:uid(),status:"pending",prio:"mid",...f}]}));c();}},
  todo:{title:"新增待辦事項",defs:{prio:"mid"},fields:[{k:"text",l:"事項名稱 *",type:"text",ph:"輸入待辦事項"},{k:"due",l:"截止日期",type:"date"},{k:"prio",l:"優先級",type:"select",opts:[["high","高"],["mid","中"],["low","低"]]},{k:"note",l:"備註說明",type:"textarea",ph:"補充說明..."}],save:(f,u,c)=>{if(!f.text?.trim())return;u(p=>({...p,todos:[...p.todos,{id:uid(),done:false,prio:"mid",...f}]}));c();}},
  comm:{title:"新增溝通記錄",defs:{ch:"Line"},fields:[{k:"who",l:"對象",type:"text",ph:"業主 — 王先生"},{k:"note",l:"溝通內容",type:"textarea",ph:"記錄重要決定..."},{k:"ch",l:"管道",type:"select",opts:COMM_CH.map(c=>[c,c])},{k:"date",l:"日期",type:"date"}],save:(f,u,c)=>{if(!f.note?.trim())return;u(p=>({...p,comms:[...(p.comms||[]),{id:uid(),ch:"Line",date:todayISO(),...f}]}));c();}},
  pend:{title:"新增待確認事項",defs:{status:"pending"},fields:[{k:"title",l:"事項標題 *",type:"text",ph:"需業主或廠商確認的事項"},{k:"status",l:"狀態",type:"select",opts:[["urgent","緊急"],["pending","待處理"],["confirmed","已確認"],["closed","已關閉"]]},{k:"note",l:"說明",type:"textarea",ph:"詳細說明..."},{k:"date",l:"日期",type:"date"}],save:(f,u,c)=>{if(!f.title?.trim())return;u(p=>({...p,pendings:[...p.pendings,{id:uid(),status:"pending",date:todayISO(),...f}]}));c();}},
  finIncome:{title:"新增收款項目",defs:{status:"unpaid"},fields:[{k:"name",l:"項目名稱 *",type:"text",ph:"例：設計費第一期"},{k:"amt",l:"金額 (NT$) *",type:"number",ph:"0"},{k:"cat",l:"分類",type:"select",opts:[["設計費","設計費"],["監造費","監造費"],["工程款","工程款"],["其他","其他"]]},{k:"status",l:"狀態",type:"select",opts:[["unpaid","待收款"],["paid","已收款"]]},{k:"date",l:"日期",type:"date"},{k:"note",l:"備註",type:"textarea",ph:"說明..."}],save:(f,u,c)=>{if(!f.name?.trim()||!f.amt)return;u(p=>({...p,finances:[...p.finances,{id:uid(),type:"income",status:"unpaid",date:todayISO(),...f,amt:Number(f.amt)}]}));c();}},
  finExpense:{title:"新增支出項目",defs:{status:"paid"},fields:[{k:"name",l:"項目名稱 *",type:"text",ph:"例：測量費"},{k:"amt",l:"金額 (NT$) *",type:"number",ph:"0"},{k:"cat",l:"分類",type:"select",opts:EXPENSE_CATS.map(c=>[c,c])},{k:"status",l:"狀態",type:"select",opts:[["unpaid","待付款"],["paid","已付款"]]},{k:"date",l:"日期",type:"date"},{k:"note",l:"備註",type:"textarea",ph:"說明..."}],save:(f,u,c)=>{if(!f.name?.trim()||!f.amt)return;u(p=>({...p,finances:[...p.finances,{id:uid(),type:"expense",status:"paid",date:todayISO(),...f,amt:Number(f.amt)}]}));c();}},
  extra:{title:"新增追加單",defs:{},fields:[{k:"title",l:"追加項目 *",type:"text",ph:"例：增設插座8組"},{k:"amt",l:"追加金額 (NT$)",type:"number",ph:"0"},{k:"date",l:"日期",type:"date"},{k:"note",l:"說明",type:"textarea",ph:"追加原因..."}],save:(f,u,c)=>{if(!f.title?.trim())return;u(p=>({...p,extras:[...p.extras,{id:uid(),date:todayISO(),...f,amt:Number(f.amt||0)}]}));c();}},
  tl:{title:"新增紀錄",defs:{type:"site"},fields:[{k:"type",l:"類型",type:"select",opts:[["site","工地紀錄"],["meet","會議紀錄"]]},{k:"title",l:"標題 *",type:"text",ph:"紀錄標題"},{k:"date",l:"日期",type:"date"},{k:"note",l:"內容說明",type:"textarea",ph:"詳細說明..."}],save:(f,u,c)=>{if(!f.title?.trim())return;u(p=>({...p,timelines:[...p.timelines,{id:uid(),type:"site",date:todayISO(),...f}]}));c();}},
};

function ItemModal({type,close,updP}){
  const cfg=MC[type];
  const [form,setForm]=useState({...(cfg?.defs||{})});
  const F=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  if(!cfg)return null;
  return(<div className="overlay" onClick={e=>e.target===e.currentTarget&&close()}><div className="modal">
    <h3>{cfg.title}</h3>
    {cfg.fields.map(f=><div key={f.k}><label>{f.l}</label>
      {f.type==="select"?<select value={form[f.k]??""} onChange={F(f.k)}>{f.opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>:
       f.type==="textarea"?<textarea value={form[f.k]??""} onChange={F(f.k)} placeholder={f.ph||""}/>:
       <input type={f.type} value={form[f.k]??""} onChange={F(f.k)} placeholder={f.ph||""}/>}
    </div>)}
    <div className="modal-ft"><button className="btn-ghost" onClick={close}>取消</button><button className="btn-solid" onClick={()=>cfg.save(form,updP,close)}>儲存</button></div>
  </div></div>);
}

/* ── App ── */
function App(){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [pid,setPid]=useState(null);
  const [tab,setTab]=useState("overview");
  const [showAllCal,setShowAllCal]=useState(false);
  const [modal,setModal]=useState(null);
  const [syncOk,setSyncOk]=useState(false);
  const [calYM,setCalYM]=useState({y:new Date().getFullYear(),m:new Date().getMonth()});
  const [delTarget,setDelTarget]=useState(null);
  const [sbOpen,setSbOpen]=useState(false);
  const lastSaveTime=useRef(0);

  useEffect(()=>{
    loadData().then(d=>{setData(d);if(d.projects.length>0)setPid(d.projects[0].id);setLoading(false);});
    // 修復1：每20秒輪詢，若本裝置5秒內無存檔，則從伺服器拉取最新資料
    const poll=setInterval(async()=>{
      if(Date.now()-lastSaveTime.current<5000)return;
      try{const r=await fetch(`${SURL}/rest/v1/studio_data?id=eq.${DID}&select=data`,{headers:{apikey:SKEY,Authorization:`Bearer ${SKEY}`}});const rows=await r.json();if(rows?.length)setData(rows[0].data);}catch(e){}
    },20000);
    return()=>clearInterval(poll);
  },[]);

  const upd=useCallback(fn=>{
    setData(prev=>{
      const next=fn(prev);
      lastSaveTime.current=Date.now();
      saveData(next).then(()=>{setSyncOk(true);setTimeout(()=>setSyncOk(false),2500);});
      return next;
    });
  },[]);

  const updP=useCallback((pid,fn)=>{upd(d=>({...d,projects:d.projects.map(p=>p.id===pid?fn(p):p)}));},[upd]);
  const proj=data?.projects.find(p=>p.id===pid)||null;
  const openModal=useCallback((type)=>setModal({type,pid}),[pid]);
  const closeModal=useCallback(()=>setModal(null),[]);
  const updProj=useCallback((fn)=>{if(pid)updP(pid,fn);},[pid,updP]);
  const handleDeleted=useCallback((deletedId)=>{setData(curr=>{const r=curr.projects.filter(p=>p.id!==deletedId);setPid(r.length>0?r[0].id:null);setTab("overview");setShowAllCal(false);return curr;});},[ ]);
  const handleCreated=useCallback((newId)=>{setPid(newId);setTab("overview");setShowAllCal(false);},[]);
  const selectProj=useCallback((id)=>{setPid(id);setTab("overview");setShowAllCal(false);setSbOpen(false);},[]);

  if(loading)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#E9E9E9",fontFamily:"'DM Serif Display',serif",fontSize:"1.2rem",letterSpacing:".05em",color:"#CCCCCC"}}>ID Studio</div>);

  const dateParts=new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit"}).replace(/\//g,".");

  return(<>
    <style>{CSS}</style>
    {modal?.type==="newProj"&&<NewProjModal close={closeModal} upd={upd} onCreated={handleCreated}/>}
    {modal?.type==="editProj"&&proj&&<EditProjModal proj={proj} close={closeModal} upd={fn=>updP(pid,fn)}/>}
       {modal&&!["newProj","editProj"].includes(modal.type)&&<ItemModal type={modal.type} close={closeModal} updP={updProj}/>}
    {delTarget&&<DelProjModal proj={delTarget} close={()=>setDelTarget(null)} upd={upd} onDeleted={handleDeleted}/>}
    <div className={`sb-overlay${sbOpen?" show":""}`} onClick={()=>setSbOpen(false)}/>

    <header className="hdr">
      <div className="hdr-l">
        <button className="menu-btn" onClick={()=>setSbOpen(v=>!v)}>☰</button>
        <span className="hdr-logo">ID Studio</span>
        <div className="hdr-div"/>
        <span className="hdr-proj" onClick={()=>setSbOpen(v=>!v)}>{showAllCal?"總合行事曆":proj?proj.name:"選擇案件"}</span>
      </div>
      <div className="hdr-r">
        <div className={`sync-pip${syncOk?" on":""}`} title={syncOk?"已同步":""}/>
        <span className="hdr-date">{dateParts}</span>
        <button className="hdr-btn" onClick={()=>{setShowAllCal(v=>!v);setSbOpen(false);}}>{showAllCal?"返回案件":"行事曆"}</button>
      </div>
    </header>

    <div className="workspace">
      <aside className={`sidebar${sbOpen?" open":""}`}>
        <button className="sb-close-btn" onClick={()=>setSbOpen(false)}>✕ 關閉</button>
        <div className="sb-sec">Cases</div>
        {data.projects.map(p=>{const pct=Math.round(p.milestones.filter(m=>m.status==="done").length/Math.max(p.milestones.length,1)*100);return(
          <div key={p.id} className={`sb-item${pid===p.id&&!showAllCal?" on":""}`} onClick={()=>selectProj(p.id)}>
            <span className="sb-dot" style={{background:p.color}}/>
            <div className="sb-info"><div className="sb-name">{p.name}</div><div className="sb-sub">{p.owner} · {STAGE_L[p.stage]}</div><div className="sb-bar-track"><div className="sb-bar-fill" style={{width:pct+"%"}}/></div></div>
          </div>);})}
        <hr className="sb-sep"/>
        <div className={`sb-item${showAllCal?" on":""}`} onClick={()=>{setShowAllCal(true);setSbOpen(false);}}>
          <span style={{fontSize:"1rem",color:"var(--t3)"}}>◎</span>
          <div className="sb-info"><div className="sb-name">總合行事曆</div><div className="sb-sub">All Projects</div></div>
        </div>
        <hr className="sb-sep"/>
        {proj&&!showAllCal&&<div style={{padding:".2rem .5rem"}}><button className="del-meta-btn" onClick={()=>{setDelTarget(proj);setSbOpen(false);}}>刪除此案件</button></div>}
        <button className="sb-add" onClick={()=>{setModal({type:"newProj",pid:null});setSbOpen(false);}}>＋ 新增案件</button>
      </aside>

      <main className="main">
        {data.projects.length===0?(
          <div style={{textAlign:"center",paddingTop:"6rem"}}>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:"2.5rem",fontWeight:400,marginBottom:".6rem"}}>尚無任何案件</div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:".68rem",color:"var(--t3)",marginBottom:"1.6rem"}}>建立第一個設計案件</div>
            <button className="btn-solid" onClick={()=>setModal({type:"newProj",pid:null})} style={{padding:".7rem 2rem",fontSize:".85rem"}}>＋ 新增案件</button>
          </div>
        ):showAllCal?(
          <AllCalendar data={data} calYM={calYM} setCalYM={setCalYM}/>
        ):proj?(
          <ProjectPanel proj={proj} tab={tab} setTab={setTab} upd={updProj} openModal={openModal} calYM={calYM} setCalYM={setCalYM}/>
        ):(
          <div style={{textAlign:"center",paddingTop:"5rem",color:"var(--t3)",fontFamily:"'DM Mono',monospace",fontSize:".72rem"}}>← 請從左側選擇案件</div>
        )}
      </main>
    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
