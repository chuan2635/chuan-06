/* ─── YC Splash Screen v2 ─── */
#yc-splash{
  position:fixed;inset:0;background:#EDE6D8;
  z-index:9999;display:flex;align-items:center;justify-content:center;
}
.yc-inner{display:flex;flex-direction:column;align-items:center;}
#yc-logo-svg{
  width:290px;max-width:90vw;height:auto;opacity:0;
  animation:yc-logo-in .55s .15s forwards cubic-bezier(.25,.46,.45,.94);
}
@keyframes yc-logo-in{
  from{opacity:0;transform:scale(.88) translateY(6px);}
  to{opacity:1;transform:scale(1) translateY(0);}
}
/* 角落框 */
.yc-br{stroke-dasharray:58;stroke-dashoffset:58;}
.yc-c1{animation:yc-draw .45s .3s forwards ease-out;}
.yc-c2{animation:yc-draw .45s .38s forwards ease-out;}
.yc-c3{animation:yc-draw .45s .36s forwards ease-out;}
.yc-c4{animation:yc-draw .45s .44s forwards ease-out;}
/* 房屋輪廓 */
.yc-wl,.yc-wr{stroke-dasharray:100;stroke-dashoffset:100;}
.yc-wl{animation:yc-draw .48s .5s forwards ease-out;}
.yc-wr{animation:yc-draw .48s .55s forwards ease-out;}
#yc-fl{stroke-dasharray:165;stroke-dashoffset:165;animation:yc-draw .55s .62s forwards ease-out;}
/* Y 屋脊 */
#yc-al{stroke-dasharray:112;stroke-dashoffset:112;animation:yc-draw .62s .72s forwards cubic-bezier(.25,.46,.45,.94);}
#yc-ar{stroke-dasharray:112;stroke-dashoffset:112;animation:yc-draw .62s .9s forwards cubic-bezier(.25,.46,.45,.94);}
#yc-cap{stroke-dasharray:24;stroke-dashoffset:24;animation:yc-draw .22s 1.18s forwards ease;}
/* Y 中柱 */
#yc-st{stroke-dasharray:100;stroke-dashoffset:100;animation:yc-draw .5s 1.2s forwards cubic-bezier(.25,.46,.45,.94);}
/* C 弧 */
#yc-cc{stroke-dasharray:320;stroke-dashoffset:320;animation:yc-draw 1.15s 1.35s forwards cubic-bezier(.25,.46,.45,.94);}
/* 通用 draw */
@keyframes yc-draw{to{stroke-dashoffset:0;}}
/* 尺 + 標注 + 工具 */
#yc-ruler{opacity:0;animation:yc-fade .5s 1.95s forwards;}
#yc-dim{opacity:0;animation:yc-fade .4s 2.05s forwards;}
.yc-tool{opacity:0;animation:yc-fade .45s 2.12s forwards;}
@keyframes yc-fade{to{opacity:1;}}

function solarToLunar(dateStr){
  const target=new Date(dateStr+"T00:00:00");
  const all=[];
  for(const yr of LUNAR_YEARS) for(let i=0;i<yr.starts.length;i++) all.push({d:new Date(yr.starts[i]+"T00:00:00"),name:yr.names[i]});
  all.sort((a,b)=>a.d-b.d);
  let best=null;
  for(const m of all){if(m.d<=target){const idx=Math.floor((target-m.d)/86400000);if(idx<=29)best={m:m.name,d:LUNAR_DAY_NAMES[idx],isFirst:idx===0};else best=null;}}
  return best;
}

    finances:[{id:"f1",type:"income",name:"設計費全額",amt:280000,status:"unpaid",date:"2026-03-01",note:"",cat:"設計費"},{id:"f2",type:"expense",name:"3D製作費",amt:25000,status:"paid",date:"2026-04-01",note:"",cat:"外包費用"}],
    extras:[],
    financeTodos:[{id:"ftt3",text:"確認合約簽署完成",done:false,due:"2026-05-15",note:""},{id:"ftt4",text:"發送設計費第一期請款單",done:false,due:"2026-05-20",note:""}],
    timelines:[{id:"tl1",type:"meet",title:"初次簡報",date:"2026-03-05",note:"確認設計方向為輕奢風格"},{id:"tl2",type:"site",title:"現場複量",date:"2026-04-05",note:"確認柱位尺寸"}]}
]};

const CSS=`
:root{
  --bg:#EDE6D8; --sf:#F8F4EC; --sf2:#EDE5D3; --sf3:#E3D8C5;
  --dark:#584738; --dark2:#463929;
  --acc:#B59E7D; --acc2:#9A8568;
  --t1:#2D1F14; --t2:#6B5040; --t3:#9A9184; --t4:#C5B8A5;
  --b1:rgba(88,71,56,.1); --b2:rgba(88,71,56,.18); --b3:rgba(88,71,56,.28);
  --sh:0 2px 8px rgba(88,71,56,.08),0 1px 3px rgba(88,71,56,.04);
  --shm:0 8px 28px rgba(88,71,56,.13);
  --done:#4D7A5A; --done-bg:#EBF2EC;
  --red:#8B4040; --red-bg:#F5ECEC;
  --amber:#8B6020; --amber-bg:#F5EFE0;
  --sb:252px; --hh:60px; --bnav:70px;
  --r:14px; --rs:10px; --rxs:7px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--t1);font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;line-height:1.65;min-height:100vh;overflow-x:hidden;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}

/* Header */
.hdr{position:sticky;top:0;z-index:200;height:var(--hh);background:rgba(248,244,236,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;}
.hdr-l{display:flex;align-items:center;gap:.85rem;min-width:0;}
.hdr-logo{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--dark);flex-shrink:0;}
.hdr-div{width:1px;height:20px;background:var(--b2);flex-shrink:0;}
.hdr-proj{font-size:.95rem;font-weight:500;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:color .15s;}
.hdr-proj:hover{color:var(--t1);}
.hdr-r{display:flex;align-items:center;gap:.6rem;flex-shrink:0;}
.hdr-date{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--t3);}
.sync-pip{width:7px;height:7px;border-radius:50%;background:var(--t4);transition:all .3s;flex-shrink:0;}
.sync-pip.on{background:var(--done);}
.menu-btn{display:none;width:38px;height:38px;border-radius:var(--rxs);align-items:center;justify-content:center;font-size:1rem;color:var(--t2);border:1px solid var(--b2);transition:all .15s;}
.menu-btn:hover{border-color:var(--b3);color:var(--t1);}
.hdr-btn{font-size:.82rem;font-weight:500;padding:.38rem .95rem;border:1px solid var(--b2);border-radius:20px;color:var(--t2);transition:all .15s;white-space:nowrap;}
.hdr-btn:hover{border-color:var(--acc);color:var(--dark);background:var(--sf2);}

/* Layout */
.workspace{display:grid;grid-template-columns:var(--sb) 1fr;min-height:calc(100vh - var(--hh));}

/* Sidebar */
.sidebar{background:var(--sf);border-right:1px solid var(--b1);padding:.85rem .7rem;position:sticky;top:var(--hh);height:calc(100vh - var(--hh));overflow-y:auto;display:flex;flex-direction:column;transition:transform .25s ease,box-shadow .25s ease;}
.sb-sec{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--t3);padding:.55rem .65rem .3rem;margin-top:.3rem;}
.sb-item{display:flex;align-items:center;gap:.6rem;padding:.72rem .8rem;border-radius:var(--rs);cursor:pointer;border:1px solid transparent;transition:all .15s;color:var(--t2);font-size:.92rem;}
.sb-item:hover{background:var(--sf2);color:var(--t1);}
.sb-item.on{background:var(--dark);color:#F8F4EC;}
.sb-item.on .sb-sub{color:rgba(248,244,236,.45);}
.sb-item.on .sb-bar-track{background:rgba(248,244,236,.15);}
.sb-item.on .sb-bar-fill{background:var(--acc);}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sb-info{flex:1;min-width:0;}
.sb-name{font-size:.88rem;font-weight:500;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-sub{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--t3);margin-top:.1rem;}
.sb-bar-track{height:2px;background:var(--sf3);border-radius:1px;overflow:hidden;margin-top:.45rem;}
.sb-bar-fill{height:100%;background:var(--acc);border-radius:1px;transition:width .5s;}
.sb-sep{border:none;border-top:1px solid var(--b1);margin:.55rem .3rem;}
.sb-add{width:100%;padding:.72rem;background:transparent;border:1.5px dashed var(--b2);border-radius:var(--rs);font-size:.85rem;color:var(--t3);cursor:pointer;transition:all .2s;margin-top:auto;display:flex;align-items:center;justify-content:center;gap:.35rem;}
.sb-add:hover{border-color:var(--acc);color:var(--dark);}
.sb-close-btn{display:none;width:100%;padding:.55rem;background:transparent;border:1px solid var(--b2);border-radius:var(--rxs);font-family:'DM Mono',monospace;font-size:.68rem;color:var(--t3);cursor:pointer;margin-bottom:.5rem;}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(45,31,20,.4);z-index:149;}

/* Main */
.main{padding:2rem 2.2rem 3rem;}

/* Project Header */
.proj-hdr{margin-bottom:1.8rem;}
.proj-eyebrow{display:flex;align-items:center;gap:.55rem;margin-bottom:.6rem;}
.stage-badge{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:.26rem .8rem;border-radius:20px;border:1px solid var(--b2);color:var(--t2);background:var(--sf);}
.proj-title{font-family:'DM Serif Display',serif;font-size:2.5rem;line-height:1.05;letter-spacing:-.01em;margin-bottom:.55rem;color:var(--t1);}
.proj-meta-row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
.proj-meta{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--t3);}
.meta-btn{font-family:'DM Mono',monospace;font-size:.64rem;padding:.24rem .65rem;border:1px solid var(--b2);border-radius:4px;color:var(--t3);cursor:pointer;transition:all .15s;}
.meta-btn:hover{border-color:var(--acc);color:var(--dark);background:var(--sf2);}
.del-meta-btn{font-family:'DM Mono',monospace;font-size:.64rem;padding:.24rem .65rem;border:1px solid transparent;border-radius:4px;color:var(--t3);cursor:pointer;transition:all .15s;}
.del-meta-btn:hover{border-color:var(--red-bg);color:var(--red);background:var(--red-bg);}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:1.6rem;border-bottom:1.5px solid var(--b1);}
.tab-btn{font-size:.86rem;padding:.65rem 1.1rem;cursor:pointer;color:var(--t3);white-space:nowrap;transition:all .18s;border:none;background:transparent;position:relative;}
.tab-btn::after{content:'';position:absolute;bottom:-1.5px;left:0;right:0;height:1.5px;background:transparent;transition:background .18s;}
.tab-btn:hover{color:var(--t2);}
.tab-btn.on{color:var(--dark);font-weight:600;}
.tab-btn.on::after{background:var(--acc);}

/* Mobile Bottom Nav */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bnav);background:rgba(248,244,236,.96);backdrop-filter:blur(16px);border-top:1px solid var(--b1);z-index:100;flex-direction:row;}
.mn-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:transparent;border:none;color:var(--t3);cursor:pointer;transition:color .15s;}
.mn-btn.on{color:var(--dark);}
.mn-icon{font-family:'DM Mono',monospace;font-size:1.1rem;line-height:1;}
.mn-label{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.04em;white-space:nowrap;}
.mn-badge{font-size:.42rem;background:var(--red);color:#fff;border-radius:10px;padding:.05rem .3rem;margin-top:-3px;}
/* 手機底部間距修復 */
.mobile-spacer{display:none;}

/* Progress Card */
.prog-card{background:var(--dark);border-radius:var(--r);padding:1.7rem 1.9rem;margin-bottom:1rem;color:#F8F4EC;}
.prog-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1.4rem;gap:1rem;}
.prog-num{font-family:'DM Serif Display',serif;font-size:4.2rem;line-height:1;color:#F8F4EC;}
.prog-unit{font-family:'DM Mono',monospace;font-size:.78rem;color:rgba(248,244,236,.4);margin-left:.3rem;}
.stage-row{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:.9rem;}
.stage-step{padding:.44rem .15rem;text-align:center;font-family:'DM Mono',monospace;font-size:.54rem;color:rgba(248,244,236,.3);cursor:pointer;border-radius:5px;transition:all .15s;position:relative;}
.stage-step::before{content:'';display:block;height:2px;background:rgba(248,244,236,.12);border-radius:1px;margin-bottom:.3rem;}
.stage-step.done-s::before{background:var(--acc);}
.stage-step.curr-s::before{background:#F8F4EC;}
.stage-step.done-s{color:var(--acc);}
.stage-step.curr-s{color:#F8F4EC;}
.stage-step:hover{background:rgba(248,244,236,.06);}
.prog-track{height:1px;background:rgba(248,244,236,.1);}
.prog-fill-bar{height:100%;background:var(--acc);transition:width .6s;}

/* Cards */
.card{background:var(--sf);border:1px solid var(--b1);border-radius:var(--r);padding:1.35rem 1.45rem;box-shadow:var(--sh);}
.card-hd{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.13em;text-transform:uppercase;color:var(--t3);margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;}
.add-btn{font-size:.82rem;font-weight:500;padding:.3rem .75rem;border:1px solid var(--b2);border-radius:20px;color:var(--t2);cursor:pointer;transition:all .15s;}
.add-btn:hover{border-color:var(--acc);color:var(--dark);background:var(--sf2);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.full{grid-column:1/-1;}

/* Milestones */
.ms-list{list-style:none;}
.ms-item{display:flex;gap:.75rem;padding:.75rem 0;border-bottom:1px solid var(--b1);align-items:flex-start;}
.ms-item:last-child{border-bottom:none;}
.ms-dot-w{padding-top:.45rem;flex-shrink:0;}
.ms-dot{width:10px;height:10px;border-radius:50%;border:2px solid;}
.ms-body{flex:1;min-width:0;}
.ms-title{font-size:.94rem;font-weight:500;margin-bottom:.2rem;color:var(--t1);}
.ms-dates{font-family:'DM Mono',monospace;font-size:.64rem;color:var(--t3);}
.ms-r{display:flex;align-items:center;gap:.4rem;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.ms-sel{font-family:'DM Mono',monospace;font-size:.62rem;padding:.2rem .5rem;border-radius:6px;border:1px solid var(--b2);cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;background:var(--sf2);}
.tag-sm{font-family:'DM Mono',monospace;font-size:.62rem;padding:.2rem .5rem;border-radius:6px;flex-shrink:0;}
.del-x{background:none;border:none;cursor:pointer;color:var(--t4);font-size:.85rem;padding:.1rem .2rem;transition:color .15s;line-height:1;flex-shrink:0;}
.del-x:hover{color:var(--red);}

/* Todos */
.todo-item{padding:.88rem 0;border-bottom:1px solid var(--b1);}
.todo-item:last-child{border-bottom:none;}
.todo-row{display:flex;gap:.85rem;align-items:flex-start;}
.chk{width:23px;height:23px;border:2px solid var(--b2);border-radius:6px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .18s;background:transparent;font-size:.78rem;color:var(--sf);}
.chk:hover{border-color:var(--acc);}
.chk.on{background:var(--dark);border-color:var(--dark);}
.todo-txt{font-size:.94rem;line-height:1.55;color:var(--t1);}
.todo-done{text-decoration:line-through;color:var(--t3);}
.todo-meta{display:flex;align-items:center;gap:.45rem;margin-top:.24rem;flex-wrap:wrap;}
.todo-due{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--t3);}
.todo-due.ov{color:var(--red);}
.todo-note{font-size:.8rem;color:var(--t2);margin-top:.25rem;padding:.35rem .55rem;background:var(--sf2);border-radius:6px;border-left:2px solid var(--b2);}

/* Comms */
.comm-item{padding:.88rem 0;border-bottom:1px solid var(--b1);}
.comm-item:last-child{border-bottom:none;}
.comm-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:.28rem;}
.comm-who{font-size:.94rem;font-weight:600;}
.comm-r{display:flex;align-items:center;gap:.45rem;}
.comm-when{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--t3);}
.comm-note{font-size:.9rem;color:var(--t2);line-height:1.65;}
.comm-ch{display:inline-block;font-family:'DM Mono',monospace;font-size:.62rem;padding:.18rem .48rem;border:1px solid var(--b2);border-radius:4px;margin-top:.28rem;color:var(--t3);}

/* Pending */
.filt-row{display:flex;gap:.35rem;flex-wrap:wrap;}
.filt-btn{font-family:'DM Mono',monospace;font-size:.67rem;padding:.3rem .7rem;border:1px solid var(--b2);border-radius:20px;color:var(--t3);cursor:pointer;transition:all .15s;background:var(--sf);}
.filt-btn:hover{border-color:var(--acc);color:var(--dark);}
.filt-btn.on{background:var(--dark);border-color:var(--dark);color:#F8F4EC;}
.pd-item{padding:1rem 1.15rem;border:1px solid var(--b1);border-radius:var(--rs);margin-bottom:.7rem;background:var(--sf);box-shadow:var(--sh);}
.pd-item.urg{border-left:3px solid var(--red);}
.pd-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.28rem;gap:.5rem;}
.pd-title{font-size:.94rem;font-weight:600;color:var(--t1);}
.pd-sel{font-family:'DM Mono',monospace;font-size:.62rem;padding:.2rem .5rem;border-radius:6px;border:1px solid var(--b2);cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;background:var(--sf2);flex-shrink:0;}
.pd-note{font-size:.84rem;color:var(--t2);margin-bottom:.22rem;}
.pd-date{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--t3);}

/* Finance */
.fin-health{background:var(--dark);border-radius:var(--r);padding:1.55rem 1.65rem;margin-bottom:1rem;color:#F8F4EC;}
.fin-health-title{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(248,244,236,.35);margin-bottom:1rem;}
.fin-h-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.2rem;}
.fin-h-stat{background:rgba(248,244,236,.07);border-radius:var(--rs);padding:.9rem 1rem;}
.fin-h-l{font-family:'DM Mono',monospace;font-size:.58rem;color:rgba(248,244,236,.38);margin-bottom:.42rem;letter-spacing:.06em;}
.fin-h-v{font-family:'DM Serif Display',serif;font-size:1.35rem;line-height:1.1;}
.fin-progress-track{height:6px;background:rgba(248,244,236,.1);border-radius:3px;overflow:hidden;margin-bottom:.5rem;}
.fin-progress-fill{height:100%;border-radius:3px;transition:width .6s;}
.fin-progress-labels{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:.58rem;color:rgba(248,244,236,.32);}
.fin-actions{display:flex;gap:.5rem;margin-bottom:1rem;align-items:center;}
.fin-toggle{display:flex;gap:.2rem;background:var(--sf2);border-radius:var(--rs);padding:.3rem;flex:1;}
.fin-tab{flex:1;padding:.46rem;text-align:center;font-family:'DM Mono',monospace;font-size:.67rem;cursor:pointer;border:none;background:transparent;color:var(--t3);transition:all .2s;border-radius:7px;}
.fin-tab.on{background:var(--sf);color:var(--dark);font-weight:600;box-shadow:0 1px 4px rgba(88,71,56,.1);}
.fin-item{display:flex;align-items:center;padding:.72rem 0;border-bottom:1px solid var(--b1);gap:.5rem;}
.fin-item:last-child{border-bottom:none;}
.fin-info{flex:1;min-width:0;}
.fin-name{font-size:.9rem;font-weight:500;color:var(--t1);}
.fin-date{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--t3);margin-top:.1rem;}
.fin-r{display:flex;flex-direction:column;align-items:flex-end;gap:.2rem;}
.fin-amt{font-family:'DM Mono',monospace;font-size:.84rem;}
.fin-in{color:var(--done);}
.fin-ex{color:var(--red);}
.fin-st{font-family:'DM Mono',monospace;font-size:.6rem;padding:.1rem .38rem;border-radius:4px;cursor:pointer;border:1px solid var(--b2);color:var(--t3);background:transparent;transition:all .15s;}
.fin-st:hover{border-color:var(--acc);color:var(--dark);}
.extra-total{display:flex;justify-content:space-between;align-items:baseline;padding-top:.85rem;margin-top:.45rem;border-top:1px solid var(--b2);}
.extra-total-l{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--t3);}
.extra-total-v{font-family:'DM Serif Display',serif;font-size:1.45rem;color:var(--t1);}
.csv-btn{font-family:'DM Mono',monospace;font-size:.67rem;padding:.44rem .85rem;border:1px solid var(--b2);border-radius:20px;color:var(--t2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.csv-btn:hover{border-color:var(--acc);color:var(--dark);}

/* Timeline */
.tl-item{display:flex;gap:.9rem;padding:.9rem 0;border-bottom:1px solid var(--b1);align-items:flex-start;}
.tl-item:last-child{border-bottom:none;}
.tl-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0;background:var(--sf2);border:1px solid var(--b1);color:var(--t2);}
.tl-body{flex:1;}
.tl-title{font-size:.94rem;font-weight:600;margin-bottom:.1rem;color:var(--t1);}
.tl-date{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--t3);}
.tl-note{font-size:.84rem;color:var(--t2);line-height:1.5;margin-top:.2rem;}
.tl-tag{font-family:'DM Mono',monospace;font-size:.6rem;padding:.2rem .55rem;border-radius:6px;border:1px solid var(--b2);color:var(--t3);flex-shrink:0;}

/* ── CALENDAR (全新設計) ── */
.cal-shell{display:flex;flex-direction:column;gap:1rem;}
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;}
.cal-nav-btn{font-family:'DM Mono',monospace;font-size:.7rem;padding:.34rem .8rem;border:1px solid var(--b2);border-radius:6px;color:var(--t2);cursor:pointer;transition:all .15s;background:var(--sf);}
.cal-nav-btn:hover{border-color:var(--acc);color:var(--dark);background:var(--sf2);}
.cal-m-lbl{font-family:'DM Serif Display',serif;font-size:1.55rem;color:var(--t1);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{text-align:center;font-family:'DM Mono',monospace;font-size:.62rem;color:var(--t3);padding:.38rem .2rem;}
.cal-dow.wknd{color:var(--red);}
.cal-cell{background:var(--sf);border:1px solid var(--b1);border-radius:8px;padding:.28rem .28rem .32rem;cursor:pointer;transition:all .15s;min-height:54px;position:relative;}
.cal-cell:hover{border-color:var(--acc2);background:var(--sf2);}
.cal-cell.empty{background:transparent;border-color:transparent;pointer-events:none;}
.cal-cell.today-cell{border-color:var(--acc);border-width:1.5px;}
.cal-cell.sel-cell{background:var(--dark);border-color:var(--dark);}
.cal-cell.holiday-bg{background:#F8F0EC;}
.cal-cell.wknd-cell{background:#F5F0EA;}
.cal-day-n{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--t2);display:block;margin-bottom:.12rem;}
.sel-cell .cal-day-n{color:#F8F4EC;}
.cal-cell.today-cell .cal-day-n{color:var(--dark);font-weight:700;}
.sel-cell.today-cell .cal-day-n{color:#F8F4EC;}
.cal-lunar-t{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--t3);display:block;}
.sel-cell .cal-lunar-t{color:rgba(248,244,236,.5);}
.cal-lunar-t.first-day{color:var(--done);font-weight:600;}

`;

const Tag=({cfg,children})=><span style={{fontFamily:"'DM Mono',monospace",fontSize:".62rem",padding:".2rem .5rem",borderRadius:6,...cfg}}>{children}</span>;
const DelX=({onClick})=><button className="del-x" onClick={e=>{e.stopPropagation();onClick();}}>✕</button>;
const Empty=({text})=><div className="empty"><span className="empty-icon">○</span><div className="empty-txt">{text}</div></div>;

/* ── 取得某日詳細事件 ── */
function getDayDetail(dateStr,proj,allProjects){
  const items={milestones:[],todos:[],pendings:[]};
  const projects=proj?[proj]:(allProjects||[]);
  for(const p of projects){
    for(const ms of p.milestones){
      const s=ms.start,e=ms.end||ms.start;
      if(dateStr>=s&&dateStr<=e) items.milestones.push({...ms,projName:p.name,projColor:p.color,isStart:dateStr===s,isEnd:dateStr===e||(!ms.end&&dateStr===s)});
    }
    for(const t of p.todos) if(t.due===dateStr) items.todos.push({...t,projName:p.name});
    for(const pd of p.pendings) if(pd.date===dateStr) items.pendings.push({...pd,projName:p.name});
  }
  return items;
}

/* ── 取得某日是否有事件（用於日格點點顯示）── */
function getDayDots(dateStr,proj,allProjects){
  const detail=getDayDetail(dateStr,proj,allProjects);
  return {
    hasMilestone:detail.milestones.length>0,
    hasTodo:detail.todos.length>0,
    hasPending:detail.pendings.length>0,
    milestoneStatuses:detail.milestones.map(m=>m.status),
  };
}

/* ── 日期格式化 ── */
function fmtFullDate(dateStr){
  if(!dateStr)return"";
  const d=new Date(dateStr+"T00:00:00");
  const weekdays=["週日","週一","週二","週三","週四","週五","週六"];
  return{
    full:`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`,
    weekday:weekdays[d.getDay()],
  };
}

/* ── DayDetailPanel ── */
function DayDetailPanel({dateStr,proj,allProjects}){
  if(!dateStr)return null;
  const detail=getDayDetail(dateStr,proj,allProjects);
  const lunar=solarToLunar(dateStr);
  const holiday=TW_HOLIDAYS[dateStr];
  const fmt=fmtFullDate(dateStr);
  const hasAny=detail.milestones.length>0||detail.todos.length>0||detail.pendings.length>0;
  return(
    <div className="day-panel">
      <div className="day-panel-hdr">
        <span className="day-panel-date">{fmt.full}</span>
        <span className="day-panel-weekday">{fmt.weekday}{holiday?` · ${holiday}`:""}</span>
        {lunar&&<span className="day-panel-lunar">{lunar.isFirst?`農曆${lunar.m}月初一`:`${lunar.m}月${lunar.d}`}</span>}
      </div>
      <div className="day-panel-body">
        {!hasAny&&<div className="day-empty"><span className="day-empty-icon">○</span><div className="day-empty-txt">這天沒有排程</div></div>}
        {detail.milestones.length>0&&<div className="day-event-group">
          <div className="day-event-group-title">里程碑</div>
          {detail.milestones.map((ms,i)=>{
            const c=MSS[ms.status];
            const pos=ms.isStart&&ms.isEnd?"單日":ms.isStart?"開始":ms.isEnd?"結束":"進行中";
            return(<div key={i} className="day-event-card">
              <div className="day-event-icon" style={{background:c.tag.bg,color:c.dot}}>{ms.status==="done"?"✓":ms.status==="doing"?"→":"○"}</div>
              <div className="day-event-body">
                <div className="day-event-title">{ms.title}</div>
                <div className="day-event-meta">{ms.projName} · {pos} · {c.l}</div>
              </div>
            </div>);
          })}
        </div>}
        {detail.todos.length>0&&<div className="day-event-group">
          <div className="day-event-group-title">待辦截止</div>
          {detail.todos.map((t,i)=>{
            const c=PRC[t.prio];
            return(<div key={i} className="day-event-card" style={{opacity:t.done?.7:1}}>
              <div className="day-event-icon" style={{background:c.bg,color:c.color}}>{t.done?"✓":"!"}</div>
              <div className="day-event-body">
                <div className="day-event-title" style={{textDecoration:t.done?"line-through":"none"}}>{t.text}</div>
                <div className="day-event-meta">{t.projName} · 優先度{c.l}{t.done?" · 已完成":""}</div>
              </div>
            </div>);
          })}
        </div>}
        {detail.pendings.length>0&&<div className="day-event-group">
          <div className="day-event-group-title">待確認事項</div>
          {detail.pendings.map((pd,i)=>{
            const c=PDS[pd.status];
            return(<div key={i} className="day-event-card">
              <div className="day-event-icon" style={{background:c.bg,color:c.color}}>◎</div>
              <div className="day-event-body">
                <div className="day-event-title">{pd.title}</div>
                <div className="day-event-meta">{pd.projName} · {c.l}</div>
              </div>
            </div>);
          })}
        </div>}
      </div>
    </div>
  );
}

/* ── CalendarView ── */
function CalendarView({proj,allProjects,calYM,setCalYM}){
  const [selDay,setSelDay]=useState(todayISO());
  const {y,m}=calYM;
  const first=new Date(y,m,1).getDay();
  const dim=new Date(y,m+1,0).getDate();
  const cells=[];for(let i=0;i<first;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);
  const td=todayISO();
  const prefix=`${y}-${String(m+1).padStart(2,"0")}`;

  return(
    <div className="cal-shell">

        {WDAYS.map((w,i)=><div key={w} className={`cal-dow${i===0||i===6?" wknd":""}`}>{w}</div>)}

          const ds=`${prefix}-${String(d).padStart(2,"0")}`;
          const dow=(first+d-1)%7;
          const isToday=ds===td, isSel=ds===selDay, isWknd=dow===0||dow===6;
          const holiday=TW_HOLIDAYS[ds];
          const lunar=solarToLunar(ds);
          const dots=getDayDots(ds,proj,allProjects);
          const cls=["cal-cell",isToday?"today-cell":"",isSel?"sel-cell":"",holiday&&!isSel?"holiday-bg":"",isWknd&&!holiday&&!isSel?"wknd-cell":""].filter(Boolean).join(" ");
          return(
            <div key={d} className={cls} onClick={()=>setSelDay(ds)}>
              <span className={`cal-day-n${isWknd&&!isSel?" wknd":""}`}>{d}</span>
              {lunar&&<span className={`cal-lunar-t${lunar.isFirst?" first-day":""}`}>{lunar.isFirst?`${lunar.m}月`:lunar.d}</span>}
              {holiday&&!isSel&&<span className="cal-holiday-t">{holiday}</span>}

              {dots.milestoneStatuses.slice(0,2).map((st,j)=><div key={j} className="cal-ms-strip" style={{background:MSS[st].dot+"55"}}/>)}

                {dots.hasPending&&<span className="cal-dot" style={{background:"#8B4040"}}/>}
              </div>}
            </div>
          );
        })}
      </div>
      {/* 選定日事件詳情 */}
      <DayDetailPanel dateStr={selDay} proj={proj} allProjects={allProjects}/>
    </div>
  );
}

/* ── 圖片壓縮上傳工具 ── */
function compressImage(file,maxPx=600,quality=0.72){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const ratio=Math.min(maxPx/img.width,maxPx/img.height,1);
        const canvas=document.createElement('canvas');
        canvas.width=Math.round(img.width*ratio);
        canvas.height=Math.round(img.height*ratio);
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
function ImageUpload({value,onChange}){
  const inputRef=useRef(null);
  const [loading,setLoading]=useState(false);
  async function handleFile(e){
    const file=(e.target.files&&e.target.files[0]);
    if(!file)return;
    setLoading(true);
    try{const b64=await compressImage(file);onChange(b64);}
    finally{setLoading(false);}
  }
  return(<div>
    <input ref={inputRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile}/>
    <div onClick={()=>inputRef.current&&inputRef.current.click()}
      style={{border:"1.5px dashed var(--b2)",borderRadius:"var(--rxs)",cursor:"pointer",
        overflow:"hidden",minHeight:110,display:"flex",alignItems:"center",justifyContent:"center",
        background:"var(--sf2)",transition:"border-color .15s"}}
      onMouseEnter={e=>e.currentTarget.style.borderColor="var(--acc)"}
      onMouseLeave={e=>e.currentTarget.style.borderColor="var(--b2)"}>
      {loading?<span style={{fontFamily:"'DM Mono',monospace",fontSize:".7rem",color:"var(--t3)"}}>壓縮中...</span>:
       value?<img src={value} style={{width:"100%",maxHeight:200,objectFit:"cover"}} alt="材質圖"/>:
       <div style={{textAlign:"center",padding:"1rem"}}>
         <div style={{fontSize:"1.5rem",marginBottom:".3rem",opacity:.35}}>📷</div>
         <div style={{fontFamily:"'DM Mono',monospace",fontSize:".65rem",color:"var(--t3)"}}>點擊上傳圖片</div>
         <div style={{fontFamily:"'DM Mono',monospace",fontSize:".58rem",color:"var(--t4)",marginTop:".2rem"}}>支援 JPG / PNG，自動壓縮</div>
       </div>}
    </div>
    {value&&<button className="btn-ghost" style={{fontSize:".7rem",marginTop:".3rem"}}
      onClick={e=>{e.stopPropagation();onChange("");}}>✕ 移除圖片</button>}
  </div>);
}

  const togTodo=id=>upd(p=>({...p,todos:p.todos.map(t=>t.id===id?{...t,done:!t.done}:t)}));
  const delTodo=id=>upd(p=>({...p,todos:p.todos.filter(t=>t.id!==id)}));
  const delComm=id=>upd(p=>({...p,comms:(p.comms||[]).filter(c=>c.id!==id)}));
  return(<>

        </div>
        <select value={proj.stage} onChange={e=>upd(p=>({...p,stage:e.target.value}))} style={{fontFamily:"'DM Mono',monospace",fontSize:".65rem",border:"1px solid rgba(248,244,236,.18)",borderRadius:7,padding:".24rem .7rem",background:"rgba(248,244,236,.08)",color:"rgba(248,244,236,.65)",cursor:"pointer",outline:"none"}}>
          {STAGES.map(s=><option key={s} value={s}>{STAGE_L[s]}</option>)}
        </select>
      </div>
      <div className="stage-row">{STAGES.map((s,i)=><div key={s} className={`stage-step${i<stIdx?" done-s":i===stIdx?" curr-s":""}`} onClick={()=>upd(p=>({...p,stage:s}))}>{STAGE_L[s]}</div>)}</div>
      <div className="prog-track"><div className="prog-fill-bar" style={{width:pct+"%"}}/></div>
    </div>
    <div className="grid2">
      <div className="card">
        <div className="card-hd">里程碑<button className="add-btn" onClick={()=>openModal("ms")}>＋ 新增</button></div>
        {proj.milestones.length===0?<Empty text="尚無里程碑"/>:
        <ul className="ms-list">{proj.milestones.map(m=><MilestoneItem key={m.id} ms={m} updMs={updMs} delMs={delMs} relatedPendings={(proj.pendings||[]).filter(pd=>pd.msId===m.id&&(pd.status==="urgent"||pd.status==="pending"))}/>)}</ul>}

        {proj.todos.length===0?<Empty text="尚無待辦事項"/>:
        proj.todos.map(t=><TodoItem key={t.id} todo={t}
          onToggle={()=>togTodo(t.id)}
          onUpdate={ch=>upd(p=>({...p,todos:p.todos.map(x=>x.id===t.id?{...x,...ch}:x)}))}
          onDelete={()=>delTodo(t.id)}/>)}
      </div>
      {/* 最近活動預覽（點擊跳活動日誌） */}
      {(()=>{

              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:".88rem",fontWeight:500,color:"var(--t1)"}}>{item.title||item.who}</div>

function FinanceTab({proj,upd,openModal}){
  const [sub,setSub]=useState("income");
  const togSt=id=>upd(p=>({...p,finances:p.finances.map(f=>f.id===id?{...f,status:f.status==="paid"?"unpaid":"paid"}:f)}));
  const delFin=id=>upd(p=>({...p,finances:p.finances.filter(f=>f.id!==id)}));
  const delEx=id=>upd(p=>({...p,extras:p.extras.filter(e=>e.id!==id)}));
  const inc=proj.finances.filter(f=>f.type==="income"),exp=proj.finances.filter(f=>f.type==="expense");
  const contractAmt=Number(proj.contractAmt||0);
  const totalInvoiced=inc.reduce((a,f)=>a+Number(f.amt),0);
  const collected=inc.filter(f=>f.status==="paid").reduce((a,f)=>a+Number(f.amt),0);
  const outstanding=inc.filter(f=>f.status==="unpaid").reduce((a,f)=>a+Number(f.amt),0);
  const totalExp=exp.reduce((a,f)=>a+Number(f.amt),0);
  const exTot=proj.extras.reduce((a,e)=>a+Number(e.amt),0);
  const unbilled=contractAmt-totalInvoiced;
  const grossProfit=collected-totalExp;
  const invoicePct=contractAmt>0?Math.min(100,Math.round(totalInvoiced/contractAmt*100)):0;
  const collectPct=contractAmt>0?Math.min(100,Math.round(collected/contractAmt*100)):0;
  const rl=(items,type)=>items.length===0?<Empty text={type==="income"?"尚無收款項目":"尚無支出記錄"}/>:
    items.map(f=><div key={f.id} className="fin-item">
      <div className="fin-info"><div className="fin-name">{f.name}</div><div className="fin-date">{fmtD(f.date)}{f.cat?` · ${f.cat}`:""}{f.note?` · ${f.note}`:""}</div></div>
      <div className="fin-r">
        <div className={`fin-amt ${type==="income"?"fin-in":"fin-ex"}`}>{type==="income"?"+":"-"} NT${fmtN(f.amt)}</div>
        <button className="fin-st" onClick={()=>togSt(f.id)}>{f.status==="paid"?"已完成":"待處理"}</button>
      </div>
      <DelX onClick={()=>delFin(f.id)}/>
    </div>);
  return(<>
    <div className="fin-health">
      <div className="fin-health-title">Financial Health — 財務概況</div>
      <div className="fin-h-grid">
        <div className="fin-h-stat"><div className="fin-h-l">合約金額</div><div className="fin-h-v" style={{color:"#F8F4EC"}}>{contractAmt?`NT$${fmtN(contractAmt)}`:<span style={{fontSize:".8rem",color:"rgba(248,244,236,.3)"}}>未設定</span>}</div></div>
        <div className="fin-h-stat"><div className="fin-h-l">已請款</div><div className="fin-h-v" style={{color:"rgba(248,244,236,.8)"}}>NT${fmtN(totalInvoiced)}</div></div>
        <div className="fin-h-stat"><div className="fin-h-l">已收款</div><div className="fin-h-v" style={{color:"#A8C8A8"}}>NT${fmtN(collected)}</div></div>
        <div className="fin-h-stat"><div className="fin-h-l">待收款</div><div className="fin-h-v" style={{color:"#D4C080"}}>NT${fmtN(outstanding)}</div></div>
        <div className="fin-h-stat"><div className="fin-h-l">未請款</div><div className="fin-h-v" style={{color:"rgba(248,244,236,.45)"}}>NT${fmtN(Math.max(0,unbilled))}</div></div>
        <div className="fin-h-stat"><div className="fin-h-l">毛利</div><div className="fin-h-v" style={{color:grossProfit>=0?"#A8C8A8":"#C89090"}}>NT${fmtN(grossProfit)}</div></div>
      </div>
      {contractAmt>0&&<>
        <div className="fin-progress-track"><div className="fin-progress-fill" style={{width:invoicePct+"%",background:"rgba(181,158,125,.6)"}}/></div>
        <div style={{height:4}}/>
        <div className="fin-progress-track"><div className="fin-progress-fill" style={{width:collectPct+"%",background:"#A8C8A8"}}/></div>
        <div className="fin-progress-labels" style={{marginTop:".4rem"}}><span>請款率 {invoicePct}%</span><span>收款率 {collectPct}%</span></div>
      </>}
    </div>
    <div className="fin-actions">
      <div className="fin-toggle">
        <button className={`fin-tab${sub==="income"?" on":""}`} onClick={()=>setSub("income")}>收款項目</button>
        <button className={`fin-tab${sub==="expense"?" on":""}`} onClick={()=>setSub("expense")}>支出項目</button>
        <button className={`fin-tab${sub==="extras"?" on":""}`} onClick={()=>setSub("extras")}>追加單</button>
      </div>
      <button className="csv-btn" onClick={()=>exportCSV(proj)}>↓ CSV</button>
    </div>
    {sub==="income"&&<><div style={{display:"flex",justifyContent:"flex-end",marginBottom:".75rem"}}><button className="add-btn" onClick={()=>openModal("finIncome")}>＋ 新增</button></div><div className="card">{rl(inc,"income")}</div></>}
    {sub==="expense"&&<><div style={{display:"flex",justifyContent:"flex-end",marginBottom:".75rem"}}><button className="add-btn" onClick={()=>openModal("finExpense")}>＋ 新增</button></div><div className="card">{rl(exp,"expense")}</div></>}
    {sub==="extras"&&<><div style={{display:"flex",justifyContent:"flex-end",marginBottom:".75rem"}}><button className="add-btn" onClick={()=>openModal("extra")}>＋ 新增</button></div>
      <div className="card">{proj.extras.length===0?<Empty text="尚無追加項目"/>:
        proj.extras.map(e=><div key={e.id} className="fin-item">
          <div className="fin-info"><div className="fin-name">{e.title}</div><div className="fin-date">{fmtD(e.date)}{e.note?` · ${e.note}`:""}</div></div>
          <div className="fin-amt" style={{color:"var(--t2)"}}>NT${fmtN(e.amt)}</div>
          <DelX onClick={()=>delEx(e.id)}/>
        </div>)}
        {proj.extras.length>0&&<div className="extra-total"><div className="extra-total-l">追加總計</div><div className="extra-total-v">NT${fmtN(exTot)}</div></div>}
      </div>
    </>}
  </>);
}

/* ── AllMaterialsView（材質與五金總表）── */
function AllMaterialsView({data}){
  const [typeFilter,setTypeFilter]=useState("all");
  const [catFilter,setCatFilter]=useState("all");
  const [search,setSearch]=useState("");
  const matItems=[],hwItems=[];
  for(const proj of data.projects.filter(p=>!p.archived)){
    for(const m of(proj.materials||[]))matItems.push({...m,_type:"mat",projName:proj.name,projColor:proj.color});
    for(const h of(proj.hardware||[]))hwItems.push({...h,_type:"hw",projName:proj.name,projColor:proj.color});
  }
  const all=[...matItems,...hwItems];
  const cats=["all",...new Set(all.map(x=>x.category).filter(Boolean))];
  const filtered=all.filter(x=>{
    if(typeFilter==="mat"&&x._type!=="mat")return false;
    if(typeFilter==="hw"&&x._type!=="hw")return false;
    if(catFilter!=="all"&&x.category!==catFilter)return false;
    if(search&&!x.name.includes(search)&&!(x.notes||"").includes(search)&&!(x.supplier||"").includes(search))return false;
    return true;
  });
  return(<>
    <div className="proj-hdr">
      <div className="proj-title">材質與五金總表</div>
      <div className="proj-meta-row">
        <span className="proj-meta">材質 {matItems.length} 項 · 五金 {hwItems.length} 項</span>
      </div>
    </div>
    <div style={{display:"flex",gap:".5rem",flexWrap:"wrap",marginBottom:"1rem",alignItems:"center"}}>
      {[["all","全部"],["mat","材質"],["hw","五金"]].map(([v,l])=>(

/* ── DashboardView ── */
function getGreeting(){
  const h=new Date().getHours();
  if(h<5)return"夜深了";if(h<9)return"早安";if(h<12)return"上午好";
  if(h<14)return"午安";if(h<18)return"下午好";if(h<22)return"晚安";return"夜深了";
}
function DashboardView({data,upd,selectProj,setShowAllTodos,setShowDash,setAllTodosFilter}){
  const today=todayISO();
  const nextWeek=(()=>{const d=new Date();d.setDate(d.getDate()+7);return d.toISOString().slice(0,10);})();
  const wd=["日","一","二","三","四","五","六"];
  const lunar=solarToLunar(today);
  const dateStr=new Date().toLocaleDateString("zh-TW",{month:"long",day:"numeric"});
  const weekday="週"+wd[new Date().getDay()];
  const overdue=[],dueToday=[],thisWeek=[],urgentPd=[];
  for(const proj of data.projects.filter(p=>!p.archived)){
    const ps=proj.name.length>8?proj.name.slice(0,7)+"…":proj.name;
    for(const t of(proj.todos||[])){
      if(t.done)continue;
      const item={...t,projName:ps,projColor:proj.color,projId:proj.id};
      if(t.due<today)overdue.push(item);
      else if(t.due===today)dueToday.push(item);
      else if(t.due&&t.due<=nextWeek)thisWeek.push(item);
    }
  }
  thisWeek.sort((a,b)=>a.due.localeCompare(b.due));
  const alertCount=overdue.length+dueToday.length;
  const totalPending=data.projects.reduce((a,p)=>a+(p.todos||[]).filter(t=>!t.done).length,0);
  const togTodo=(projId,todoId)=>upd(d=>({...d,projects:d.projects.map(p=>p.id===projId?{...p,todos:p.todos.map(t=>t.id===todoId?{...t,done:!t.done}:t)}:p)}));

  function DItem({item,cls,badge,bs,onCheck}){
    return(<div className={"dash-item "+cls} onClick={()=>selectProj(item.projId)}>
      <span className="dash-item-dot" style={{background:item.projColor}}/>
      <div className="dash-item-body">
        <div className="dash-item-title">{item.text||item.title}</div>
        <div className="dash-item-meta">
          <span>{item.projName}</span>
          {item.due&&<span>{fmtD(item.due)}</span>}
        </div>
      </div>
      <span className="dash-item-badge" style={bs}>{badge}</span>
      {onCheck&&<button className={"chk"+(item.done?" on":"")} style={{flexShrink:0}} onClick={e=>{e.stopPropagation();onCheck();}}>{item.done?"✓":""}</button>}
    </div>);
  }

  return(<div className="dash-wrap">
    <div style={{marginBottom:"1.8rem"}}>
      <div className="dash-greeting">{getGreeting()}</div>
      <div className="dash-date">{dateStr} {weekday}{lunar?` · 農曆${lunar.m}月${lunar.d}`:""}</div>
    </div>
    <div className="dash-stats">
      <div className={"dash-stat"+(alertCount>0?" red":"")} onClick={()=>{setShowAllTodos(true);setAllTodosFilter("overdue");setShowDash(false);}}>
        <div className="dash-stat-n">{alertCount}</div>
        <div className="dash-stat-l">需要立即處理</div>
      </div>
      <div className="dash-stat" onClick={()=>{setShowAllTodos(true);setAllTodosFilter("pending");setShowDash(false);}}>
        <div className="dash-stat-n">{totalPending}</div>
        <div className="dash-stat-l">件待辦事項</div>
      </div>
      <div className="dash-stat">
        <div className="dash-stat-n">{data.projects.length}</div>
        <div className="dash-stat-l">進行中案件</div>
      </div>
    </div>
    {overdue.length>0&&<div className="dash-sec">
      <div className="dash-sec-hd"><span className="dash-sec-title">⚠ 逾期未完成</span><span className="dash-sec-count">{overdue.length}</span></div>
      {overdue.map(t=><DItem key={t.id} item={t} cls="ov" badge="逾期" bs={{background:"var(--red-bg)",color:"var(--red)"}} onCheck={()=>togTodo(t.projId,t.id)}/>)}
    </div>}
    {dueToday.length>0&&<div className="dash-sec">
      <div className="dash-sec-hd"><span className="dash-sec-title">📌 今日截止</span><span className="dash-sec-count">{dueToday.length}</span></div>
      {dueToday.map(t=><DItem key={t.id} item={t} cls="td" badge="今天" bs={{background:"var(--amber-bg)",color:"var(--amber)"}} onCheck={()=>togTodo(t.projId,t.id)}/>)}
    </div>}

    {thisWeek.length>0&&<div className="dash-sec">
      <div className="dash-sec-hd"><span className="dash-sec-title">本週截止</span><span className="dash-sec-count">{thisWeek.length}</span></div>
      {thisWeek.map(t=><DItem key={t.id} item={t} cls="wk" badge={fmtD(t.due)} bs={{fontFamily:"'DM Mono',monospace",fontSize:".6rem",color:"var(--t3)"}} onCheck={()=>togTodo(t.projId,t.id)}/>)}
    </div>}
    {alertCount===0&&thisWeek.length===0&&<div style={{textAlign:"center",padding:"1.5rem 0 1rem",color:"var(--t3)"}}>
      <div style={{fontSize:"1.8rem",marginBottom:".5rem",opacity:.3}}>✓</div>
      <div style={{fontFamily:"'DM Mono',monospace",fontSize:".72rem"}}>目前沒有緊急事項</div>
    </div>}
    <div>
      <div className="dash-sec-hd" style={{marginBottom:".8rem"}}><span className="dash-sec-title">案件總覽</span></div>
      {data.projects.filter(p=>!p.archived).map(proj=>{
        const done=(proj.milestones||[]).filter(m=>m.status==="done").length;
        const total=(proj.milestones||[]).length;
        const pct=total?Math.round(done/total*100):0;
        const pending=(proj.todos||[]).filter(t=>!t.done).length;
        const urgent=(proj.pendings||[]).filter(p=>p.status==="urgent").length;
        const next=(proj.milestones||[]).find(m=>m.status!=="done");
        return(<div key={proj.id} className="phc" onClick={()=>selectProj(proj.id)}>
          <span className="phc-dot" style={{background:proj.color}}/>
          <div className="phc-info">
            <div className="phc-name">{proj.name}</div>
            <div className="phc-stage">{STAGE_L[proj.stage]}{next?` · ${next.title}`:""}</div>
          </div>
          <div className="phc-track-wrap">
            <div className="phc-track-labels"><span>{pct}%</span><span>{done}/{total} 里程碑</span></div>
            <div className="phc-track"><div className="phc-fill" style={{width:pct+"%",background:pct===100?"var(--done)":"var(--acc)"}}/></div>
          </div>
          <div className="phc-badges">
            {pending>0&&<span className="phc-badge" style={{background:"var(--sf2)",color:"var(--t2)"}}>{pending} 待辦</span>}
            {urgent>0&&<span className="phc-badge" style={{background:"var(--red-bg)",color:"var(--red)"}}>⚠ {urgent}</span>}
          </div>
        </div>);
      })}
    </div>
    <div className="mobile-spacer"/>
  </div>);
}

/* ── AllTodosView ── */
function AllTodosView({data,upd,initialFilter}){
  const [filter,setFilter]=useState(initialFilter||"pending");
  const [sortBy,setSortBy]=useState("due");
  const today=todayISO();

  const all=data.projects.filter(p=>!p.archived).flatMap(proj=>
    (proj.todos||[]).map(t=>({...t,projId:proj.id,projName:proj.name,projColor:proj.color}))
  );
  const counts={
    pending:all.filter(t=>!t.done).length,
    overdue:all.filter(t=>!t.done&&t.due&&t.due<today).length,
    today:all.filter(t=>t.due===today&&!t.done).length,
    all:all.length,
    done:all.filter(t=>t.done).length,
  };

  let shown=filter==="pending"?all.filter(t=>!t.done):
            filter==="overdue"?all.filter(t=>!t.done&&t.due&&t.due<today):
            filter==="today"?all.filter(t=>t.due===today&&!t.done):
            filter==="done"?all.filter(t=>t.done):all;

  const pv={high:0,mid:1,low:2};
  if(sortBy==="due") shown=[...shown].sort((a,b)=>{if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return -1;return a.due.localeCompare(b.due);});
  else if(sortBy==="prio") shown=[...shown].sort((a,b)=>pv[a.prio]-pv[b.prio]);
  else if(sortBy==="proj") shown=[...shown].sort((a,b)=>a.projName.localeCompare(b.projName));

  const togTodo=(projId,todoId)=>upd(d=>({...d,projects:d.projects.map(p=>p.id===projId?{...p,todos:p.todos.map(t=>t.id===todoId?{...t,done:!t.done}:t)}:p)}));

  // group by project
  const groups={};
  for(const t of shown){
    if(!groups[t.projId])groups[t.projId]={name:t.projName,color:t.projColor,items:[]};
    groups[t.projId].items.push(t);
  }

  return(<>
    <div className="proj-hdr">
      <div className="proj-title">所有待辦</div>
      <div className="proj-meta-row">
        <span className="proj-meta">整合所有案件 · {shown.length} 件顯示</span>
      </div>
    </div>
    <div style={{display:"flex",gap:".4rem",marginBottom:"1rem",flexWrap:"wrap",alignItems:"center"}}>
      <div className="filt-row">
        {[["pending",`待完成 ${counts.pending}`],["overdue",`逾期 ${counts.overdue}`],["today",`今日 ${counts.today}`],["all",`全部 ${counts.all}`],["done",`已完成 ${counts.done}`]].map(([f,l])=>(
          <button key={f} className={`filt-btn${filter===f?" on":""}`} onClick={()=>setFilter(f)}>{l}</button>
        ))}
      </div>
      <div style={{marginLeft:"auto",display:"flex",gap:".3rem",alignItems:"center"}}>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:".62rem",color:"var(--t3)"}}>排序</span>
        {[["due","截止日"],["prio","優先度"],["proj","案件"]].map(([s,l])=>(
          <button key={s} className={`filt-btn${sortBy===s?" on":""}`} onClick={()=>setSortBy(s)} style={{fontSize:".6rem"}}>{l}</button>
        ))}
      </div>
    </div>
    {shown.length===0&&<Empty text="沒有符合條件的待辦事項"/>}
    {Object.values(groups).map(g=>(
      <div key={g.name} style={{marginBottom:"1.25rem"}}>
        <div className="at-proj-hd">
          <span className="at-proj-dot" style={{background:g.color}}/>
          <span className="at-proj-name">{g.name}</span>
          <span className="at-proj-count">{g.items.length} 件</span>
        </div>
        <div className="card">
          {g.items.map(t=>{
            const over=t.due&&!t.done&&t.due<today;
            return(<div key={t.id} className="at-todo-row">
              <button className={`chk${t.done?" on":""}`} onClick={()=>togTodo(t.projId,t.id)}>{t.done?"✓":""}</button>
              <div className="at-todo-info">
                <div className={`todo-txt${t.done?" todo-done":""}`}>{t.text}</div>
                <div className="todo-meta">
                  {t.due&&<span className={`todo-due${over?" ov":""}`}>{fmtD(t.due)}</span>}
                  <Tag cfg={PRC[t.prio]}>{PRC[t.prio].l}</Tag>
                  {t.done&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:".6rem",color:"var(--done)"}}>已完成</span>}
                </div>
                {t.note&&<div className="todo-note">{t.note}</div>}
              </div>
            </div>);
          })}
        </div>
      </div>
    ))}
    <div className="mobile-spacer"/>
  </>);
}

    <h3>{cfg.title}</h3>

      {f.type==="select"?<select value={form[f.k]??""} onChange={F(f.k)}>{f.opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>:

function App(){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [pid,setPid]=useState(null);
  const [tab,setTab]=useState("overview");
  const [showAllCal,setShowAllCal]=useState(false);
  const [showAllTodos,setShowAllTodos]=useState(false);
  const [allTodosFilter,setAllTodosFilter]=useState("pending");
  const [showDash,setShowDash]=useState(false); // Dashboard removed
  const [modal,setModal]=useState(null);
  const [syncOk,setSyncOk]=useState(false);
  const [calYM,setCalYM]=useState({y:new Date().getFullYear(),m:new Date().getMonth()});
  const [delTarget,setDelTarget]=useState(null);
  const [archiveTarget,setArchiveTarget]=useState(null);
  const [showArchived,setShowArchived]=useState(false);
  const [showAllMats,setShowAllMats]=useState(false);
  const [sbOpen,setSbOpen]=useState(false);
  const lastSaveTime=useRef(0);

  useEffect(()=>{
    loadData().then(d=>{
      setData(d);
      // 直接選第一個未歸檔案件
      const active=d.projects.filter(p=>!p.archived);
      if(active.length>0)setPid(active[0].id);
      setLoading(false);
      // 啟動通知檢查
      requestAndCheckNotifications(d);
    });
    const poll=setInterval(async()=>{
      if(Date.now()-lastSaveTime.current<5000)return;
      try{const r=await fetch(`${SURL}/rest/v1/studio_data?id=eq.${DID}&select=data`,{headers:{apikey:SKEY,Authorization:`Bearer ${SKEY}`}});const rows=await r.json();if(rows?.length){setData(rows[0].data);/* 注意：polling 不呼叫通知，避免重複推送 */}}catch(e){}
    },20000);
    return()=>clearInterval(poll);
  },[]);

  const upd=useCallback(fn=>{setData(prev=>{const next=fn(prev);lastSaveTime.current=Date.now();saveData(next).then(()=>{setSyncOk(true);setTimeout(()=>setSyncOk(false),2500);});return next;});},[]);
  const updP=useCallback((pid,fn)=>{upd(d=>({...d,projects:(d&&d.projects||[]).map(p=>p.id===pid?fn(p):p)}));},[upd]);
  const proj=(data&&data.projects)?data.projects.find(p=>p.id===pid)||null:null;
  const openModal=useCallback((type)=>setModal({type,pid}),[pid]);
  const closeModal=useCallback(()=>setModal(null),[]);
  const updProj=useCallback((fn)=>{if(pid)updP(pid,fn);},[pid,updP]);
  const handleArchived=useCallback(()=>{setPid(null);setShowDash(true);},[]);
  const handleDeleted=useCallback((deletedId)=>{setData(curr=>{const r=curr.projects.filter(p=>p.id!==deletedId);setPid(r.length>0?r[0].id:null);setTab("overview");setShowAllCal(false);setShowAllTodos(false);setShowDash(false);setShowArchived(false);setShowAllMats(false);return curr;});},[ ]);
  const handleCreated=useCallback((newId)=>{setPid(newId);setTab("overview");setShowAllCal(false);setShowAllTodos(false);setShowDash(false);},[]);
  const selectProj=useCallback((id)=>{setPid(id);setTab("overview");setShowAllCal(false);setShowAllTodos(false);setShowDash(false);setShowArchived(false);setShowAllMats(false);setSbOpen(false);},[]);

  if(loading)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#EDE6D8",fontFamily:"'DM Serif Display',serif",fontSize:"1.2rem",letterSpacing:".05em",color:"#C5B8A5"}}>YC Studio</div>);

  const dateParts=new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit"}).replace(/\//g,".");

  return(<>

    {archiveTarget&&<ArchiveModal proj={archiveTarget} close={()=>setArchiveTarget(null)} upd={upd} onArchived={handleArchived}/>}
    {delTarget&&<DelProjModal proj={delTarget} close={()=>setDelTarget(null)} upd={upd} onDeleted={handleDeleted}/>}

    <header className="hdr">

const NOTIF_KEY_PREFIX = "ids-notif-shown-";

// 節流：每次 session 最多檢查一次，避免 polling 重複觸發
let _notifSessionDone = false;
let _notifLastRun = 0;

function getTodayNotifKey() {
  return NOTIF_KEY_PREFIX + todayISO();
}

function getShownSet() {
  try {
    const raw = localStorage.getItem(getTodayNotifKey());
    return new Set(JSON.parse(raw || "[]"));
  } catch { return new Set(); }
}

function markShown(ids) {
  try {
    const existing = getShownSet();
    ids.forEach(id => existing.add(id));
    localStorage.setItem(getTodayNotifKey(), JSON.stringify([...existing]));
    // 清理舊 key（保留最近 3 天）
    const keep = new Set([0,1,2].map(n => {
      const d = new Date(); d.setDate(d.getDate()-n);
      return NOTIF_KEY_PREFIX + d.toISOString().slice(0,10);
    }));
    Object.keys(localStorage).filter(k=>k.startsWith(NOTIF_KEY_PREFIX)&&!keep.has(k)).forEach(k=>localStorage.removeItem(k));
  } catch {}
}

function showNotif(title, body, tag) {
  if (Notification.permission !== "granted") return;
  try {
    new Notification(title, {
      body,
      tag,
      icon: "https://chuan-06.vercel.app/favicon.ico",
      badge: "https://chuan-06.vercel.app/favicon.ico",
      requireInteraction: false,
      silent: false,
    });
  } catch(e) {}
}

async function requestAndCheckNotifications(data, force=false) {
  if (!("Notification" in window)) return;

  // 只在早上 8 點之後才發送通知（符合使用者設定）
  const nowDate = new Date();
  if (nowDate.getHours() < 8) return;

  // 節流：同一天只執行一次（早上 8 點後第一次開啟頁面才觸發）
  const todayKey = "ids-notif-done-" + todayISO();
  if (!force && localStorage.getItem(todayKey)) return;
  localStorage.setItem(todayKey, "1");
  // 清理 3 天前的 key
  [1,2,3].forEach(n => {
    const d = new Date(); d.setDate(d.getDate()-n);
    localStorage.removeItem("ids-notif-done-" + d.toISOString().slice(0,10));
  });

  // 第一次開啟時詢問權限
  if (Notification.permission === "default") {
    await Notification.requestPermission();
  }
  if (Notification.permission !== "granted") return;

  const today = todayISO();
  const tomorrow = (() => {
    const d = new Date(); d.setDate(d.getDate()+1);
    return d.toISOString().slice(0,10);
  })();

  const shown = getShownSet();
  const newShown = [];

  for (const proj of (data.projects || [])) {
    // ── 待辦事項 ──
    for (const todo of (proj.todos || [])) {
      if (todo.done) continue;
      const base = `todo-${todo.id}`;
      if (todo.due < today) {
        const id = `${base}-overdue`;
        if (!shown.has(id)) {
          showNotif("⚠️ 逾期未完成", `${todo.text}\n📁 ${proj.name}`, id);
          newShown.push(id);
        }
      } else if (todo.due === today) {
        const id = `${base}-today`;
        if (!shown.has(id)) {
          showNotif("📌 今日截止事項", `${todo.text}\n📁 ${proj.name}`, id);
          newShown.push(id);
        }
      } else if (todo.due === tomorrow) {
        const id = `${base}-tomorrow`;
        if (!shown.has(id)) {
          showNotif("⏰ 明日截止提醒", `${todo.text}\n📁 ${proj.name}`, id);
          newShown.push(id);
        }
      }
    }

    // ── 緊急待確認 ──
    for (const pd of (proj.pendings || [])) {
      if (pd.status !== "urgent") continue;
      const id = `pend-${pd.id}-${today}`;
      if (!shown.has(id)) {
        showNotif("🚨 緊急事項待確認", `${pd.title}\n📁 ${proj.name}`, id);
        newShown.push(id);
      }
    }
  }

  if (newShown.length > 0) markShown(newShown);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
(function(){
  function exitSplash(){
    var sp = document.getElementById('yc-splash');
    if (!sp) return;
    // Phase 1: 內容縮小淡出
    var inn = sp.querySelector('.yc-inner');
    if (inn) {
      inn.style.cssText += ';transition:transform .5s ease-in,opacity .45s ease-in;transform:scale(.93) translateY(-4px);opacity:0';
    }
    // Phase 2: splash 向上滑走
    setTimeout(function() {
      sp.style.cssText += ';transition:transform .7s cubic-bezier(.76,0,.24,1);transform:translateY(-100%)';
      setTimeout(function() { if(sp.parentNode) sp.remove(); }, 720);
    }, 480);
  }
  // 動畫約 3 秒後退場
  setTimeout(exitSplash, 3000);
  // 安全保險：4 秒內一定移除，不管任何錯誤
  setTimeout(function(){
    var s = document.getElementById('yc-splash');
    if (s && s.parentNode) s.parentNode.removeChild(s);
  }, 4200);
})();
</script>
