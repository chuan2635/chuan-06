const CSS=`
:root{
  --bg:#E9E9E9; --sf:#FFFFFF; --sf2:#F7F7F7; --sf3:#F0F0F0;
  --dark:#1A1A1A; --dark2:#2A2A2A;
  --t1:#111111; --t2:#6B6B6B; --t3:#AAAAAA;
  --b1:rgba(0,0,0,.07); --b2:rgba(0,0,0,.12); --b3:rgba(0,0,0,.18);
  --sh:0 1px 4px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.06);
  --shm:0 8px 32px rgba(0,0,0,.1);
  --done:#3A6B4A; --done-bg:#EDF7F2;
  --red:#8B3A3A; --red-bg:#FBF0F0;
  --amber:#8B6914; --amber-bg:#FBF7EE;
  --sb:248px; --hh:60px; --bnav:68px;
  --r:16px; --rs:10px; --rxs:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--t1);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}

/* Header */
.hdr{
  position:sticky;top:0;z-index:200;height:var(--hh);
  background:rgba(255,255,255,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--b1);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;
}
.hdr-l{display:flex;align-items:center;gap:.85rem;min-width:0;}
.hdr-logo{font-family:'DM Serif Display',serif;font-size:1.15rem;letter-spacing:.02em;color:var(--t1);flex-shrink:0;cursor:default;}
.hdr-div{width:1px;height:20px;background:var(--b2);flex-shrink:0;}
.hdr-proj{font-size:.9rem;font-weight:500;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:color .15s;}
.hdr-proj:hover{color:var(--t1);}
.hdr-r{display:flex;align-items:center;gap:.6rem;flex-shrink:0;}
.hdr-date{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--t3);}
.sync-pip{width:7px;height:7px;border-radius:50%;background:var(--t3);transition:all .3s;flex-shrink:0;}
.sync-pip.on{background:var(--done);}
.menu-btn{display:none;width:36px;height:36px;border-radius:var(--rxs);align-items:center;justify-content:center;font-size:.95rem;color:var(--t2);border:1px solid var(--b2);transition:all .15s;}
.menu-btn:hover{border-color:var(--b3);color:var(--t1);}
.hdr-btn{font-size:.78rem;font-weight:500;padding:.38rem .9rem;border:1px solid var(--b2);border-radius:20px;color:var(--t2);transition:all .15s;white-space:nowrap;}
.hdr-btn:hover{border-color:var(--b3);color:var(--t1);background:var(--sf2);}

/* Layout */
.workspace{display:grid;grid-template-columns:var(--sb) 1fr;min-height:calc(100vh - var(--hh));}

/* Sidebar */
.sidebar{
  background:var(--sf);border-right:1px solid var(--b1);
  padding:.85rem .7rem;
  position:sticky;top:var(--hh);height:calc(100vh - var(--hh));
  overflow-y:auto;display:flex;flex-direction:column;
  transition:transform .25s ease,box-shadow .25s ease;
}
.sb-sec{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--t3);padding:.55rem .65rem .3rem;margin-top:.3rem;}
.sb-item{display:flex;align-items:center;gap:.6rem;padding:.7rem .75rem;border-radius:var(--rs);cursor:pointer;border:1px solid transparent;transition:all .15s;color:var(--t2);font-size:.88rem;font-weight:400;}
.sb-item:hover{background:var(--sf2);color:var(--t1);}
.sb-item.on{background:var(--dark);color:#FFFFFF;border-color:transparent;}
.sb-item.on .sb-sub{color:rgba(255,255,255,.5);}
.sb-item.on .sb-bar-track{background:rgba(255,255,255,.15);}
.sb-item.on .sb-bar-fill{background:rgba(255,255,255,.7);}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sb-info{flex:1;min-width:0;}
.sb-name{font-size:.85rem;font-weight:500;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-sub{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--t3);margin-top:.1rem;}
.sb-bar-track{height:2px;background:var(--sf3);border-radius:1px;overflow:hidden;margin-top:.45rem;}
.sb-bar-fill{height:100%;background:var(--dark);border-radius:1px;transition:width .5s;}
.sb-sep{border:none;border-top:1px solid var(--b1);margin:.55rem .3rem;}
.sb-add{width:100%;padding:.72rem;background:transparent;border:1.5px dashed var(--b2);border-radius:var(--rs);font-size:.82rem;font-weight:400;color:var(--t3);cursor:pointer;transition:all .2s;margin-top:auto;display:flex;align-items:center;justify-content:center;gap:.35rem;}
.sb-add:hover{border-color:var(--t1);color:var(--t1);}
.sb-close-btn{display:none;width:100%;padding:.55rem;background:transparent;border:1px solid var(--b2);border-radius:var(--rxs);font-family:'DM Mono',monospace;font-size:.65rem;color:var(--t3);cursor:pointer;margin-bottom:.5rem;}
.sb-close-btn:hover{color:var(--t2);}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:149;backdrop-filter:blur(2px);}

/* Main */
.main{padding:2rem 2.2rem 3rem;}

/* Project Header */
.proj-hdr{margin-bottom:1.8rem;}

.meta-btn:hover{border-color:var(--b3);color:var(--t2);}
.del-meta-btn{font-family:'DM Mono',monospace;font-size:.62rem;padding:.22rem .6rem;border:1px solid transparent;border-radius:4px;color:var(--t3);cursor:pointer;transition:all .15s;}
.del-meta-btn:hover{border-color:var(--red-bg);color:var(--red);background:var(--red-bg);}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:1.6rem;border-bottom:1.5px solid var(--b1);}
.tab-btn{font-size:.82rem;font-weight:400;padding:.65rem 1.1rem;cursor:pointer;color:var(--t3);white-space:nowrap;transition:all .18s;border:none;background:transparent;position:relative;}
.tab-btn::after{content:'';position:absolute;bottom:-1.5px;left:0;right:0;height:1.5px;background:transparent;transition:background .18s;}
.tab-btn:hover{color:var(--t2);}
.tab-btn.on{color:var(--t1);font-weight:600;}
.tab-btn.on::after{background:var(--t1);}

/* Mobile Nav */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bnav);background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-top:1px solid var(--b1);z-index:100;flex-direction:row;}
.mn-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:transparent;border:none;color:var(--t3);cursor:pointer;transition:color .15s;padding:0 .2rem;}
.mn-btn.on{color:var(--t1);}
.mn-icon{font-family:'DM Mono',monospace;font-size:.95rem;line-height:1;}
.mn-label{font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.04em;white-space:nowrap;}
.mn-badge{font-size:.4rem;background:var(--red);color:#fff;border-radius:10px;padding:.05rem .3rem;margin-top:-3px;}

/* Progress Card (dark) */
.prog-card{background:var(--dark);border-radius:var(--r);padding:1.6rem 1.8rem;margin-bottom:1rem;color:#FFFFFF;}
.prog-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1.4rem;gap:1rem;}
.prog-num{font-family:'DM Serif Display',serif;font-size:4rem;line-height:1;color:#FFFFFF;}
.prog-unit{font-family:'DM Mono',monospace;font-size:.75rem;color:rgba(255,255,255,.4);margin-left:.3rem;}
.prog-meta{text-align:right;}
.prog-meta-v{font-family:'DM Mono',monospace;font-size:.7rem;color:rgba(255,255,255,.5);}
.stage-row{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:.85rem;}
.stage-step{padding:.42rem .15rem;text-align:center;font-family:'DM Mono',monospace;font-size:.52rem;color:rgba(255,255,255,.3);cursor:pointer;border-radius:5px;border:1px solid transparent;transition:all .15s;position:relative;}
.stage-step::before{content:'';display:block;height:2px;background:rgba(255,255,255,.12);border-radius:1px;margin-bottom:.3rem;}
.stage-step.done-s::before{background:rgba(255,255,255,.55);}
.stage-step.curr-s::before{background:#FFFFFF;}
.stage-step.done-s{color:rgba(255,255,255,.55);}
.stage-step.curr-s{color:#FFFFFF;}
.stage-step:hover{background:rgba(255,255,255,.06);}
.prog-track{height:1px;background:rgba(255,255,255,.1);}
.prog-fill{height:100%;background:rgba(255,255,255,.7);transition:width .6s;}

/* Cards */
.card{background:var(--sf);border:1px solid var(--b1);border-radius:var(--r);padding:1.3rem 1.4rem;box-shadow:var(--sh);}
.card-hd{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.13em;text-transform:uppercase;color:var(--t3);margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;}
.add-btn{font-size:.78rem;font-weight:500;padding:.28rem .7rem;border:1px solid var(--b2);border-radius:20px;color:var(--t2);cursor:pointer;transition:all .15s;}
.add-btn:hover{border-color:var(--t1);color:var(--t1);background:var(--sf2);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.full{grid-column:1/-1;}

.ms-list{list-style:none;}
.ms-item{display:flex;gap:.75rem;padding:.72rem 0;border-bottom:1px solid var(--b1);align-items:flex-start;}

.ms-dot{width:9px;height:9px;border-radius:50%;border:2px solid;}
.ms-body{flex:1;min-width:0;}
.ms-title{font-size:.9rem;font-weight:500;margin-bottom:.18rem;color:var(--t1);}
.ms-dates{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--t3);}
.ms-r{display:flex;align-items:center;gap:.4rem;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.ms-sel{font-family:'DM Mono',monospace;font-size:.6rem;padding:.2rem .5rem;border-radius:6px;border:1px solid var(--b2);cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;background:var(--sf2);}
.tag-sm{font-family:'DM Mono',monospace;font-size:.6rem;padding:.18rem .48rem;border-radius:6px;flex-shrink:0;font-weight:400;}
.del-x{background:none;border:none;cursor:pointer;color:var(--t3);font-size:.8rem;padding:.1rem .2rem;transition:color .15s;line-height:1;flex-shrink:0;}
.del-x:hover{color:var(--red);}

.todo-item{padding:.85rem 0;border-bottom:1px solid var(--b1);}
.todo-item:last-child{border-bottom:none;}

.chk{width:22px;height:22px;border:2px solid var(--b2);border-radius:6px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .18s;background:transparent;font-size:.75rem;color:var(--sf);}
.chk:hover{border-color:var(--t2);}
.chk.on{background:var(--t1);border-color:var(--t1);}

/* Comms */
.comm-item{padding:.85rem 0;border-bottom:1px solid var(--b1);}
.comm-item:last-child{border-bottom:none;}
.comm-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:.28rem;}
.comm-who{font-size:.9rem;font-weight:600;}
.comm-r{display:flex;align-items:center;gap:.45rem;}
.comm-when{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--t3);}
.comm-note{font-size:.85rem;color:var(--t2);line-height:1.65;}
.comm-ch{display:inline-block;font-family:'DM Mono',monospace;font-size:.58rem;padding:.16rem .45rem;border:1px solid var(--b2);border-radius:4px;margin-top:.28rem;color:var(--t3);}

/* Pending */
.filt-row{display:flex;gap:.35rem;flex-wrap:wrap;}
.filt-btn{font-family:'DM Mono',monospace;font-size:.65rem;padding:.28rem .65rem;border:1px solid var(--b2);border-radius:20px;color:var(--t3);cursor:pointer;transition:all .15s;background:var(--sf);}
.filt-btn:hover{border-color:var(--b3);color:var(--t2);}
.filt-btn.on{background:var(--dark);border-color:var(--dark);color:#FFFFFF;}
.pd-item{padding:.95rem 1.1rem;border:1px solid var(--b1);border-radius:var(--rs);margin-bottom:.65rem;background:var(--sf);box-shadow:var(--sh);transition:box-shadow .15s;}
.pd-item:hover{box-shadow:var(--shm);}
.pd-item.urg{border-left:3px solid var(--red);}
.pd-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.28rem;gap:.5rem;}
.pd-title{font-size:.9rem;font-weight:600;}
.pd-sel{font-family:'DM Mono',monospace;font-size:.6rem;padding:.2rem .5rem;border-radius:6px;border:1px solid var(--b2);cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;background:var(--sf2);flex-shrink:0;}
.pd-note{font-size:.8rem;color:var(--t2);line-height:1.55;margin-bottom:.22rem;}
.pd-date{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--t3);}

/* Finance */
.fin-toggle{display:flex;gap:.2rem;margin-bottom:1.25rem;background:var(--sf2);border-radius:var(--rs);padding:.3rem;}
.fin-tab{flex:1;padding:.45rem;text-align:center;font-family:'DM Mono',monospace;font-size:.65rem;cursor:pointer;border:none;background:transparent;color:var(--t3);transition:all .2s;border-radius:7px;font-weight:400;}
.fin-tab.on{background:var(--sf);color:var(--t1);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.fin-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:.8rem;margin-bottom:1.25rem;}
.fin-stat{background:var(--sf);border:1px solid var(--b1);border-radius:var(--rs);padding:1.1rem 1.2rem;box-shadow:var(--sh);}
.fin-stat-l{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.07em;color:var(--t3);margin-bottom:.55rem;text-transform:uppercase;}
.fin-stat-v{font-family:'DM Serif Display',serif;font-size:1.6rem;line-height:1.1;font-weight:400;}
.fin-item{display:flex;align-items:center;padding:.7rem 0;border-bottom:1px solid var(--b1);gap:.5rem;}
.fin-item:last-child{border-bottom:none;}
.fin-info{flex:1;min-width:0;}
.fin-name{font-size:.88rem;font-weight:500;color:var(--t1);}
.fin-date{font-family:'DM Mono',monospace;font-size:.63rem;color:var(--t3);margin-top:.12rem;}
.fin-r{display:flex;flex-direction:column;align-items:flex-end;gap:.2rem;}
.fin-amt{font-family:'DM Mono',monospace;font-size:.82rem;font-weight:400;}
.fin-in{color:var(--done);}
.fin-ex{color:var(--red);}
.fin-st{font-family:'DM Mono',monospace;font-size:.58rem;padding:.08rem .36rem;border-radius:4px;cursor:pointer;border:1px solid var(--b2);color:var(--t3);background:transparent;transition:all .15s;}
.fin-st:hover{border-color:var(--b3);color:var(--t2);}
.extra-total{display:flex;justify-content:space-between;align-items:baseline;padding-top:.85rem;margin-top:.45rem;border-top:1px solid var(--b2);}
.extra-total-l{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--t3);}
.extra-total-v{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--t1);}

/* Timeline */
.tl-item{display:flex;gap:.9rem;padding:.9rem 0;border-bottom:1px solid var(--b1);align-items:flex-start;}
.tl-item:last-child{border-bottom:none;}
.tl-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;background:var(--sf2);border:1px solid var(--b1);color:var(--t2);}
.tl-body{flex:1;}
.tl-title{font-size:.9rem;font-weight:600;margin-bottom:.1rem;color:var(--t1);}
.tl-date{font-family:'DM Mono',monospace;font-size:.63rem;color:var(--t3);}
.tl-note{font-size:.8rem;color:var(--t2);line-height:1.5;margin-top:.2rem;}
.tl-tag{font-family:'DM Mono',monospace;font-size:.58rem;padding:.18rem .5rem;border-radius:6px;border:1px solid var(--b2);color:var(--t3);flex-shrink:0;}

/* Calendar */
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;}
.cal-nav-btn{font-family:'DM Mono',monospace;font-size:.68rem;padding:.32rem .75rem;border:1px solid var(--b2);border-radius:6px;color:var(--t3);cursor:pointer;transition:all .15s;background:var(--sf);}
.cal-nav-btn:hover{border-color:var(--b3);color:var(--t2);}
.cal-m-lbl{font-family:'DM Serif Display',serif;font-size:1.5rem;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{text-align:center;font-family:'DM Mono',monospace;font-size:.6rem;color:var(--t3);padding:.4rem .2rem;}
.cal-cell{min-height:72px;background:var(--sf);border:1px solid var(--b1);border-radius:8px;padding:.3rem .35rem;transition:border-color .15s;}
.cal-cell.empty{background:transparent;border-color:transparent;box-shadow:none;}
.cal-cell.today{border-color:var(--t1);}
.cal-day-n{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--t3);margin-bottom:.2rem;}
.cal-day-n.tod{width:20px;height:20px;background:var(--t1);color:#fff;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.6rem;}
.cal-ev{font-size:.52rem;padding:.1rem .3rem;border-radius:4px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;background:var(--sf2);color:var(--t2);border-left:2px solid var(--b3);}

/* Empty */
.empty{text-align:center;padding:2.5rem 1rem;}
.empty-icon{font-family:'DM Mono',monospace;font-size:1.2rem;display:block;margin-bottom:.7rem;opacity:.15;color:var(--t1);}
.empty-txt{font-size:.9rem;color:var(--t3);}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.modal{background:var(--sf);border:1px solid var(--b1);border-radius:var(--r);padding:2rem 2.2rem 1.6rem;width:min(480px,92vw);box-shadow:0 24px 64px rgba(0,0,0,.15);max-height:88vh;overflow-y:auto;}
.modal h3{font-family:'DM Serif Display',serif;font-size:1.65rem;margin-bottom:1.3rem;color:var(--t1);}
.modal label{display:block;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.12em;color:var(--t3);margin-bottom:.3rem;margin-top:.85rem;text-transform:uppercase;}
.modal input,.modal select,.modal textarea{width:100%;padding:.6rem .8rem;border:1.5px solid var(--b2);border-radius:var(--rxs);background:var(--sf2);color:var(--t1);font-size:.9rem;outline:none;transition:border-color .15s;}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--t1);}
.modal textarea{resize:vertical;min-height:72px;}
.modal-ft{display:flex;justify-content:flex-end;gap:.6rem;margin-top:1.5rem;}
.btn-ghost{font-size:.8rem;font-weight:500;padding:.52rem 1.1rem;background:transparent;border:1.5px solid var(--b2);border-radius:var(--rxs);color:var(--t2);cursor:pointer;transition:all .18s;}
.btn-ghost:hover{border-color:var(--b3);color:var(--t1);}
.btn-solid{font-size:.8rem;font-weight:600;padding:.52rem 1.35rem;background:var(--dark);border:none;border-radius:var(--rxs);color:#FFFFFF;cursor:pointer;transition:all .18s;}
.btn-solid:hover{background:var(--dark2);}
.btn-danger{font-size:.8rem;font-weight:500;padding:.52rem 1.2rem;background:var(--red-bg);border:1px solid rgba(139,58,58,.2);border-radius:var(--rxs);color:var(--red);cursor:pointer;transition:all .18s;}
.btn-danger:hover{background:#F5E0E0;}
.swatches{display:flex;gap:.45rem;flex-wrap:wrap;margin-top:.4rem;}
.swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .15s;}
.swatch:hover{transform:scale(1.15);}
.swatch.on{border-color:var(--t1);transform:scale(1.1);}

/* Responsive */
@media(max-width:960px){:root{--sb:220px;} .main{padding:1.6rem 1.5rem 2rem;}}
@media(max-width:680px){
  .workspace{grid-template-columns:1fr;}
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:150;width:272px;height:100%;transform:translateX(-110%);box-shadow:none;}
  .sidebar.open{transform:translateX(0);box-shadow:12px 0 40px rgba(0,0,0,.12);}
  .sb-overlay.show{display:block;}
  .sb-close-btn{display:block;}
  .menu-btn{display:flex;}
  .hdr-date{display:none;}
  .main{padding:1.1rem .9rem calc(var(--bnav)+1.5rem);}
  .proj-title{font-size:2rem;}
  .grid2{grid-template-columns:1fr;}
  .tabs{display:none;}
  .mobile-nav{display:flex;}
  .fin-stats{grid-template-columns:1fr 1fr;}
  .prog-num{font-size:3.2rem;}
  .cal-cell{min-height:54px;}
}
@media(max-width:400px){.fin-stats{grid-template-columns:1fr;}}
`;

const Tag=({cfg,children})=><span style={{fontFamily:"'DM Mono',monospace",fontSize:".6rem",padding:".18rem .48rem",borderRadius:6,...cfg}}>{children}</span>;
const DelX=({onClick})=><button className="del-x" onClick={e=>{e.stopPropagation();onClick();}}>✕</button>;
const Empty=({icon,text})=><div className="empty"><span className="empty-icon">{icon||"○"}</span><div className="empty-txt">{text}</div></div>;

function OverviewTab({proj,upd,openModal}){
  const done=proj.milestones.filter(m=>m.status==="done").length,total=proj.milestones.length,pct=total?Math.round(done/total*100):0,stIdx=STAGES.indexOf(proj.stage);
  const updMs=(id,ch)=>upd(p=>({...p,milestones:p.milestones.map(m=>m.id===id?{...m,...ch}:m)}));
  const delMs=id=>upd(p=>({...p,milestones:p.milestones.filter(m=>m.id!==id)}));
  const togTodo=id=>upd(p=>({...p,todos:p.todos.map(t=>t.id===id?{...t,done:!t.done}:t)}));
  const delTodo=id=>upd(p=>({...p,todos:p.todos.filter(t=>t.id!==id)}));
  const delComm=id=>upd(p=>({...p,comms:(p.comms||[]).filter(c=>c.id!==id)}));
  return(<>
    {/* Dark Progress Card */}
    <div className="prog-card full" style={{marginBottom:"1rem"}}>
      <div className="prog-top">
        <div>
          <div className="prog-num">{pct}<span className="prog-unit">%</span></div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:".65rem",color:"rgba(255,255,255,.4)",marginTop:".3rem"}}>{done} / {total} 里程碑完成</div>
        </div>
        <div className="prog-meta">
          <select value={proj.stage} onChange={e=>upd(p=>({...p,stage:e.target.value}))} style={{fontFamily:"'DM Mono',monospace",fontSize:".62rem",border:"1px solid rgba(255,255,255,.15)",borderRadius:6,padding:".22rem .65rem",background:"rgba(255,255,255,.08)",color:"rgba(255,255,255,.6)",cursor:"pointer",outline:"none"}}>
            {STAGES.map(s=><option key={s} value={s}>{STAGE_L[s]}</option>)}
          </select>
        </div>
      </div>
      <div className="stage-row">
        {STAGES.map((s,i)=><div key={s} className={`stage-step${i<stIdx?" done-s":i===stIdx?" curr-s":""}`} onClick={()=>upd(p=>({...p,stage:s}))}>{STAGE_L[s]}</div>)}
      </div>
      <div className="prog-track"><div className="prog-fill" style={{width:pct+"%"}}/></div>
    </div>
    <div className="grid2">
      {/* Milestones */}
      <div className="card">
        <div className="card-hd">里程碑<button className="add-btn" onClick={()=>openModal("ms")}>＋ 新增</button></div>
        {proj.milestones.length===0?<Empty text="尚無里程碑"/>:
        <ul className="ms-list">{proj.milestones.map(m=>{const c=MSS[m.status];return(
          <li key={m.id} className="ms-item">
            <div className="ms-dot-w"><div className="ms-dot" style={{borderColor:c.dot,background:m.status==="done"?c.dot:"transparent"}}/></div>
            <div className="ms-body"><div className="ms-title">{m.title}</div><div className="ms-dates">{fmtD(m.start)}{m.end?` → ${fmtD(m.end)}`:""}</div></div>
            <div className="ms-r">
              <select className="ms-sel" value={m.status} onChange={e=>updMs(m.id,{status:e.target.value})} style={c.tag}>{Object.entries(MSS).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}</select>
              <Tag cfg={PRC[m.prio]}>{PRC[m.prio].l}</Tag>
              <DelX onClick={()=>delMs(m.id)}/>
            </div>
          </li>);})}</ul>}
      </div>
      {/* Todos */}
      <div className="card">
        <div className="card-hd">待辦事項<button className="add-btn" onClick={()=>openModal("todo")}>＋ 新增</button></div>
        {proj.todos.length===0?<Empty text="尚無待辦事項"/>:
        proj.todos.map(t=>{const over=t.due&&!t.done&&t.due<todayISO();return(
          <div key={t.id} className="todo-item">
            <div className="todo-row">
              <button className={`chk${t.done?" on":""}`} onClick={()=>togTodo(t.id)}>{t.done?"✓":""}</button>
              <div style={{flex:1,minWidth:0}}>
                <div className={`todo-txt${t.done?" todo-done":""}`}>{t.text}</div>
                <div className="todo-meta">{t.due&&<span className={`todo-due${over?" ov":""}`}>{fmtD(t.due)}</span>}<Tag cfg={PRC[t.prio]}>{PRC[t.prio].l}</Tag></div>
                {t.note&&<div className="todo-note">{t.note}</div>}
              </div>
              <DelX onClick={()=>delTodo(t.id)}/>
            </div>
          </div>);})}
      </div>
      {/* Comms */}
      <div className="card full">
        <div className="card-hd">溝通記錄<button className="add-btn" onClick={()=>openModal("comm")}>＋ 新增</button></div>
        {(proj.comms||[]).length===0?<Empty text="尚無溝通記錄"/>:
        (proj.comms||[]).map(c=><div key={c.id} className="comm-item">
          <div className="comm-hd"><div className="comm-who">{c.who}</div><div className="comm-r"><span className="comm-when">{fmtD(c.date)}</span><DelX onClick={()=>delComm(c.id)}/></div></div>
          <div className="comm-note">{c.note}</div>
          <span className="comm-ch">{c.ch}</span>
        </div>)}
      </div>
    </div>
  </>);
}

function PendingTab({proj,upd,openModal}){
  const [filter,setFilter]=useState("all");
  const updPd=(id,ch)=>upd(p=>({...p,pendings:p.pendings.map(x=>x.id===id?{...x,...ch}:x)}));
  const delPd=id=>upd(p=>({...p,pendings:p.pendings.filter(x=>x.id!==id)}));
  const filtered=filter==="all"?proj.pendings:proj.pendings.filter(x=>x.status===filter);
  const uc=proj.pendings.filter(x=>x.status==="urgent").length;
  return(<>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.3rem",flexWrap:"wrap",gap:".5rem"}}>
      <div className="filt-row">{["all","urgent","pending","confirmed","closed"].map(f=><button key={f} className={`filt-btn${filter===f?" on":""}`} onClick={()=>setFilter(f)}>{f==="all"?`全部 (${proj.pendings.length})`:PDS[f].l}{f==="urgent"&&uc>0?` · ${uc}`:""}</button>)}</div>
      <button className="add-btn" onClick={()=>openModal("pend")}>＋ 新增</button>
    </div>
    {filtered.length===0?<Empty text="無待確認事項"/>:
    filtered.map(pd=>{const c=PDS[pd.status];return(
      <div key={pd.id} className={`pd-item${pd.status==="urgent"?" urg":""}`}>
        <div className="pd-hd"><div className="pd-title">{pd.title}</div>
          <div style={{display:"flex",gap:".4rem",alignItems:"center"}}>
            <select className="pd-sel" value={pd.status} onChange={e=>updPd(pd.id,{status:e.target.value})} style={{color:c.color,background:c.bg}}>{Object.entries(PDS).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}</select>
            <DelX onClick={()=>delPd(pd.id)}/>
          </div>
        </div>
        {pd.note&&<div className="pd-note">{pd.note}</div>}
        {pd.date&&<div className="pd-date">{fmtD(pd.date)}</div>}
      </div>);})}
  </>);
}

function FinanceTab({proj,upd,openModal}){
  const [sub,setSub]=useState("income");
  const togSt=id=>upd(p=>({...p,finances:p.finances.map(f=>f.id===id?{...f,status:f.status==="paid"?"unpaid":"paid"}:f)}));
  const delFin=id=>upd(p=>({...p,finances:p.finances.filter(f=>f.id!==id)}));
  const delEx=id=>upd(p=>({...p,extras:p.extras.filter(e=>e.id!==id)}));
  const inc=proj.finances.filter(f=>f.type==="income"),exp=proj.finances.filter(f=>f.type==="expense");
  const totalIn=inc.reduce((a,f)=>a+Number(f.amt),0),paidIn=inc.filter(f=>f.status==="paid").reduce((a,f)=>a+Number(f.amt),0),unpaidIn=inc.filter(f=>f.status==="unpaid").reduce((a,f)=>a+Number(f.amt),0),totalEx=exp.reduce((a,f)=>a+Number(f.amt),0),exTot=proj.extras.reduce((a,e)=>a+Number(e.amt),0);
  const rl=(items,type)=>items.length===0?<Empty text={type==="income"?"尚無收款項目":"尚無支出記錄"}/>:
    items.map(f=><div key={f.id} className="fin-item">
      <div className="fin-info"><div className="fin-name">{f.name}</div><div className="fin-date">{fmtD(f.date)}{f.note?` · ${f.note}`:""}</div></div>
      <div className="fin-r">
        <div className={`fin-amt ${type==="income"?"fin-in":"fin-ex"}`}>{type==="income"?"+":"-"} NT${fmtN(f.amt)}</div>
        <button className="fin-st" onClick={()=>togSt(f.id)}>{f.status==="paid"?"已收付":"待收付"}</button>
      </div>
      <DelX onClick={()=>delFin(f.id)}/>
    </div>);
  return(<>
    <div className="fin-stats">
      <div className="fin-stat"><div className="fin-stat-l">合約總收款</div><div className="fin-stat-v" style={{color:"var(--done)"}}>NT${fmtN(totalIn)}</div></div>
      <div className="fin-stat"><div className="fin-stat-l">待收款</div><div className="fin-stat-v" style={{color:"var(--amber)"}}>NT${fmtN(unpaidIn)}</div></div>
      <div className="fin-stat"><div className="fin-stat-l">已收款</div><div className="fin-stat-v" style={{color:"var(--t1)"}}>NT${fmtN(paidIn)}</div></div>
      <div className="fin-stat"><div className="fin-stat-l">支出合計</div><div className="fin-stat-v" style={{color:"var(--red)"}}>NT${fmtN(totalEx)}</div></div>
    </div>
    <div className="fin-toggle"><button className={`fin-tab${sub==="income"?" on":""}`} onClick={()=>setSub("income")}>收款</button><button className={`fin-tab${sub==="expense"?" on":""}`} onClick={()=>setSub("expense")}>支出</button><button className={`fin-tab${sub==="extras"?" on":""}`} onClick={()=>setSub("extras")}>追加單</button></div>
    {sub==="income"&&<><div style={{display:"flex",justifyContent:"flex-end",marginBottom:".75rem"}}><button className="add-btn" onClick={()=>openModal("finIncome")}>＋ 新增</button></div><div className="card">{rl(inc,"income")}</div></>}
    {sub==="expense"&&<><div style={{display:"flex",justifyContent:"flex-end",marginBottom:".75rem"}}><button className="add-btn" onClick={()=>openModal("finExpense")}>＋ 新增</button></div><div className="card">{rl(exp,"expense")}</div></>}
    {sub==="extras"&&<><div style={{display:"flex",justifyContent:"flex-end",marginBottom:".75rem"}}><button className="add-btn" onClick={()=>openModal("extra")}>＋ 新增</button></div>
      <div className="card">{proj.extras.length===0?<Empty text="尚無追加項目"/>:
        proj.extras.map(e=><div key={e.id} className="fin-item">
          <div className="fin-info"><div className="fin-name">{e.title}</div><div className="fin-date">{fmtD(e.date)}{e.note?` · ${e.note}`:""}</div></div>
          <div className="fin-amt" style={{color:"var(--t2)"}}>NT${fmtN(e.amt)}</div>
          <DelX onClick={()=>delEx(e.id)}/>
        </div>)}
        {proj.extras.length>0&&<div className="extra-total"><div className="extra-total-l">追加總計</div><div className="extra-total-v">NT${fmtN(exTot)}</div></div>}
      </div>
    </>}
  </>);
}

function TimelineTab({proj,upd,openModal}){
  const [filter,setFilter]=useState("all");
  const delTl=id=>upd(p=>({...p,timelines:p.timelines.filter(t=>t.id!==id)}));
  const sorted=[...proj.timelines].sort((a,b)=>b.date.localeCompare(a.date));
  const filtered=filter==="all"?sorted:sorted.filter(t=>t.type===filter);
  return(<>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.3rem",flexWrap:"wrap",gap:".5rem"}}>
      <div className="filt-row">{["all","site","meet"].map(f=><button key={f} className={`filt-btn${filter===f?" on":""}`} onClick={()=>setFilter(f)}>{f==="all"?"全部":TLT[f].l}</button>)}</div>
      <button className="add-btn" onClick={()=>openModal("tl")}>＋ 新增紀錄</button>
    </div>
    {filtered.length===0?<Empty text="尚無紀錄"/>:
    filtered.map(tl=>{const c=TLT[tl.type];return(
      <div key={tl.id} className="tl-item">
        <div className="tl-icon">{c.icon}</div>
        <div className="tl-body"><div className="tl-title">{tl.title}</div><div className="tl-date">{fmtD(tl.date)}</div>{tl.note&&<div className="tl-note">{tl.note}</div>}</div>
        <span className="tl-tag">{c.l}</span>
        <DelX onClick={()=>delTl(tl.id)}/>
      </div>);})}
  </>);
}

function CalendarTab({proj,calYM,setCalYM}){
  const {y,m}=calYM,first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),cells=[];
  for(let i=0;i<first;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);
  const td=todayISO(),prefix=`${y}-${String(m+1).padStart(2,"0")}`;
  const evs=proj.milestones.flatMap(ms=>{const a=[];if(ms.start?.startsWith(prefix))a.push({date:ms.start,title:ms.title});if(ms.end?.startsWith(prefix))a.push({date:ms.end,title:ms.title+"（結）"});return a;});
  return(<>
    <div className="cal-nav-row">
      <button className="cal-nav-btn" onClick={()=>setCalYM(({y,m})=>m===0?{y:y-1,m:11}:{y,m:m-1})}>← 上月</button>
      <span className="cal-m-lbl">{y} 年 {MONTHS[m]}</span>
      <button className="cal-nav-btn" onClick={()=>setCalYM(({y,m})=>m===11?{y:y+1,m:0}:{y,m:m+1})}>下月 →</button>
    </div>
    <div className="cal-grid">
      {WDAYS.map(w=><div key={w} className="cal-dow">{w}</div>)}
      {cells.map((d,i)=>{if(!d)return<div key={"_"+i} className="cal-cell empty"/>;const ds=`${prefix}-${String(d).padStart(2,"0")}`,isT=ds===td,dayEvs=evs.filter(e=>e.date===ds);return(
        <div key={d} className={`cal-cell${isT?" today":""}`}>
          <div className="cal-day-n"><span className={isT?"cal-day-n tod":""}>{d}</span></div>
          {dayEvs.map((ev,j)=><div key={j} className="cal-ev">{ev.title}</div>)}
        </div>);})}
    </div>
  </>);
}

      {WDAYS.map(w=><div key={w} className="cal-dow">{w}</div>)}

        <div key={d} className={`cal-cell${isT?" today":""}`}>

const MC={

  todo:{title:"新增待辦事項",defs:{prio:"mid"},fields:[{k:"text",l:"事項名稱 *",type:"text",ph:"輸入待辦事項"},{k:"due",l:"截止日期",type:"date"},{k:"prio",l:"優先級",type:"select",opts:[["high","高"],["mid","中"],["low","低"]]},{k:"note",l:"備註說明",type:"textarea",ph:"補充說明..."}],save:(f,u,c)=>{if(!f.text?.trim())return;u(p=>({...p,todos:[...p.todos,{id:uid(),done:false,prio:"mid",...f}]}));c();}},
  comm:{title:"新增溝通記錄",defs:{ch:"Line"},fields:[{k:"who",l:"對象",type:"text",ph:"業主 — 王先生"},{k:"note",l:"溝通內容",type:"textarea",ph:"記錄重要決定..."},{k:"ch",l:"管道",type:"select",opts:COMM_CH.map(c=>[c,c])},{k:"date",l:"日期",type:"date"}],save:(f,u,c)=>{if(!f.note?.trim())return;u(p=>({...p,comms:[...(p.comms||[]),{id:uid(),ch:"Line",date:todayISO(),...f}]}));c();}},
  pend:{title:"新增待確認事項",defs:{status:"pending"},fields:[{k:"title",l:"事項標題 *",type:"text",ph:"需業主或廠商確認的事項"},{k:"status",l:"狀態",type:"select",opts:[["urgent","緊急"],["pending","待處理"],["confirmed","已確認"],["closed","已關閉"]]},{k:"note",l:"說明",type:"textarea",ph:"詳細說明..."},{k:"date",l:"日期",type:"date"}],save:(f,u,c)=>{if(!f.title?.trim())return;u(p=>({...p,pendings:[...p.pendings,{id:uid(),status:"pending",date:todayISO(),...f}]}));c();}},
  finIncome:{title:"新增收款項目",defs:{status:"unpaid"},fields:[{k:"name",l:"項目名稱 *",type:"text",ph:"例：設計費第一期"},{k:"amt",l:"金額 (NT$) *",type:"number",ph:"0"},{k:"status",l:"狀態",type:"select",opts:[["unpaid","待收款"],["paid","已收款"]]},{k:"date",l:"日期",type:"date"},{k:"note",l:"備註",type:"textarea",ph:"說明..."}],save:(f,u,c)=>{if(!f.name?.trim()||!f.amt)return;u(p=>({...p,finances:[...p.finances,{id:uid(),type:"income",status:"unpaid",date:todayISO(),...f,amt:Number(f.amt)}]}));c();}},
  finExpense:{title:"新增支出項目",defs:{status:"paid"},fields:[{k:"name",l:"項目名稱 *",type:"text",ph:"例：測量費"},{k:"amt",l:"金額 (NT$) *",type:"number",ph:"0"},{k:"status",l:"狀態",type:"select",opts:[["unpaid","待付款"],["paid","已付款"]]},{k:"date",l:"日期",type:"date"},{k:"note",l:"備註",type:"textarea",ph:"說明..."}],save:(f,u,c)=>{if(!f.name?.trim()||!f.amt)return;u(p=>({...p,finances:[...p.finances,{id:uid(),type:"expense",status:"paid",date:todayISO(),...f,amt:Number(f.amt)}]}));c();}},
  extra:{title:"新增追加單",defs:{},fields:[{k:"title",l:"追加項目 *",type:"text",ph:"例：增設插座8組"},{k:"amt",l:"追加金額 (NT$)",type:"number",ph:"0"},{k:"date",l:"日期",type:"date"},{k:"note",l:"說明",type:"textarea",ph:"追加原因..."}],save:(f,u,c)=>{if(!f.title?.trim())return;u(p=>({...p,extras:[...p.extras,{id:uid(),date:todayISO(),...f,amt:Number(f.amt||0)}]}));c();}},
  tl:{title:"新增紀錄",defs:{type:"site"},fields:[{k:"type",l:"類型",type:"select",opts:[["site","工地紀錄"],["meet","會議紀錄"]]},{k:"title",l:"標題 *",type:"text",ph:"紀錄標題"},{k:"date",l:"日期",type:"date"},{k:"note",l:"內容說明",type:"textarea",ph:"詳細說明..."}],save:(f,u,c)=>{if(!f.title?.trim())return;u(p=>({...p,timelines:[...p.timelines,{id:uid(),type:"site",date:todayISO(),...f}]}));c();}},

function ItemModal({type,close,updP}){
  const cfg=MC[type];
  const [form,setForm]=useState({...(cfg?.defs||{})});
  const F=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  if(!cfg)return null;
  return(<div className="overlay" onClick={e=>e.target===e.currentTarget&&close()}><div className="modal">
    <h3>{cfg.title}</h3>
    {cfg.fields.map(f=><div key={f.k}><label>{f.l}</label>
      {f.type==="select"?<select value={form[f.k]??""} onChange={F(f.k)}>{f.opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>:
       f.type==="textarea"?<textarea value={form[f.k]??""} onChange={F(f.k)} placeholder={f.ph||""}/>:
       <input type={f.type} value={form[f.k]??""} onChange={F(f.k)} placeholder={f.ph||""}/>}
    </div>)}
    <div className="modal-ft"><button className="btn-ghost" onClick={close}>取消</button><button className="btn-solid" onClick={()=>cfg.save(form,updP,close)}>儲存</button></div>
  </div></div>);
}

function App(){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [pid,setPid]=useState(null);
  const [tab,setTab]=useState("overview");
  const [showAllCal,setShowAllCal]=useState(false);
  const [modal,setModal]=useState(null);
  const [syncOk,setSyncOk]=useState(false);
  const [calYM,setCalYM]=useState({y:new Date().getFullYear(),m:new Date().getMonth()});
  const [delTarget,setDelTarget]=useState(null);
  const [sbOpen,setSbOpen]=useState(false);

  useEffect(()=>{loadData().then(d=>{setData(d);if(d.projects.length>0)setPid(d.projects[0].id);setLoading(false);});},[]);

  const upd=useCallback(fn=>{setData(prev=>{const next=fn(prev);saveData(next).then(()=>{setSyncOk(true);setTimeout(()=>setSyncOk(false),2500);});return next;});},[]);
  const updP=useCallback((pid,fn)=>{upd(d=>({...d,projects:d.projects.map(p=>p.id===pid?fn(p):p)}));},[upd]);
  const proj=data?.projects.find(p=>p.id===pid)||null;
  const openModal=useCallback((type)=>setModal({type,pid}),[pid]);
  const closeModal=useCallback(()=>setModal(null),[]);
  const updProj=useCallback((fn)=>{if(pid)updP(pid,fn);},[pid,updP]);
  const handleDeleted=useCallback((deletedId)=>{setData(curr=>{const r=curr.projects.filter(p=>p.id!==deletedId);setPid(r.length>0?r[0].id:null);setTab("overview");setShowAllCal(false);return curr;});},[ ]);
  const handleCreated=useCallback((newId)=>{setPid(newId);setTab("overview");setShowAllCal(false);},[]);
  const selectProj=useCallback((id)=>{setPid(id);setTab("overview");setShowAllCal(false);setSbOpen(false);},[]);

  if(loading)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#E9E9E9",fontFamily:"'DM Serif Display',serif",fontSize:"1.2rem",letterSpacing:".05em",color:"#CCCCCC"}}>ID Studio</div>);

  const dateParts=new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit"}).replace(/\//g,".");

  return(<>
    <style>{CSS}</style>
    {modal?.type==="newProj"&&<NewProjModal close={closeModal} upd={upd} onCreated={handleCreated}/>}
    {modal?.type==="editProj"&&proj&&<EditProjModal proj={proj} close={closeModal} upd={fn=>updP(pid,fn)}/>}
    {modal&&!["newProj","editProj"].includes(modal.type)&&<ItemModal type={modal.type} close={closeModal} updP={updProj}/>}
    {delTarget&&<DelProjModal proj={delTarget} close={()=>setDelTarget(null)} upd={upd} onDeleted={handleDeleted}/>}
    <div className={`sb-overlay${sbOpen?" show":""}`} onClick={()=>setSbOpen(false)}/>

    <header className="hdr">
      <div className="hdr-l">
        <button className="menu-btn" onClick={()=>setSbOpen(v=>!v)}>☰</button>
        <span className="hdr-logo">ID Studio</span>
        <div className="hdr-div"/>
        <span className="hdr-proj" onClick={()=>setSbOpen(v=>!v)}>{showAllCal?"總合行事曆":proj?proj.name:"選擇案件"}</span>
      </div>
      <div className="hdr-r">
        <div className={`sync-pip${syncOk?" on":""}`}/>
        <span className="hdr-date">{dateParts}</span>
        <button className="hdr-btn" onClick={()=>{setShowAllCal(v=>!v);setSbOpen(false);}}>{showAllCal?"返回案件":"行事曆"}</button>
      </div>
    </header>

    <div className="workspace">
      <aside className={`sidebar${sbOpen?" open":""}`}>
        <button className="sb-close-btn" onClick={()=>setSbOpen(false)}>✕ 關閉選單</button>
        <div className="sb-sec">Cases</div>
        {data.projects.map(p=>{
          const pct=Math.round(p.milestones.filter(m=>m.status==="done").length/Math.max(p.milestones.length,1)*100);
          return(<div key={p.id} className={`sb-item${pid===p.id&&!showAllCal?" on":""}`} onClick={()=>selectProj(p.id)}>
            <span className="sb-dot" style={{background:p.color}}/>
            <div className="sb-info">
              <div className="sb-name">{p.name}</div>
              <div className="sb-sub">{p.owner} · {STAGE_L[p.stage]}</div>
              <div className="sb-bar-track"><div className="sb-bar-fill" style={{width:pct+"%"}}/></div>
            </div>
          </div>);})}
        <hr className="sb-sep"/>
        <div className={`sb-item${showAllCal?" on":""}`} onClick={()=>{setShowAllCal(true);setSbOpen(false);}}>
          <span style={{fontSize:"1rem",color:"var(--t3)"}}>◎</span>
          <div className="sb-info"><div className="sb-name">總合行事曆</div><div className="sb-sub">All Projects</div></div>
        </div>
        <hr className="sb-sep"/>
        {proj&&!showAllCal&&<div style={{padding:".2rem .5rem"}}><button className="del-meta-btn" onClick={()=>{setDelTarget(proj);setSbOpen(false);}}>刪除此案件</button></div>}
        <button className="sb-add" onClick={()=>{setModal({type:"newProj",pid:null});setSbOpen(false);}}>＋ 新增案件</button>
      </aside>

      <main className="main">
        {data.projects.length===0?(
          <div style={{textAlign:"center",paddingTop:"6rem"}}>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:"2.5rem",fontWeight:400,marginBottom:".6rem",color:"var(--t1)"}}>尚無任何案件</div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:".68rem",color:"var(--t3)",marginBottom:"1.6rem"}}>建立第一個設計案件</div>
            <button className="btn-solid" onClick={()=>setModal({type:"newProj",pid:null})} style={{padding:".7rem 2rem",fontSize:".85rem"}}>＋ 新增案件</button>
          </div>
        ):showAllCal?(
          <AllCalendar data={data} calYM={calYM} setCalYM={setCalYM}/>
        ):proj?(
          <ProjectPanel proj={proj} tab={tab} setTab={setTab} upd={updProj} openModal={openModal} calYM={calYM} setCalYM={setCalYM}/>
        ):(
          <div style={{textAlign:"center",paddingTop:"5rem",color:"var(--t3)",fontFamily:"'DM Mono',monospace",fontSize:".72rem"}}>← 請從左側選擇案件</div>
        )}
      </main>
    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
