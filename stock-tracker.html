<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股情勢追蹤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0a0a0f;
  --surface: #111118;
  --raised:  #18181f;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text:    #f0f2f8;
  --muted:   rgba(240,242,248,0.45);
  --dim:     rgba(240,242,248,0.2);
  --green:   #3ddc84;
  --red:     #ff6b6b;
  --amber:   #ffc14d;
  --blue:    #5b9cf6;
  --purple:  #9d7cf8;
  --cyan:    #38bdf8;
  --mono:   'DM Mono', monospace;
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
  font-size: 14px; line-height: 1.6;
  min-height: 100dvh; -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── Layout ── */
.page { max-width: 680px; margin: 0 auto; padding: 20px 16px 60px; }

/* ── Header ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-icon {
  width: 34px; height: 34px; border-radius: 9px; background: var(--raised);
  border: 1px solid var(--border2); display: flex; align-items: center;
  justify-content: center; font-size: 17px;
}
.brand-name { font-size: 15px; font-weight: 600; letter-spacing: -.02em; }
.brand-sub  { font-size: 10.5px; color: var(--dim); letter-spacing: .05em; text-transform: uppercase; }
.header-right { display: flex; align-items: center; gap: 10px; }
.status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
.sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.sdot.loading { background: var(--amber); animation: pulse 1.2s ease-in-out infinite; }
.sdot.error   { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
.btn-sm {
  padding: 6px 13px; border-radius: 8px; font-family: inherit; font-size: 12px; font-weight: 500;
  background: var(--raised); border: 1px solid var(--border2); color: var(--muted);
  cursor: pointer; transition: border-color .15s, color .15s;
}
.btn-sm:hover    { border-color: rgba(255,255,255,.22); color: var(--text); }
.btn-sm:disabled { opacity: .4; cursor: not-allowed; }

/* ── AI Card ── */
.ai-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  margin-bottom: 14px; overflow: hidden; transition: border-color .2s;
}
.ai-card.loaded { border-color: var(--border2); }
.ai-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 12px; border-bottom: 1px solid var(--border);
}
.ai-label { font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--dim); }
.ai-badge {
  font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 100px;
  letter-spacing: .02em;
}
.ai-badge.bull { background: rgba(61,220,132,.12); color: var(--green); border: 1px solid rgba(61,220,132,.2); }
.ai-badge.bear { background: rgba(255,107,107,.12); color: var(--red);   border: 1px solid rgba(255,107,107,.2); }
.ai-badge.neu  { background: rgba(240,242,248,.06); color: var(--muted); border: 1px solid var(--border); }
.ai-body { padding: 16px; }
.ai-summary {
  font-size: 17px; font-weight: 600; letter-spacing: -.025em; line-height: 1.4;
  margin-bottom: 16px; color: var(--text);
}
.ai-focus {
  font-size: 12.5px; color: var(--muted); padding: 10px 13px;
  background: var(--raised); border-radius: 9px; margin-bottom: 14px;
  border-left: 2px solid var(--amber); line-height: 1.5;
}
.ai-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.ai-col-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }
.ai-col-label.bull { color: var(--green); }
.ai-col-label.bear { color: var(--red); }
.ai-reasons { list-style: none; display: flex; flex-direction: column; gap: 5px; }
.ai-reasons li { font-size: 12px; color: var(--muted); line-height: 1.45; padding-left: 10px; position: relative; }
.ai-reasons li::before { content: '·'; position: absolute; left: 0; color: var(--dim); }
.ai-loading { padding: 32px 16px; text-align: center; color: var(--dim); font-size: 13px; }
.ai-btn-wrap { padding: 0 16px 16px; }
.btn-ai {
  width: 100%; padding: 10px; border-radius: 10px; font-family: inherit; font-size: 13px; font-weight: 500;
  background: var(--raised); border: 1px solid var(--border2); color: var(--muted);
  cursor: pointer; transition: background .15s, border-color .15s, color .15s;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn-ai:hover    { background: rgba(91,156,246,.1); border-color: rgba(91,156,246,.3); color: var(--blue); }
.btn-ai:disabled { opacity: .45; cursor: not-allowed; }

/* ── Key Metrics ── */
.key-metrics {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px;
}
.km-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 14px 13px;
}
.km-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .09em; color: var(--dim); margin-bottom: 7px; }
.km-price { font-family: var(--mono); font-size: 20px; font-weight: 500; letter-spacing: -.02em; line-height: 1; margin-bottom: 5px; }
.km-delta { font-family: var(--mono); font-size: 11px; }
.km-delta.up   { color: var(--green); }
.km-delta.down { color: var(--red); }
.km-delta.flat { color: var(--dim); }

/* ── Market List ── */
.section-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .11em;
  color: var(--dim); margin-bottom: 10px; padding: 0 1px;
}
.market-list { display: flex; flex-direction: column; gap: 2px; margin-bottom: 20px; }
.mrow {
  display: flex; align-items: center; padding: 11px 14px;
  background: var(--surface); border-radius: 10px; gap: 12px;
  border: 1px solid transparent; transition: border-color .15s;
}
.mrow:hover { border-color: var(--border); }
.mrow-cat { width: 3px; height: 22px; border-radius: 3px; flex-shrink: 0; opacity: .7; }
.mrow-name { flex: 1; font-size: 13px; color: var(--muted); min-width: 0; }
.mrow-price { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--text); margin-right: 10px; }
.mrow-delta { font-family: var(--mono); font-size: 12px; text-align: right; min-width: 70px; }
.mrow-delta.up   { color: var(--green); }
.mrow-delta.down { color: var(--red); }
.mrow-delta.flat { color: var(--dim); }

/* skeleton */
.skel { border-radius: 5px; background: linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.06) 50%,rgba(255,255,255,.03) 75%); background-size: 200% 100%; animation: shimmer 1.8s infinite; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── News ── */
.news-wrap {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
}
.tabs { display: flex; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); position: relative; }
.tabs::-webkit-scrollbar { display: none; }
.tab-bar {
  position: absolute; bottom: 0; height: 1.5px;
  background: var(--blue); border-radius: 2px 2px 0 0;
  transition: left .25s cubic-bezier(.4,0,.2,1), width .25s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
}
.tab {
  padding: 11px 15px; font-size: 12.5px; font-weight: 500; color: var(--dim);
  cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: color .15s; user-select: none;
}
.tab:hover  { color: var(--muted); }
.tab.active { color: var(--text); }
.tab-n { font-size: 10px; padding: 1px 5px; background: rgba(255,255,255,.07); border-radius: 100px; margin-left: 4px; }

.news-list { min-height: 180px; }
.nitem {
  display: flex; gap: 12px; padding: 11px 16px;
  border-bottom: 1px solid rgba(255,255,255,.04); transition: background .12s;
}
.nitem:last-child { border-bottom: none; }
.nitem:hover { background: rgba(255,255,255,.02); }
.ndot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 8px; }
.ndot.pos { background: var(--green); }
.ndot.neg { background: var(--red); }
.ndot.neu { background: var(--dim); }
.ntitle {
  font-size: 13px; line-height: 1.5; color: rgba(240,242,248,.78);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.ntitle a { color: inherit; text-decoration: none; }
.ntitle a:hover { color: var(--blue); }
.nmeta { font-size: 11px; color: var(--dim); margin-top: 3px; display: flex; gap: 7px; }
.news-empty { padding: 28px; text-align: center; color: var(--dim); font-size: 13px; }

/* ── Footer ── */
.footer { margin-top: 18px; text-align: center; font-size: 11px; color: var(--dim); }
.footer a { color: var(--dim); text-decoration: none; }
.footer a:hover { color: var(--muted); }

@media(max-width:420px) {
  .key-metrics { grid-template-columns: repeat(3,1fr); }
  .km-price { font-size: 17px; }
  .ai-cols { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <header class="header">
    <div class="brand">
      <div class="brand-icon">📈</div>
      <div>
        <div class="brand-name">台股情勢</div>
        <div class="brand-sub">Market Intelligence</div>
      </div>
    </div>
    <div class="header-right">
      <div class="status">
        <div class="sdot loading" id="sdot"></div>
        <span id="update-time">載入中</span>
      </div>
      <button class="btn-sm" id="refresh-btn" onclick="refreshAll()">更新</button>
    </div>
  </header>

  <!-- AI Analysis Card -->
  <div class="ai-card" id="ai-card">
    <div class="ai-header">
      <span class="ai-label">Gemini AI 深度分析</span>
      <span class="ai-badge neu" id="ai-badge">—</span>
    </div>
    <div class="ai-loading" id="ai-body">等待市場資料…</div>
    <div class="ai-btn-wrap">
      <button class="btn-ai" id="ai-btn" onclick="runAnalysis()" disabled>
        <span>🤖</span><span>重新分析</span>
      </button>
    </div>
  </div>

  <!-- 3 Key Metrics -->
  <div class="key-metrics" id="key-metrics">
    <div class="km-card"><div class="km-label">台股</div><div class="km-price skel" style="width:75%;height:20px;margin-bottom:6px"></div><div class="skel" style="width:55%;height:12px;border-radius:4px"></div></div>
    <div class="km-card"><div class="km-label">S&P 500</div><div class="km-price skel" style="width:75%;height:20px;margin-bottom:6px"></div><div class="skel" style="width:55%;height:12px;border-radius:4px"></div></div>
    <div class="km-card"><div class="km-label">VIX</div><div class="km-price skel" style="width:75%;height:20px;margin-bottom:6px"></div><div class="skel" style="width:55%;height:12px;border-radius:4px"></div></div>
  </div>

  <!-- Other Market Indicators -->
  <p class="section-title">其他指標</p>
  <div class="market-list" id="market-list">
    <div class="mrow skel" style="height:44px"></div>
    <div class="mrow skel" style="height:44px"></div>
    <div class="mrow skel" style="height:44px"></div>
    <div class="mrow skel" style="height:44px"></div>
  </div>

  <!-- News -->
  <div class="news-wrap">
    <div class="tabs" id="tabs"><div class="tab-bar" id="tab-bar"></div></div>
    <div class="news-list" id="news-list"><div class="news-empty">載入新聞中…</div></div>
  </div>

  <div class="footer">
    資料：Stooq · ExchangeRate-API · Google News · Gemini AI &nbsp;·&nbsp; 每 5 分鐘自動更新<br>
    <a href="/">← 返回首頁</a>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
const CAT_ORDER = ['geopolitical','economic','semiconductor','domestic'];
let marketData = [], newsData = {}, activeTab = CAT_ORDER[0], timer = null;

const CAT_COLOR = { tw:'#fbbf24', us:'#5b9cf6', semi:'#9d7cf8', risk:'#ff6b6b', rates:'#38bdf8', fx:'#3ddc84', commodity:'#fb923c' };
const KEY_SYMS = ['^TWII','^GSPC','^VIX'];
const OTHER_SYMS = ['^DJI','^IXIC','^SOX','TSM','^TNX','USDTWD=X','GC=F'];
const DEC = { '^TNX':3, 'USDTWD=X':3 };

// ── Helpers ───────────────────────────────────────────────────────────────
const fmt = (n, d=2) => n == null ? '—' : n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtPct = n => n == null ? '—' : (n>=0?'+':'')+n.toFixed(2)+'%';
const fmtChg = n => n == null ? '—' : (n>=0?'+':'')+fmt(n,2);
function fmtPrice(sym, n) {
  if (n == null) return '—';
  if (sym==='^TNX') return n.toFixed(3)+'%';
  if (sym==='USDTWD=X') return n.toFixed(3);
  if (n>=10000) return n.toLocaleString('en-US',{maximumFractionDigits:0});
  return n.toFixed(2);
}
function timeAgo(s) {
  if (!s) return ''; const d=new Date(s); if(isNaN(d)) return '';
  const sec=Math.floor((Date.now()-d)/1000);
  if(sec<60) return sec+'秒前'; if(sec<3600) return Math.floor(sec/60)+'分前';
  if(sec<86400) return Math.floor(sec/3600)+'時前'; return Math.floor(sec/86400)+'天前';
}
function sentiment(t) {
  const lo=t.toLowerCase();
  const p=['rise','gain','rally','record','surge','jump','deal','stable','上漲','上升','創高','突破','回升','看好'];
  const n=['fall','drop','decline','plunge','crash','tension','conflict','sanction','ban','threat','crisis','war','tariff','下跌','緊張','衝突','制裁','危機'];
  const pc=p.filter(k=>lo.includes(k)).length, nc=n.filter(k=>lo.includes(k)).length;
  return pc>nc?'pos':nc>pc?'neg':'neu';
}
function dir(pct) { return pct>.01?'up':pct<-.01?'down':'flat'; }

// ── Count-up ──────────────────────────────────────────────────────────────
function countUp(el, end, dec) {
  const start = end * 0.97, dur = 700, t0 = performance.now();
  function tick(now) {
    const p = Math.min((now-t0)/dur, 1);
    const ease = 1-Math.pow(1-p, 3);
    el.textContent = (start+(end-start)*ease).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});
    if (p<1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ── Render Key Metrics ────────────────────────────────────────────────────
const KM_LABELS = { '^TWII':'台股', '^GSPC':'S&P 500', '^VIX':'VIX 恐慌' };
function renderKeyMetrics(data) {
  const by = Object.fromEntries(data.map(d=>[d.symbol,d]));
  document.getElementById('key-metrics').innerHTML = KEY_SYMS.map(sym=>{
    const d=by[sym]; if(!d) return '';
    const dec=DEC[sym]??2, dClass=dir(d.pct);
    return `<div class="km-card">
      <div class="km-label">${KM_LABELS[sym]}</div>
      <div class="km-price" data-val="${d.price}" data-dec="${dec}"></div>
      <div class="km-delta ${dClass}">${fmtChg(d.change)} ${fmtPct(d.pct)}</div>
    </div>`;
  }).join('');
  document.querySelectorAll('.km-price[data-val]').forEach(el=>{
    countUp(el, parseFloat(el.dataset.val), parseInt(el.dataset.dec));
  });
}

// ── Render Market List ────────────────────────────────────────────────────
function renderMarketList(data) {
  const by = Object.fromEntries(data.map(d=>[d.symbol,d]));
  document.getElementById('market-list').innerHTML = OTHER_SYMS.map(sym=>{
    const d=by[sym]; if(!d) return '';
    const dec=DEC[sym]??2, dClass=dir(d.pct);
    const color=CAT_COLOR[d.cat]||'#888';
    return `<div class="mrow">
      <div class="mrow-cat" style="background:${color}"></div>
      <div class="mrow-name">${d.zh}</div>
      <div class="mrow-price">${fmtPrice(sym,d.price)}</div>
      <div class="mrow-delta ${dClass}">${fmtChg(d.change)}<br><small>${fmtPct(d.pct)}</small></div>
    </div>`;
  }).join('');
}

// ── Render Tabs ───────────────────────────────────────────────────────────
function renderTabs() {
  const wrap=document.getElementById('tabs'), bar=document.getElementById('tab-bar');
  wrap.innerHTML = CAT_ORDER.map(k=>{
    const cnt=(newsData[k]?.items||[]).length;
    return `<div class="tab${k===activeTab?' active':''}" onclick="switchTab('${k}')">${newsData[k]?.label||k}${cnt?`<span class="tab-n">${cnt}</span>`:''}</div>`;
  }).join('');
  wrap.appendChild(bar);
  const active=document.querySelector('.tab.active');
  if(active) { bar.style.left=active.offsetLeft+'px'; bar.style.width=active.offsetWidth+'px'; }
}

// ── Render News ───────────────────────────────────────────────────────────
function renderNews() {
  const list=document.getElementById('news-list');
  const items=(newsData[activeTab]?.items)||[];
  if(!items.length){list.innerHTML='<div class="news-empty">目前無新聞</div>';return;}
  list.innerHTML=items.map(it=>{
    const s=sentiment(it.title), title=it.title.replace(/ - [^-]+$/,'');
    return `<div class="nitem">
      <div class="ndot ${s}"></div>
      <div>
        <div class="ntitle">${it.link?`<a href="${it.link}" target="_blank" rel="noopener">${title}</a>`:title}</div>
        <div class="nmeta">${it.source?`<span>${it.source}</span>`:''}<span>${timeAgo(it.pubDate)}</span></div>
      </div>
    </div>`;
  }).join('');
}

function switchTab(key) {
  activeTab=key; renderTabs();
  const list=document.getElementById('news-list');
  list.style.opacity='0';
  setTimeout(()=>{ renderNews(); list.style.transition='opacity .2s'; list.style.opacity='1'; setTimeout(()=>list.style.transition='',200); },100);
}

// ── AI Analysis ───────────────────────────────────────────────────────────
async function runAnalysis() {
  const btn=document.getElementById('ai-btn');
  const body=document.getElementById('ai-body');
  const badge=document.getElementById('ai-badge');
  const card=document.getElementById('ai-card');

  btn.disabled=true; btn.querySelector('span:last-child').textContent='分析中…';
  body.innerHTML='<div class="ai-loading">🤖 Gemini 分析中，約需 5-10 秒…</div>';
  badge.className='ai-badge neu'; badge.textContent='—';
  card.classList.remove('loaded');

  try {
    const r=await fetch('/api/analyze',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ market: marketData, news: newsData }),
    });
    const j=await r.json();
    if(!j.ok) throw new Error(j.error);
    const a=j.data;

    const biasClass = a.bias==='偏多'?'bull':a.bias==='偏空'?'bear':'neu';
    badge.className=`ai-badge ${biasClass}`; badge.textContent=a.bias||'—';

    body.innerHTML=`
      <div class="ai-body">
        <div class="ai-summary">${a.summary||''}</div>
        ${a.focus?`<div class="ai-focus">📌 ${a.focus}</div>`:''}
        <div class="ai-cols">
          <div>
            <div class="ai-col-label bull">多方理由</div>
            <ul class="ai-reasons">${(a.bull_reasons||[]).map(r=>`<li>${r}</li>`).join('')}</ul>
          </div>
          <div>
            <div class="ai-col-label bear">空方理由</div>
            <ul class="ai-reasons">${(a.bear_reasons||[]).map(r=>`<li>${r}</li>`).join('')}</ul>
          </div>
        </div>
      </div>`;
    card.classList.add('loaded');
  } catch(e) {
    body.innerHTML=`<div class="ai-loading" style="color:var(--red)">分析失敗：${e.message}</div>`;
  } finally {
    btn.disabled=false; btn.querySelector('span:last-child').textContent='重新分析';
  }
}

// ── Fetch ─────────────────────────────────────────────────────────────────
async function fetchMarket() {
  try {
    const r=await fetch('/api/market-data'), j=await r.json();
    if(j.ok&&j.data?.length){
      marketData=j.data;
      renderKeyMetrics(j.data);
      renderMarketList(j.data);
      document.getElementById('update-time').textContent=new Date(j.ts).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})+'更新';
      document.getElementById('ai-btn').disabled=false;
      return true;
    }
    throw new Error(j.error||'無資料');
  } catch(e) {
    document.getElementById('market-list').innerHTML=`<div style="color:var(--red);padding:14px">⚠ 市場資料失敗：${e.message}</div>`;
    return false;
  }
}

async function fetchNews() {
  try {
    const r=await fetch('/api/news'), j=await r.json();
    if(j.ok&&j.data){newsData=j.data;renderTabs();renderNews();}
  } catch(e) { console.error('[news]',e); }
}

// ── Refresh ───────────────────────────────────────────────────────────────
async function refreshAll() {
  const btn=document.getElementById('refresh-btn');
  btn.disabled=true; btn.textContent='更新中';
  document.getElementById('sdot').className='sdot loading';

  const [ok]=await Promise.all([fetchMarket(), fetchNews()]);

  document.getElementById('sdot').className=`sdot${ok?'':' error'}`;
  btn.disabled=false; btn.textContent='更新';
  clearTimeout(timer);
  timer=setTimeout(refreshAll, 5*60*1000);

  // Auto-run analysis once market data is loaded (first load only)
  if(ok && !document.getElementById('ai-card').classList.contains('loaded')) {
    runAnalysis();
  }
}

refreshAll();
window.addEventListener('resize', ()=>{
  const active=document.querySelector('.tab.active'), bar=document.getElementById('tab-bar');
  if(active&&bar){bar.style.left=active.offsetLeft+'px';bar.style.width=active.offsetWidth+'px';}
});
</script>
</body>
