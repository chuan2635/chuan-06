<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股情勢追蹤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #070b14;
  --glass:     rgba(255,255,255,0.04);
  --glass-md:  rgba(255,255,255,0.06);
  --border:    rgba(255,255,255,0.07);
  --border-md: rgba(255,255,255,0.13);
  --text:      #e8edf8;
  --muted:     rgba(232,237,248,0.45);
  --dim:       rgba(232,237,248,0.22);
  --green:     #4ade80;
  --green-glow:rgba(74,222,128,0.18);
  --red:       #f87171;
  --red-glow:  rgba(248,113,113,0.18);
  --amber:     #fbbf24;
  --blue:      #60a5fa;
  --mono:     'DM Mono', 'SF Mono', monospace;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Background ── */
.bg-layer {
  position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
}
.bg-orb {
  position: absolute; border-radius: 50%; filter: blur(120px); opacity: .6;
}
.orb-1 { width:700px; height:700px; background:rgba(29,78,216,.12); top:-200px; left:-200px; }
.orb-2 { width:500px; height:500px; background:rgba(109,40,217,.08); bottom:-100px; right:-150px; }
.orb-3 { width:350px; height:350px; background:rgba(5,150,105,.06); top:45%; left:55%; transform:translate(-50%,-50%); }
.bg-grid {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* ── Layout ── */
.app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 28px 20px 56px; }

/* ── Header ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 36px; flex-wrap: wrap; gap: 14px;
}
.logo { display: flex; align-items: center; gap: 11px; }
.logo-mark {
  width: 38px; height: 38px; border-radius: 11px;
  background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
  display: flex; align-items: center; justify-content: center; font-size: 19px;
  box-shadow: 0 0 20px rgba(139,92,246,.35);
  flex-shrink: 0;
}
.logo-text {
  font-size: 17px; font-weight: 700; letter-spacing: -.03em;
  background: linear-gradient(135deg, #e8edf8 30%, #94a3b8 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.logo-sub { font-size: 11px; color: var(--dim); font-weight: 400; letter-spacing: .02em; margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 14px; }
.status-chip {
  display: flex; align-items: center; gap: 7px;
  font-size: 12px; color: var(--muted);
}
.sdot {
  width: 7px; height: 7px; border-radius: 50%; background: #22c55e;
  box-shadow: 0 0 6px rgba(34,197,94,.6);
}
.sdot.loading { background: var(--amber); box-shadow: 0 0 6px rgba(251,191,36,.6); animation: sdot-pulse 1.1s ease-in-out infinite; }
.sdot.error   { background: var(--red);   box-shadow: 0 0 6px rgba(248,113,113,.6); }
@keyframes sdot-pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
.btn {
  padding: 8px 18px; border-radius: 9px; font-family: inherit; font-size: 13px; font-weight: 500;
  background: var(--glass-md); border: 1px solid var(--border-md); color: rgba(232,237,248,.8);
  cursor: pointer; transition: background .2s, border-color .2s, color .2s;
}
.btn:hover  { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.2); color: var(--text); }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* ── Signal Banner ── */
.signal {
  border-radius: 20px; padding: 22px 26px; margin-bottom: 28px;
  display: flex; align-items: flex-start; gap: 18px;
  border: 1px solid; position: relative; overflow: hidden;
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
}
.signal::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse at 0% 0%, rgba(255,255,255,.07), transparent 55%);
}
.signal.positive { background: linear-gradient(135deg,rgba(74,222,128,.1),rgba(74,222,128,.03)); border-color: rgba(74,222,128,.25); }
.signal.caution  { background: linear-gradient(135deg,rgba(251,191,36,.1),rgba(251,191,36,.03)); border-color: rgba(251,191,36,.25); }
.signal.danger   { background: linear-gradient(135deg,rgba(248,113,113,.1),rgba(248,113,113,.03)); border-color: rgba(248,113,113,.25); }
.signal.neutral  { background: var(--glass); border-color: var(--border); }
.sig-icon { font-size: 44px; line-height: 1; flex-shrink: 0; }
.sig-eye  { font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--dim); margin-bottom: 5px; }
.sig-title { font-size: 20px; font-weight: 700; letter-spacing: -.025em; margin-bottom: 11px; }
.signal.positive .sig-title { color: var(--green); }
.signal.caution  .sig-title { color: var(--amber); }
.signal.danger   .sig-title { color: var(--red); }
.signal.neutral  .sig-title { color: var(--muted); }
.sig-pills { display: flex; flex-wrap: wrap; gap: 7px; }
.sig-pill {
  font-size: 12px; padding: 4px 11px; border-radius: 100px;
  background: rgba(255,255,255,.055); border: 1px solid rgba(255,255,255,.1); color: var(--muted);
}

/* ── Section label ── */
.sec-label {
  font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 13px;
}

/* ── Market Grid ── */
.market-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(155px,1fr)); gap: 11px; margin-bottom: 28px; }
.card {
  background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: 16px; padding: 18px 16px;
  position: relative; overflow: hidden; cursor: default;
  transition: border-color .3s, box-shadow .3s, transform .2s;
}
.card:hover { transform: translateY(-2px); }
.card.up   { border-color: rgba(74,222,128,.22); box-shadow: 0 0 28px var(--green-glow), inset 0 1px 0 rgba(74,222,128,.1); }
.card.down { border-color: rgba(248,113,113,.22); box-shadow: 0 0 28px var(--red-glow), inset 0 1px 0 rgba(248,113,113,.1); }
.card-tag { font-size: 11px; font-weight: 500; color: var(--dim); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
.card-badge { font-size: 9px; padding: 2px 6px; background: rgba(255,255,255,.07); border-radius: 100px; color: var(--dim); }
.card-price { font-family: var(--mono); font-size: 21px; font-weight: 400; letter-spacing: -.02em; line-height: 1.1; margin-bottom: 7px; color: var(--text); }
.card-delta { font-family: var(--mono); font-size: 12px; display: flex; gap: 7px; }
.card-delta.up   { color: var(--green); }
.card-delta.down { color: var(--red); }
.card-delta.flat { color: var(--dim); }
/* skeleton */
.card.skeleton { pointer-events: none; }
.skel { border-radius: 5px; background: linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%); background-size: 200% 100%; animation: shimmer 1.8s infinite; }
.skel-tag  { height: 11px; width: 65%; margin-bottom: 14px; }
.skel-price{ height: 22px; width: 80%; margin-bottom: 9px; }
.skel-delta{ height: 12px; width: 55%; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── News ── */
.news-wrap { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
.tabs { display: flex; border-bottom: 1px solid var(--border); position: relative; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab-bar { position: absolute; bottom: 0; height: 2px; background: linear-gradient(90deg,#3b82f6,#8b5cf6); border-radius: 2px 2px 0 0; transition: left .3s cubic-bezier(.4,0,.2,1), width .3s cubic-bezier(.4,0,.2,1); pointer-events: none; }
.tab { padding: 14px 18px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; white-space: nowrap; transition: color .2s; flex-shrink: 0; user-select: none; }
.tab:hover { color: rgba(232,237,248,.72); }
.tab.active { color: var(--text); }
.tab-n { display: inline-block; font-size: 10px; padding: 1px 5px; background: rgba(255,255,255,.08); border-radius: 100px; margin-left: 5px; vertical-align: middle; color: var(--dim); }
.news-list { min-height: 220px; }
.news-item { display: flex; align-items: flex-start; gap: 13px; padding: 13px 20px; border-bottom: 1px solid rgba(255,255,255,.04); transition: background .15s; }
.news-item:last-child { border-bottom: none; }
.news-item:hover { background: rgba(255,255,255,.03); }
.ndot { flex-shrink: 0; width: 6px; height: 6px; border-radius: 50%; margin-top: 6px; transition: box-shadow .3s; }
.ndot.pos { background: var(--green); box-shadow: 0 0 7px rgba(74,222,128,.7); }
.ndot.neg { background: var(--red); box-shadow: 0 0 7px rgba(248,113,113,.7); }
.ndot.neu { background: rgba(232,237,248,.2); }
.news-body { flex: 1; min-width: 0; }
.news-title { font-size: 13.5px; line-height: 1.5; color: rgba(232,237,248,.82); margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.news-title a { color: inherit; text-decoration: none; transition: color .15s; }
.news-title a:hover { color: #93c5fd; }
.news-meta { font-size: 11px; color: var(--dim); display: flex; gap: 8px; flex-wrap: wrap; }
.news-source { color: rgba(232,237,248,.38); }
.news-state { padding: 36px; text-align: center; color: var(--dim); }

/* ── Footer ── */
.footer { margin-top: 24px; text-align: center; font-size: 11px; color: var(--dim); }
.footer a { color: rgba(232,237,248,.3); text-decoration: none; }
.footer a:hover { color: var(--muted); }

/* ── Responsive ── */
@media(max-width:600px) {
  .app { padding: 20px 14px 48px; }
  .market-grid { grid-template-columns: repeat(2,1fr); }
  .logo-sub { display: none; }
  .sig-icon { font-size: 32px; }
  .sig-title { font-size: 17px; }
  .tab { padding: 12px 14px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-grid"></div>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>
</div>

<div class="app">

  <header class="header">
    <div class="logo">
      <div class="logo-mark">📊</div>
      <div>
        <div class="logo-text">台股情勢追蹤</div>
        <div class="logo-sub">TAIWAN MARKET INTELLIGENCE</div>
      </div>
    </div>
    <div class="header-right">
      <div class="status-chip">
        <div id="sdot" class="sdot loading"></div>
        <span id="update-time">載入中…</span>
      </div>
      <button class="btn" id="refresh-btn" onclick="refreshAll()">重新整理</button>
    </div>
  </header>

  <div class="signal neutral" id="signal">
    <div class="sig-icon">⏳</div>
    <div>
      <div class="sig-eye">市場訊號</div>
      <div class="sig-title">計算中…</div>
    </div>
  </div>

  <p class="sec-label">市場指標</p>
  <div class="market-grid" id="market-grid"></div>

  <p class="sec-label" style="margin-top:4px">國際・台灣情勢</p>
  <div class="news-wrap">
    <div class="tabs" id="tabs"><div class="tab-bar" id="tab-bar"></div></div>
    <div class="news-list" id="news-list"><div class="news-state">載入新聞中…</div></div>
  </div>

  <div class="footer">
    資料來源：Yahoo Finance · Google News RSS &nbsp;·&nbsp; 每 5 分鐘自動更新
    &nbsp;&nbsp;<a href="/">← 返回首頁</a>
  </div>
</div>

<script>
// ── Constants & State ──────────────────────────────────────────────────────
const CAT_ORDER = ['geopolitical','economic','semiconductor','domestic'];
let marketData = [], newsData = {}, activeTab = CAT_ORDER[0], refreshTimer = null;

// ── Format helpers ─────────────────────────────────────────────────────────
function fmt(n, d = 2) {
  if (n == null) return '—';
  return n.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
}
function fmtPrice(sym, n) {
  if (n == null) return '—';
  if (sym === '^TNX')     return n.toFixed(3) + '%';
  if (sym === 'USDTWD=X') return n.toFixed(3);
  if (n >= 10000) return n.toLocaleString('en-US', { maximumFractionDigits: 2 });
  return n.toFixed(2);
}
function fmtPct(n)  { if (n == null) return '—'; return (n >= 0 ? '+' : '') + n.toFixed(2) + '%'; }
function fmtChg(n)  { if (n == null) return '—'; return (n >= 0 ? '+' : '') + fmt(n, 2); }
function timeAgo(s) {
  if (!s) return '';
  const d = new Date(s); if (isNaN(d)) return '';
  const sec = Math.floor((Date.now() - d) / 1000);
  if (sec < 60)  return sec + ' 秒前';
  if (sec < 3600) return Math.floor(sec / 60) + ' 分鐘前';
  if (sec < 86400) return Math.floor(sec / 3600) + ' 小時前';
  return Math.floor(sec / 86400) + ' 天前';
}
function sentiment(t) {
  const lo = t.toLowerCase();
  const pos = ['rise','gain','rally','record','surge','jump','boosts','deal','cooperation','stable','上漲','上升','創高','突破','回升','反彈','看好','協議'];
  const neg = ['fall','drop','decline','plunge','crash','tension','conflict','sanction','ban','restrict','warns','threat','crisis','war','military','tariff','下跌','緊張','衝突','制裁','禁令','危機','攻擊'];
  const p = pos.filter(k => lo.includes(k)).length;
  const n = neg.filter(k => lo.includes(k)).length;
  return p > n ? 'pos' : n > p ? 'neg' : 'neu';
}

// ── Signal Calculation ─────────────────────────────────────────────────────
function calcSignal(data) {
  const by = Object.fromEntries(data.map(d => [d.symbol, d]));
  const vix   = by['^VIX']?.price ?? 20;
  const sp5   = by['^GSPC']?.pct  ?? 0;
  const ndq   = by['^IXIC']?.pct  ?? 0;
  const sox   = by['^SOX']?.pct   ?? 0;
  const tsm   = by['TSM']?.pct    ?? 0;
  const fx    = by['USDTWD=X']?.pct ?? 0;
  const tnx   = by['^TNX']?.price ?? 4;
  const avgUS = (sp5 + ndq) / 2;

  let level, title, icon;
  if (vix > 30 || avgUS < -2)       { level='danger';   title='市場警戒 — 恐慌升溫'; icon='🔴'; }
  else if (vix > 22 || avgUS < -.8) { level='caution';  title='謹慎觀望 — 波動偏高'; icon='🟡'; }
  else if (avgUS > .6 && vix < 18)  { level='positive'; title='偏多格局 — 外資可能流入'; icon='🟢'; }
  else                               { level='neutral';  title='中性整理 — 方向待確認'; icon='⚪'; }

  const pills = [];
  if (vix > 25)        pills.push(`⚡ VIX ${vix.toFixed(1)} 高位，恐慌升溫`);
  else if (vix < 16)   pills.push(`✓ VIX ${vix.toFixed(1)} 低位，情緒平穩`);
  else                 pills.push(`→ VIX ${vix.toFixed(1)} 中性`);

  if (Math.abs(avgUS) > .25)
    pills.push(`${avgUS > 0 ? '✓' : '✗'} 美股 S&P ${fmtPct(sp5)} / NASDAQ ${fmtPct(ndq)}`);
  if (Math.abs(sox) > .5)
    pills.push(`${sox > 0 ? '✓' : '✗'} 費城半導體 ${fmtPct(sox)}`);
  if (Math.abs(tsm) > .5)
    pills.push(`${tsm > 0 ? '✓' : '✗'} 台積電 ADR ${fmtPct(tsm)}`);
  if (fx < -.3)        pills.push(`✓ 台幣升值，外資流入訊號`);
  else if (fx > .3)    pills.push(`→ 台幣貶值，資金偏保守`);
  if (tnx > 4.8)       pills.push(`⚡ 10Y 美債 ${tnx.toFixed(2)}%，估值壓力`);

  return { level, title, icon, pills };
}

// ── GSAP helpers ───────────────────────────────────────────────────────────
function countUp(el, endVal, decimals) {
  const obj = { v: endVal * 0.96 };
  gsap.to(obj, {
    v: endVal, duration: 0.9, ease: 'power3.out',
    onUpdate() {
      el.textContent = obj.v.toLocaleString('en-US', {
        minimumFractionDigits: decimals, maximumFractionDigits: decimals
      });
    }
  });
}

// ── Render Market ──────────────────────────────────────────────────────────
const SYMBOL_ORDER  = ['^TWII','^DJI','^GSPC','^IXIC','^SOX','^VIX','USDTWD=X','TSM','^TNX','GC=F'];
const SYMBOL_DECS   = { '^TNX':3, 'USDTWD=X':3, '^VIX':2 };
const SYMBOL_STATES = { 'PRE':'盤前', 'POST':'盤後', 'CLOSED':'休市' };

function renderMarket(data) {
  const grid = document.getElementById('market-grid');
  if (!data.length) {
    grid.innerHTML = `<div style="color:var(--red);padding:18px;grid-column:1/-1">⚠ 市場資料載入失敗，請稍後重試</div>`;
    return;
  }
  const byS = Object.fromEntries(data.map(d => [d.symbol, d]));

  grid.innerHTML = SYMBOL_ORDER.map(sym => {
    const d = byS[sym]; if (!d) return '';
    const dir = d.pct > .01 ? 'up' : d.pct < -.01 ? 'down' : '';
    const dec = SYMBOL_DECS[sym] ?? 2;
    const badge = SYMBOL_STATES[d.state] || '';
    return `<div class="card ${dir}" data-sym="${sym}" data-val="${d.price}" data-dec="${dec}">
      <div class="card-tag">${d.zh}${badge ? `<span class="card-badge">${badge}</span>` : ''}</div>
      <div class="card-price" data-price></div>
      <div class="card-delta ${dir || 'flat'}">
        <span>${fmtChg(d.change)}</span>
        <span>${fmtPct(d.pct)}</span>
      </div>
    </div>`;
  }).join('');

  // Count-up animation on each card price
  grid.querySelectorAll('.card[data-val]').forEach(card => {
    const el  = card.querySelector('[data-price]');
    const val = parseFloat(card.dataset.val);
    const dec = parseInt(card.dataset.dec);
    if (!isNaN(val)) countUp(el, val, dec);
    else el.textContent = '—';
  });

  gsap.from('.card', { y: 28, opacity: 0, duration: .55, stagger: .045, ease: 'power3.out', clearProps: 'all' });

  // Signal
  const sig = calcSignal(data);
  const el = document.getElementById('signal');
  el.className = `signal ${sig.level}`;
  el.innerHTML = `
    <div class="sig-icon">${sig.icon}</div>
    <div>
      <div class="sig-eye">市場訊號</div>
      <div class="sig-title">${sig.title}</div>
      <div class="sig-pills">${sig.pills.map(p => `<span class="sig-pill">${p}</span>`).join('')}</div>
    </div>`;
  gsap.from('#signal', { y: -14, opacity: 0, duration: .45, ease: 'power2.out' });
}

// ── Render Tabs ────────────────────────────────────────────────────────────
function renderTabs() {
  const wrap = document.getElementById('tabs');
  const bar  = document.getElementById('tab-bar');

  // Rebuild tabs (keep indicator element)
  const tabEls = CAT_ORDER.map(key => {
    const label = newsData[key]?.label || key;
    const count = newsData[key]?.items?.length || 0;
    return `<div class="tab ${key===activeTab?'active':''}" data-tab="${key}" onclick="switchTab('${key}')">
      ${label}${count ? `<span class="tab-n">${count}</span>` : ''}
    </div>`;
  }).join('');

  // Replace only tab divs, keep bar
  wrap.innerHTML = tabEls;
  wrap.appendChild(bar);
  updateTabBar();
}

function updateTabBar() {
  const active = document.querySelector('.tab.active');
  const bar = document.getElementById('tab-bar');
  if (!active || !bar) return;
  bar.style.left  = active.offsetLeft + 'px';
  bar.style.width = active.offsetWidth + 'px';
}

// ── Render News ────────────────────────────────────────────────────────────
function renderNews() {
  const list  = document.getElementById('news-list');
  const items = newsData[activeTab]?.items || [];
  if (!items.length) { list.innerHTML = '<div class="news-state">目前無新聞資料</div>'; return; }

  list.innerHTML = items.map(it => {
    const s = sentiment(it.title);
    const cleanTitle = it.title.replace(/ - [^-]+$/, '');
    const src = it.source || '';
    const ago = timeAgo(it.pubDate);
    return `<div class="news-item">
      <div class="ndot ${s}"></div>
      <div class="news-body">
        <div class="news-title">${it.link
          ? `<a href="${it.link}" target="_blank" rel="noopener noreferrer">${cleanTitle}</a>`
          : cleanTitle}</div>
        <div class="news-meta">
          ${src ? `<span class="news-source">${src}</span>` : ''}
          ${ago ? `<span>${ago}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  gsap.from('.news-item', { x: -14, opacity: 0, duration: .38, stagger: .035, ease: 'power2.out', clearProps: 'all' });
}

function switchTab(key) {
  activeTab = key;
  renderTabs();
  // Fade out → update → fade in
  gsap.to('#news-list', {
    opacity: 0, duration: .12,
    onComplete() {
      renderNews();
      gsap.to('#news-list', { opacity: 1, duration: .2 });
    }
  });
}

// ── Skeleton ───────────────────────────────────────────────────────────────
function renderSkeleton() {
  document.getElementById('market-grid').innerHTML = Array(10).fill(0).map(() =>
    `<div class="card skeleton">
      <div class="skel skel-tag"></div>
      <div class="skel skel-price"></div>
      <div class="skel skel-delta"></div>
    </div>`
  ).join('');

  const tabs = document.getElementById('tabs');
  const bar  = document.getElementById('tab-bar');
  tabs.innerHTML = ['兩岸政治','總體經濟','半導體','台灣國內'].map((l, i) =>
    `<div class="tab ${i===0?'active':''}">${l}</div>`
  ).join('');
  tabs.appendChild(bar);
}

// ── Status ─────────────────────────────────────────────────────────────────
function setStatus(s) { document.getElementById('sdot').className = `sdot ${s}`; }
function setTime(ts) {
  const d = new Date(ts);
  document.getElementById('update-time').textContent =
    `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} 更新`;
}

// ── Fetch ──────────────────────────────────────────────────────────────────
async function fetchMarket() {
  try {
    const r = await fetch('/api/market-data');
    const j = await r.json();
    if (j.ok && j.data?.length) { marketData = j.data; renderMarket(j.data); setTime(j.ts); return true; }
    throw new Error(j.error || '資料為空');
  } catch (e) {
    console.error('[market]', e);
    document.getElementById('market-grid').innerHTML =
      `<div style="color:var(--red);padding:18px;grid-column:1/-1">⚠ 市場資料載入失敗，請稍後重試<br><small style="color:var(--dim)">${e.message}</small></div>`;
    document.getElementById('signal').className = 'signal neutral';
    document.getElementById('signal').innerHTML =
      `<div class="sig-icon">⚠</div><div><div class="sig-eye">市場訊號</div><div class="sig-title" style="color:var(--muted)">無法取得市場資料</div></div>`;
    return false;
  }
}

async function fetchNews() {
  try {
    const r = await fetch('/api/news');
    const j = await r.json();
    if (j.ok && j.data) { newsData = j.data; renderTabs(); renderNews(); }
    else document.getElementById('news-list').innerHTML = '<div class="news-state">無法取得新聞資料</div>';
  } catch (e) {
    console.error('[news]', e);
    document.getElementById('news-list').innerHTML = '<div class="news-state">無法取得新聞資料</div>';
  }
}

// ── Refresh ────────────────────────────────────────────────────────────────
async function refreshAll() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true; btn.textContent = '更新中…';
  setStatus('loading');

  const [ok] = await Promise.all([fetchMarket(), fetchNews()]);

  setStatus(ok ? '' : 'error');
  btn.disabled = false; btn.textContent = '重新整理';

  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(refreshAll, 5 * 60 * 1000);
}

// ── Init ───────────────────────────────────────────────────────────────────
renderSkeleton();
gsap.from('.header',  { y: -18, opacity: 0, duration: .5, ease: 'power2.out' });
gsap.from('#signal',  { y: -10, opacity: 0, duration: .4, delay: .1, ease: 'power2.out' });
refreshAll();

window.addEventListener('resize', updateTabBar);
</script>
</body>
</html>
